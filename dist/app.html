            background: 'var(--brand-green)', color: '#fff', border: 'none', borderRadius: 6,
            padding: '6px 14px', fontSize: 12, fontWeight: 600, cursor: 'pointer',
            display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <Icon name="printer" size={13}/> Imprimir / PDF
          </button>
          <button onClick={onClose} style={{
            background: 'var(--surface-2)', color: 'var(--fg)', border: '1px solid var(--border)', borderRadius: 6,
            padding: '6px 12px', fontSize: 12, fontWeight: 600, cursor: 'pointer',
          }}>
            Fechar
          </button>

          width: '210mm', minHeight: '297mm', background: '#FFFFFF', color: '#0F2A20',

                <div className="rds-grid-label">Indicativo</div>
                <div className="rds-grid-val mono">{patrulha.indicativo}</div>

const ChatView = () => {
  const { useStore, actions } = window.SentinelaStore;
  const chats = useStore(s => s.chats);
  const militares = useStore(s => s.militares);
  const [active, setActive] = React.useState('c1');
  const [texto, setTexto] = React.useState('');
  const chat = chats[active];

  const labelDe = (id) => {
    if (id === 'sistema') return 'Sistema';
    if (id === 'm_costa') return 'Sarg. Costa (tu)';
    const m = militares.find(x => x.id === id);
    return m ? `${m.postoAbrev} ${m.nome.split(' ').slice(-1)[0]}` : id;
  };

  const enviar = () => {
    if (!texto.trim()) return;
    // PC sempre envia como Sarg. Costa (cmdt)
    const prevId = window.SentinelaStore.getState().militarLogadoId;
    window.SentinelaStore.setState({ militarLogadoId: 'm_costa' });
    actions.enviarMensagem(active, texto.trim());
    if (prevId) window.SentinelaStore.setState({ militarLogadoId: prevId });

              <div style={{ fontSize: 11, color: 'var(--fg-muted)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', marginTop: 2 }}>
                {last ? last.texto : '—'}
              </div>
            </button>
          );
        })}
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
        <div style={{ padding: '14px 18px', background: 'var(--surface)', borderBottom: '1px solid var(--border)' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 14 }}>{chat?.nome}</div>
          <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>{chat?.mensagens.length} mensagens</div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: 18, display: 'flex', flexDirection: 'column', gap: 8 }}>
          {chat?.mensagens.map((m, i) => {
            const proprio = m.de === 'm_costa';
            return (
              <div key={i} style={{ display: 'flex', justifyContent: proprio ? 'flex-end' : 'flex-start' }}>
                <div style={{
                  maxWidth: '70%', background: proprio ? 'var(--brand-green)' : 'var(--surface)',
                  color: proprio ? '#FFF' : 'var(--fg)', border: proprio ? 'none' : '1px solid var(--border)',
                  borderRadius: 10, padding: '8px 12px',
                }}>
                  {!proprio && <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--brand-green-deep)', marginBottom: 2 }}>{labelDe(m.de)}</div>}
                  <div style={{ fontSize: 13 }}>{m.texto}</div>
                  <div className="t-mono" style={{ fontSize: 10, opacity: 0.7, textAlign: 'right', marginTop: 2 }}>{m.hora}</div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ padding: 12, background: 'var(--surface)', borderTop: '1px solid var(--border)', display: 'flex', gap: 8 }}>
          <input value={texto} onChange={e => setTexto(e.target.value)} onKeyDown={e => e.key === 'Enter' && enviar()} placeholder="Mensagem… (envia para o móvel)" className="form-input" style={{ flex: 1 }}/>
          <Button tone="primary" icon="send" onClick={enviar}>Enviar</Button>
        </div>
      </div>
    </div>
  );
};

Object.assign(window, { OSView, ViaturasView, MilitaresView, PatrulhasView, EscalasView, ChatView });

const KPIBig = ({ icon, label, value, unit, delta, up }) => (
  <div style={{
    background: 'var(--surface)', border: '1px solid var(--border)',
    borderRadius: 12, padding: '16px 18px', display: 'flex', flexDirection: 'column', gap: 10,
  }}>

      color: up ? 'var(--success)' : 'var(--danger)',
    }}>
      <Icon name={up ? 'arrow-up' : 'arrow-down'} size={11}/> {delta}
    </div>
  </div>
);

const GraficoLinha = ({ dados }) => {
  const W = 500, H = 150;
  const pad = { top: 16, right: 36, bottom: 28, left: 36 };
  const gW = W - pad.left - pad.right;
  const gH = H - pad.top - pad.bottom;
  const n = dados.length;
  const xs = dados.map((_, i) => pad.left + (i / (n - 1)) * gW);
  // scale alertas: visible range 8–26
  const yV = v => pad.top + gH - ((v - 8) / 18) * gH;
  const pts = dados.map((d, i) => `${xs[i]},${yV(d.alertas)}`).join(' ');
  const area = `M ${xs[0]},${yV(dados[0].alertas)} ` +
    dados.slice(1).map((d, i) => `L ${xs[i+1]},${yV(d.alertas)}`).join(' ') +
    ` L ${xs[n-1]},${pad.top + gH} L ${xs[0]},${pad.top + gH} Z`;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ display: 'block' }}>
      {[10, 15, 20, 25].map(v => {
        const y = yV(v);
        if (y < pad.top - 2 || y > pad.top + gH + 2) return null;
        return (
          <g key={v}>
            <line x1={pad.left} y1={y} x2={W - pad.right} y2={y}
              stroke="var(--border)" strokeWidth="1" strokeDasharray="4 3"/>

              textAnchor="end" fontFamily="var(--font-mono)">{v}</text>
          </g>
        );
      })}

        <text key={i} x={xs[i]} y={H - 4} fill="var(--fg-muted)" fontSize="9.5"
          textAnchor="middle" fontFamily="var(--font-sans)">{d.mes}</text>

      ))}

  );
};

const GraficoBarras = ({ dados }) => {
  const W = 300, H = 130;
  const max = Math.max(...dados.map(d => d.n));
  const barW = 26;
  const step = (W - 10) / dados.length;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ display: 'block' }}>
      {dados.map((d, i) => {
        const x = 5 + i * step + (step - barW) / 2;
        const barH = (d.n / (max + 1)) * 95;
        const y = 100 - barH;
        const isMax = d.n === max;
        return (
          <g key={d.dia}>
            <rect x={x} y={y} width={barW} height={barH} rx="5"
              fill={isMax ? 'var(--brand-green)' : 'rgba(31,77,58,0.15)'}/>
            <text x={x + barW / 2} y={y - 5} fill={isMax ? 'var(--brand-green)' : 'var(--fg-muted)'}
              fontSize="9.5" fontWeight="700" textAnchor="middle" fontFamily="var(--font-mono)">{d.n}</text>
            <text x={x + barW / 2} y={118} fill="var(--fg-muted)" fontSize="9.5"
              textAnchor="middle" fontFamily="var(--font-sans)">{d.dia}</text>
          </g>
        );
      })}
    </svg>
  );
};

<script type="text/babel">
/* Sentinela PC — Cronologia de turno + Notificações push + Ocorrências */

/* ── Browser push notifications ── */
const useNotificacoesPush = () => {
  const [permissao, setPermissao] = React.useState(() => {
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  });

  const pedirPermissao = async () => {
    if (!('Notification' in window)) return;
    const result = await Notification.requestPermission();
    setPermissao(result);
  };

  const notificar = React.useCallback((titulo, opcoes = {}) => {
    if (Notification.permission !== 'granted') return;
    const n = new Notification(titulo, {
      icon: 'assets/sentinela-shield.svg',
      badge: 'assets/sentinela-shield.svg',
      ...opcoes,
    });
    setTimeout(() => n.close(), 6000);
  }, []);

  return { permissao, pedirPermissao, notificar };
};

/* Hook that fires a notification whenever a new critical alert arrives */
const useAlertasNotifier = (notificar) => {
  const alertas = window.SentinelaStore.useStore(s => s.alertas);
  const prevLen = React.useRef(alertas.length);
  React.useEffect(() => {
    if (alertas.length > prevLen.current) {
      const novo = alertas[0];
      if (novo && novo.severidade === 'critico') {
        notificar(`⚠ Alerta CRÍTICO — ${novo.matricula}`, {
          body: `${novo.motivo}\n${novo.local} · ${novo.indicativo}`,
          tag: novo.id,
        });
      } else if (novo) {
        notificar(`Alerta ANPR — ${novo.matricula}`, {
          body: `${novo.motivo} · ${novo.local}`,
          tag: novo.id,
        });
      }
    }
    prevLen.current = alertas.length;
  }, [alertas.length]);
};

const NotifBell = () => {
  const { permissao, pedirPermissao, notificar } = useNotificacoesPush();
  useAlertasNotifier(notificar);

  if (permissao === 'unsupported') return null;

  return (
    <button
      onClick={permissao === 'granted' ? undefined : pedirPermissao}
      title={permissao === 'granted' ? 'Notificações ativas' : 'Ativar notificações do browser'}
      style={{
        background: permissao === 'granted' ? 'rgba(54,128,68,0.12)' : 'var(--surface-2)',
        border: '1px solid ' + (permissao === 'granted' ? 'var(--success)' : 'var(--border)'),
        borderRadius: 6, padding: '6px 10px', cursor: permissao === 'granted' ? 'default' : 'pointer',
        display: 'flex', alignItems: 'center', gap: 6,
        fontSize: 11, fontWeight: 600,
        color: permissao === 'granted' ? 'var(--success)' : 'var(--fg-muted)',
      }}>
      <Icon name="bell" size={14}/>
      {permissao === 'granted' ? 'Notificações ativas' : permissao === 'denied' ? 'Bloqueado' : 'Ativar notificações'}
    </button>
  );
};

      {/* Filter bar */}
      <div style={{ padding: '12px 22px', borderBottom: '1px solid var(--border)', display: 'flex', gap: 6, flexWrap: 'wrap', background: 'var(--surface)', flexShrink: 0 }}>

          const meta = TIPO_META[t];
          return (
            <button key={t} onClick={() => setFiltro(t)} style={{
              background: filtro === t ? 'var(--brand-green)' : 'var(--surface-2)',
              color: filtro === t ? '#FFF' : 'var(--fg)',
              border: '1px solid ' + (filtro === t ? 'var(--brand-green)' : 'var(--border)'),
              borderRadius: 6, padding: '5px 12px', fontSize: 11, fontWeight: 600, cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 5,
            }}>

        })}
        <div style={{ flex: 1 }}/>
        <div style={{ fontSize: 11, color: 'var(--fg-muted)', alignSelf: 'center' }}>{visiveis.length} evento{visiveis.length !== 1 ? 's' : ''}</div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 22px' }}>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            {visiveis.map((ev, i) => {
              const meta = TIPO_META[ev.tipo] || { icon: 'info', label: ev.tipo, cor: 'var(--fg-muted)' };
              const isPanico = ev.tipo === 'panico_ativo';
              return (
                <div key={ev.id} style={{ display: 'flex', gap: 14, paddingBottom: 20, position: 'relative' }}>
                  {/* Icon dot */}
                  <div style={{
                    width: 40, height: 40, borderRadius: '50%', flexShrink: 0, zIndex: 1,
                    background: isPanico ? 'var(--danger)' : 'var(--surface)',
                    border: `2px solid ${meta.cor}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: isPanico ? '#FFF' : meta.cor,
                    boxShadow: isPanico ? '0 0 0 4px rgba(199,50,43,0.15)' : 'none',
                  }}>
                    <Icon name={meta.icon} size={16}/>
                  </div>

                  {/* Content */}
                  <div style={{
                    flex: 1, background: 'var(--surface)', border: '1px solid var(--border)',
                    borderLeft: `3px solid ${meta.cor}`,
                    borderRadius: 8, padding: '10px 14px', marginTop: 4,
                    background: isPanico ? 'rgba(199,50,43,0.04)' : 'var(--surface)',
                  }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 2 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: isPanico ? 'var(--danger)' : 'var(--fg)' }}>
                        {ev.descricao}
                      </div>
                      <span className="t-mono" style={{ fontSize: 10, color: 'var(--fg-muted)', marginLeft: 'auto' }}>{ev.hora}</span>
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--fg-muted)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{meta.label}</div>
                    {ev.dados?.matricula && (
                      <div style={{ marginTop: 6 }}><Plate value={ev.dados.matricula} size="sm"/></div>
                    )}
                    {ev.dados?.numero && (
                      <div style={{ marginTop: 4 }}><Badge tone="brand" size="sm">{ev.dados.numero}</Badge></div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
};

<script type="text/babel">
/* Sentinela PC — Gestão de férias anuais */

const FeriasView = () => {
  const { useStore, ordemAntiguidade } = window.SentinelaStore;
  const ferias = useStore(s => s.ferias);
  const militares = useStore(s => s.militares);

  const fila = ordemAntiguidade(militares);

  // Year 2026 Gantt helpers
  const YEAR_START = new Date('2026-01-01');
  const YEAR_DAYS = 365;
  const dayOffset = dateStr => Math.floor((new Date(dateStr) - YEAR_START) / 86400000);

  const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const MONTH_DAYS = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
  const monthPct = d => (d / YEAR_DAYS) * 100;

  const totalConcluidos = ferias.concluidos.length;
  const turnoAtualMilitar = militares.find(m => m.id === ferias.turnoMilitarId);
  const formatDate = d => { if (!d) return '—'; const [y, m, day] = d.split('-'); return `${day}/${m}/${y}`; };

  const totalDiasMarcados = ferias.periodos.reduce((s, p) => s + p.dias, 0);
  const totalDiasDisponiveis = militares.reduce((s, m) => s + (m.diasFerias || 0), 0);

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Sub-header KPIs */}
      <div style={{ padding: '12px 22px', background: 'var(--surface)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 20, flexShrink: 0 }}>
        {[
          { label: 'Concluídos', value: totalConcluidos, total: militares.length, color: 'var(--success)' },
          { label: 'Aguardam', value: militares.length - totalConcluidos, color: 'var(--fg-muted)' },
          { label: 'Períodos marcados', value: ferias.periodos.length, color: 'var(--brand-green)' },
          { label: 'Dias marcados', value: totalDiasMarcados, color: 'var(--info)' },
        ].map(k => (
          <div key={k.label} style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: k.color, fontFamily: 'var(--font-display)', lineHeight: 1 }}>
              {k.value}{k.total ? `/${k.total}` : ''}
            </div>
            <div style={{ fontSize: 10, color: 'var(--fg-muted)', marginTop: 2, fontWeight: 600, letterSpacing: '0.05em', textTransform: 'uppercase' }}>{k.label}</div>
          </div>
        ))}
        <div style={{ flex: 1 }}/>
        {turnoAtualMilitar ? (
          <div style={{ background: 'rgba(201,162,75,0.12)', border: '1px solid var(--brand-gold)', borderRadius: 8, padding: '7px 14px', display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--brand-gold)', boxShadow: '0 0 6px var(--brand-gold)', animation: 'pulse 1.5s ease-in-out infinite' }}/>
            <div>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--brand-gold)', letterSpacing: '0.06em' }}>A MARCAR AGORA</div>
              <div style={{ fontSize: 13, fontWeight: 600 }}>{turnoAtualMilitar.postoAbrev} {turnoAtualMilitar.nome}</div>
            </div>
          </div>
        ) : ferias.concluidos.length > 0 ? (
          <div style={{ background: 'rgba(54,128,68,0.10)', border: '1px solid var(--success)', borderRadius: 8, padding: '7px 14px', display: 'flex', alignItems: 'center', gap: 8, color: 'var(--success)' }}>
            <Icon name="check-circle" size={16}/>
            <div style={{ fontSize: 13, fontWeight: 600 }}>Toda a marcação concluída</div>
          </div>
        ) : null}
        <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: 22 }}>

        {/* Gantt chart */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden', marginBottom: 20 }}>
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 8 }}>
            <Icon name="calendar" size={16} style={{ color: 'var(--brand-green)' }}/>
            <div style={{ fontWeight: 600, fontSize: 13 }}>Distribuição anual de férias — {ferias.ano}</div>
            <div style={{ flex: 1 }}/>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 11 }}>
              <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style={{ width: 12, height: 8, background: 'var(--brand-green)', borderRadius: 2, display: 'inline-block' }}/> Confirmado
              </span>
              <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style={{ width: 12, height: 8, background: 'var(--brand-green)', borderRadius: 2, display: 'inline-block', opacity: 0.4 }}/> Em edição
              </span>
            </div>
          </div>

          {/* Month header row */}
          <div style={{ display: 'flex', borderBottom: '1px solid var(--border)', background: 'var(--surface-2)', height: 30 }}>
            <div style={{ width: 190, flexShrink: 0, borderRight: '1px solid var(--border)', display: 'flex', alignItems: 'center', padding: '0 14px' }}>
              <span style={{ fontSize: 10, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase' }}>Militar</span>
            </div>
            <div style={{ flex: 1, position: 'relative' }}>
              {MONTHS.map((m, i) => (
                <React.Fragment key={m}>
                  <div style={{ position: 'absolute', left: `${monthPct(MONTH_DAYS[i])}%`, top: 0, bottom: 0, width: 1, background: 'var(--border)' }}/>
                  <div style={{ position: 'absolute', left: `${monthPct(MONTH_DAYS[i])}%`, top: '50%', transform: 'translateY(-50%)', paddingLeft: 4, fontSize: 10, fontWeight: 600, color: 'var(--fg-muted)', pointerEvents: 'none', whiteSpace: 'nowrap' }}>{m}</div>
                </React.Fragment>
              ))}
            </div>
          </div>

          {/* Military rows */}
          {fila.map((m, i) => {
            const periodos = ferias.periodos.filter(p => p.militarId === m.id);
            const concluido = ferias.concluidos.includes(m.id);
            const ativo = ferias.turnoMilitarId === m.id;
            const diasUsados = periodos.reduce((s, p) => s + p.dias, 0);

            return (
              <div key={m.id} style={{
                display: 'flex', borderBottom: '1px solid var(--border)', minHeight: 34,
                background: ativo ? 'rgba(201,162,75,0.04)' : i % 2 === 0 ? 'transparent' : 'rgba(0,0,0,0.012)',
              }}>
                <div style={{ width: 190, flexShrink: 0, borderRight: '1px solid var(--border)', padding: '6px 14px', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span className="t-mono" style={{ fontSize: 10, color: 'var(--fg-muted)', width: 18 }}>{i + 1}.</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.postoAbrev} {m.nome}</div>
                    <div style={{ fontSize: 10, color: 'var(--fg-muted)' }}>{diasUsados}/{m.diasFerias}d</div>
                  </div>
                  {concluido
                    ? <Icon name="check-circle" size={12} style={{ color: 'var(--success)', flexShrink: 0 }}/>
                    : ativo
                    ? <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--brand-gold)', flexShrink: 0 }}/>
                    : null
                  }
                </div>
                <div style={{ flex: 1, position: 'relative' }}>
                  {/* Month grid lines */}
                  {MONTH_DAYS.map((d, j) => (
                    <div key={j} style={{ position: 'absolute', left: `${monthPct(d)}%`, top: 0, bottom: 0, width: 1, background: 'var(--border)', opacity: 0.4 }}/>
                  ))}
                  {/* Vacation bars */}
                  {periodos.map(p => {
                    const left = (dayOffset(p.inicio) / YEAR_DAYS) * 100;
                    const width = Math.max((p.dias / YEAR_DAYS) * 100, 0.3);
                    return (
                      <div key={p.id} title={`${formatDate(p.inicio)} – ${formatDate(p.fim)} (${p.dias} dias)`}
                        style={{
                          position: 'absolute', top: '18%', height: '64%',
                          left: `${left}%`, width: `${width}%`,
                          background: 'var(--brand-green)', borderRadius: 3,
                          opacity: concluido ? 0.85 : 0.45,
                          cursor: 'default',
                        }}
                      />
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Queue table */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 8 }}>
            <Icon name="users" size={16} style={{ color: 'var(--brand-green)' }}/>
            <div style={{ fontWeight: 600, fontSize: 13 }}>Ordem de antiguidade · Marcação de férias {ferias.ano}</div>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead>
                <tr style={{ background: 'var(--surface-2)' }}>
                  {['#','Militar','Posto','Ano ingresso','Estado','Períodos','Dias marcados','Dias disponíveis','Detalhes'].map(h => (
                    <th key={h} style={{ padding: '8px 14px', textAlign: 'left', fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid var(--border)', whiteSpace: 'nowrap' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {fila.map((m, i) => {
                  const periodos = ferias.periodos.filter(p => p.militarId === m.id);
                  const concluido = ferias.concluidos.includes(m.id);
                  const ativo = ferias.turnoMilitarId === m.id;
                  const diasUsados = periodos.reduce((s, p) => s + p.dias, 0);

                  return (
                    <tr key={m.id} style={{
                      borderBottom: '1px solid var(--border)',
                      background: ativo ? 'rgba(201,162,75,0.05)' : 'transparent',
                    }}>
                      <td className="t-mono" style={{ padding: '10px 14px', color: 'var(--fg-muted)', fontSize: 11 }}>{i + 1}</td>
                      <td style={{ padding: '10px 14px', fontWeight: 600 }}>{m.nome}</td>
                      <td style={{ padding: '10px 14px' }}>
                        <span style={{ background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 7px', fontSize: 11, fontWeight: 600 }}>{m.postoAbrev}</span>
                      </td>
                      <td className="t-mono" style={{ padding: '10px 14px', fontSize: 12 }}>{m.anoIngresso}</td>
                      <td style={{ padding: '10px 14px' }}>
                        {concluido
                          ? <Badge tone="success" size="sm">Concluído</Badge>
                          : ativo
                          ? <Badge tone="warning" size="sm">A marcar</Badge>
                          : <Badge tone="info" size="sm">Aguarda</Badge>
                        }
                      </td>
                      <td className="t-mono" style={{ padding: '10px 14px', fontSize: 12 }}>{periodos.length}/5</td>
                      <td className="t-mono" style={{ padding: '10px 14px', fontSize: 12, fontWeight: 600 }}>{diasUsados}</td>
                      <td style={{ padding: '10px 14px' }}>
                        <span className="t-mono" style={{ fontSize: 12, color: 'var(--brand-green)', fontWeight: 700 }}>{m.diasFerias}</span>
                      </td>
                      <td style={{ padding: '10px 14px', fontSize: 11, color: 'var(--fg-muted)' }}>
                        {periodos.map(p => `${formatDate(p.inicio)}–${formatDate(p.fim)}`).join(' · ') || '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
};

window.FeriasView = FeriasView;

</script>

/* Sentinela PC — Painel de Administração */

const POSTOS_CONFIG = [
  { posto: 'Sargento',   abrev: 'Sarg.'   },

  width: '100%', padding: '7px 10px',

const lblStyle = {
  fontSize: 10, fontWeight: 700, color: 'var(--fg-muted)',

  <button onClick={onClick} style={{

    cursor: 'pointer', fontSize: 13, display: 'flex', alignItems: 'center', gap: 6,

    <Icon name={saved ? 'check' : 'save'} size={15}/>
    {saved ? 'Guardado!' : label}

/* ---- Tab: Posto ---- */
const AdminPosto = () => {
  const { useStore, actions } = window.SentinelaStore;
  const posto = useStore(s => s.posto);
  const [form, setForm] = React.useState({ ...posto });
  const [saved, setSaved] = React.useState(false);
  React.useEffect(() => { setForm({ ...posto }); }, [JSON.stringify(posto)]);
  const guardar = () => { actions.updatePosto(form); setSaved(true); setTimeout(() => setSaved(false), 2500); };
  return (
    <div style={{ maxWidth: 520 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>

          { key: 'nome',         label: 'Nome do Posto' },

          { key: 'comando',      label: 'Comando Territorial' },
          { key: 'morada',       label: 'Morada' },
        ].map(({ key, label }) => (
          <div key={key}>
            <label style={lblStyle}>{label}</label>
            <input value={form[key] || ''} onChange={e => setForm(f => ({ ...f, [key]: e.target.value }))} style={fldStyle}/>
          </div>
        ))}
        <div style={{ paddingTop: 4 }}>
          <SaveBtn saved={saved} onClick={guardar}/>
        </div>
      </div>
    </div>
  );
};

  const { useStore, actions } = window.SentinelaStore;

  const [modal, setModal] = React.useState(null);
  const empty = { nim: '', posto: 'Guarda', postoAbrev: 'Gd.', nome: '', nomeCompleto: '', secao: 'Patrulha', estado: 'servico', indicativo: '—', anoIngresso: 2024, diasFerias: 22 };

/* ---- Tab: Sistema ---- */
const AdminSistema = () => {
  const { useStore, actions, getState } = window.SentinelaStore;
  const tema = useStore(s => s.tema);
  const [resetConf, setResetConf] = React.useState(false);

  const exportarJSON = () => {
    const data = JSON.stringify(getState(), null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sentinela-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ maxWidth: 540 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>

        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 16 }}>

                flex: 1, padding: '10px 14px',
                border: `1px solid ${tema === t ? 'var(--brand-green)' : 'var(--border)'}`,
                borderRadius: 8, cursor: 'pointer',
                background: tema === t ? 'rgba(31,77,58,0.08)' : 'var(--bg)',
                color: tema === t ? 'var(--brand-green)' : 'var(--fg)',
                fontWeight: tema === t ? 700 : 500, fontSize: 13,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              }}>
                <Icon name={icon} size={16}/> {label}
              </button>
            ))}
          </div>
        </div>

        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 16 }}>
          <div className="t-overline" style={{ marginBottom: 12 }}>DADOS E BACKUP</div>
          <button onClick={exportarJSON} style={{
            background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 8,
            padding: '10px 14px', cursor: 'pointer', fontWeight: 600, fontSize: 13,
            display: 'flex', alignItems: 'center', gap: 8, width: '100%',
          }}>
            <Icon name="download" size={16} style={{ color: 'var(--brand-green)' }}/>
            Exportar dados para JSON (backup completo)
          </button>
        </div>

        <div style={{ background: 'var(--surface)', border: '1px solid rgba(199,50,43,0.3)', borderRadius: 10, padding: 16 }}>
          <div className="t-overline" style={{ marginBottom: 12, color: 'var(--danger)' }}>ZONA DE PERIGO</div>
          {!resetConf ? (
            <button onClick={() => setResetConf(true)} style={{
              background: 'transparent', border: '1px solid var(--danger)', borderRadius: 8,
              padding: '9px 14px', cursor: 'pointer', fontWeight: 600, fontSize: 13,
              color: 'var(--danger)', display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <Icon name="trash-2" size={15}/> Repor dados de demonstração
            </button>
          ) : (
            <div>
              <p style={{ fontSize: 12, color: 'var(--fg-muted)', margin: '0 0 12px' }}>
                Tens a certeza? Todos os dados actuais serão apagados e substituídos pelos dados de demonstração. Esta acção não pode ser desfeita.
              </p>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={() => { actions.reset(); setResetConf(false); }} style={{ background: 'var(--danger)', color: '#FFF', border: 'none', borderRadius: 7, padding: '8px 16px', cursor: 'pointer', fontWeight: 700, fontSize: 13 }}>

            </div>

  );
};

const NewPatrulhasTable = () => {
  const { useStore } = window.SentinelaStore;
  const patrulhas = useStore(s => s.patrulhasHistorico.filter(p => !p.fechadaEm));
  const viaturas = useStore(s => s.viaturas);
  const militares = useStore(s => s.militares);
  // fallback to demo rows if nothing in store
  const rows = patrulhas.length ? patrulhas.slice(0, 4) : [];

  const fmt = (p) => {
    const v = viaturas.find(x => x.id === p.viaturaId);
    const milNomes = (p.militares || []).map(id => {
      const m = militares.find(x => x.id === id);
      return m ? `${m.postoAbrev} ${m.nome.split(' ')[0]}` : '';
    }).filter(Boolean).join(', ');
    return {
      viatura: v ? v.matricula : '—',
      indicativo: p.indicativo || '—',
      militares: milNomes || '—',
      inicio: p.iniciadaEm ? new Date(p.iniciadaEm).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }) : '—',
      sector: p.sector || '—',
    };
  };

  const fallback = [
    { viatura: 'GNR-LX-4421', indicativo: 'PATRULHA BRAVO 1',  militares: 'Sgt. Oliveira, Cb. Silva',  inicio: '08:00', sector: 'Sintra - Centro' },
    { viatura: 'GNR-LX-4422', indicativo: 'PATRULHA CHARLIE 3', militares: 'Cb. Santos, Gd. Costa',     inicio: '09:30', sector: 'Sintra - Norte' },
  ];

  const data = rows.length ? rows.map(fmt) : fallback;

  return (
    <div style={{
      background: 'var(--surface)', border: '1px solid var(--border)',
      borderRadius: 8, boxShadow: 'var(--shadow-sm)',
      display: 'flex', flexDirection: 'column',
    }}>
      <div style={{ padding: 12, borderBottom: '1px solid var(--border)', background: 'var(--surface-2)', borderRadius: '8px 8px 0 0' }}>
        <h2 style={{ fontSize: 12, fontWeight: 600, letterSpacing: '0.05em', color: 'var(--brand-green)', margin: 0, textTransform: 'uppercase' }}>Patrulhas em Curso</h2>
      </div>
      <div style={{ padding: 12, flex: 1, overflowX: 'auto' }}>
        <table style={{ width: '100%', textAlign: 'left', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ borderBottom: '1px solid var(--border)' }}>
              {['Viatura', 'Indicativo', 'Militares', 'Início', 'Setor', 'Estado'].map((h, i) => (
                <th key={h} style={{
                  paddingBottom: 4, fontSize: 11, fontWeight: 700, letterSpacing: '0.08em',
                  color: 'var(--fg-muted)', textTransform: 'uppercase',
                  textAlign: i === 5 ? 'right' : 'left',
                }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {data.map((r, i) => (
              <tr key={i} style={{ borderBottom: i === data.length - 1 ? 'none' : '1px solid var(--surface-3)', fontSize: 14 }}>
                <td style={{ padding: '12px 0' }}>{r.viatura}</td>
                <td style={{ padding: '12px 0', fontSize: 12, fontWeight: 600, color: 'var(--brand-green)', letterSpacing: '0.05em' }}>{r.indicativo}</td>
                <td style={{ padding: '12px 0', color: 'var(--fg-muted)' }}>{r.militares}</td>
                <td style={{ padding: '12px 0' }}>{r.inicio}</td>
                <td style={{ padding: '12px 0' }}>{r.sector}</td>
                <td style={{ padding: '12px 0', textAlign: 'right' }}>
                  <span style={{
                    display: 'inline-flex', alignItems: 'center',
                    padding: '4px 8px', borderRadius: 4,
                    border: '1px solid var(--brand-gold-deep)', background: 'var(--brand-gold-soft)',
                    color: 'var(--brand-gold-deep)', fontSize: 10, fontWeight: 700, letterSpacing: '0.08em',
                  }}>EM SERVIÇO</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const NewAlertasFeed = () => {
  const { useStore } = window.SentinelaStore;
  const alertas = useStore(s => s.alertas);
  const list = alertas.length ? alertas.slice(0, 3) : [
    { id: 'a1', matricula: '22-AA-33', motivo: 'ROUBADO', severidade: 'critico', hora: '14:10', local: 'N249, Km 4' },
    { id: 'a2', matricula: '88-ZZ-00', motivo: 'SEM SEGURO', severidade: 'aviso', hora: '13:45', local: 'A16, Saída 7' },
    { id: 'a3', matricula: '45-RT-12', motivo: 'APREENDIDA', severidade: 'aviso', hora: '12:30', local: 'IC19, Cacém' },
  ];

  const toneColor = (sev) => {
    if (sev === 'critico') return { border: 'var(--danger)', bg: 'var(--surface)', tag: { bg: 'var(--danger)', fg: '#FFF' } };
    if (sev === 'aviso')   return { border: 'var(--border)', bg: 'var(--surface)', tag: { bg: 'var(--warning-soft)', fg: 'var(--warning-deep)', border: 'var(--warning)' } };
    return { border: 'var(--border)', bg: 'var(--surface)', tag: { bg: 'var(--info-soft)', fg: 'var(--info-deep)', border: 'var(--info)' } };
  };

  return (
    <div style={{

      display: 'flex', flexDirection: 'column',

      </div>
      <div style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
        {list.map(a => {
          const tc = toneColor(a.severidade);
          return (
            <div key={a.id} style={{
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              padding: 12, border: `1px solid ${tc.border}`, background: tc.bg, borderRadius: 4,
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <Icon name="car" size={20} style={{ color: a.severidade === 'critico' ? 'var(--danger)' : 'var(--brand-green-soft)' }}/>
                <div>
                  <div style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, color: 'var(--fg)' }}>{a.matricula}</div>
                  <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>{a.hora} • {a.local}</div>
                </div>

                        As patrulhas devem priorizar a visibilidade preventiva, o controlo rodoviário e o apoio a turistas. O regime de empenhamento será de 24h, com reforço nos períodos críticos (09h00-11h00 e 17h00-20h00).

                        <Icon name="file-text" size={48} style={{ marginBottom: 12, color: 'var(--border-strong)' }}/>

      </main>

  );
};

</script>
<script type="text/babel">
const { useState, useEffect } = React;

// Aplica o tema ao <html> e mantém em sync
const useTheme = () => {
  const tema = window.SentinelaStore.useStore(s => s.tema);
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tema === 'noturno' ? 'dark' : 'light');
  }, [tema]);
  return tema;
};

const ThemeToggle = () => {
  const tema = window.SentinelaStore.useStore(s => s.tema);
  return (
    <button
      onClick={() => window.SentinelaStore.actions.setTema(tema === 'noturno' ? 'claro' : 'noturno')}
      title={tema === 'noturno' ? 'Modo dia' : 'Modo ronda noturna'}
      style={{
        background: tema === 'noturno' ? 'rgba(201,162,75,0.18)' : 'var(--surface-2)',
        border: '1px solid var(--border)', borderRadius: 6,
        padding: '6px 10px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6,
        fontSize: 11, fontWeight: 600, color: 'var(--fg)',
      }}>
      <Icon name={tema === 'noturno' ? 'moon' : 'sun'} size={14}/>
      {tema === 'noturno' ? 'Ronda noturna' : 'Dia'}
    </button>
  );
};

const titles = {
  dashboard: ['Dashboard', 'Visão geral · Posto Territorial Vila Real'],
  briefing:  ['Briefing diário', 'Preparação do serviço de hoje'],
  mapa:      ['Mapa em tempo real', 'Posições GPS · viaturas e patrulhas'],
  alertas:   ['Alertas ANPR', 'Leituras de matrículas e correspondências BNDV'],
  patrulhas: ['Patrulhas', 'Histórico e patrulhas em curso'],
  viaturas:  ['Viaturas', 'Frota do Posto Territorial Vila Real'],
  militares: ['Militares', 'Efetivo do posto'],
  ordens:    ['Ordens de serviço', 'Difusão de OS para o efetivo'],
  escalas:   ['Escalas', 'Planeamento semanal · turnos'],
  chat:         ['Mensagens', 'Comunicações operacionais'],
  estatisticas: ['Estatísticas', 'KPIs e indicadores de desempenho operacional — maio 2026'],
  cronologia:   ['Cronologia de turno', 'Linha temporal de todos os eventos registados'],
  ocorrencias:  ['Ocorrências', 'Registos submetidos no terreno pelo efetivo'],
  ferias:       ['Férias', 'Marcação anual por ordem de antiguidade — 2026'],
  admin:        ['Administração', 'Configuração do posto, efectivo, viaturas e sistema'],
};

// Stitch redesign screens — render standalone (own chrome).
const REDESIGN_SCREENS = {
  loginPc:        { component: () => window.LoginPCScreen        && <LoginPCScreen/>,        label: 'Login (PC)' },
  dashboardPc:    { component: () => window.DashboardPCScreen    && <DashboardPCScreen/>,    label: 'Dashboard (novo)' },
  commsPc:        { component: () => window.CommsPCScreen        && <CommsPCScreen/>,        label: 'Comunicações (novo)' },
  wikiPc:         { component: () => window.WikiPCScreen         && <WikiPCScreen/>,         label: 'Wiki / Lista (novo)' },
  scannerPc:      { component: () => window.ScannerPCScreen      && <ScannerPCScreen/>,      label: 'Scanner ALPR (novo)' },
  escalasPc:      { component: () => window.EscalasPCScreen      && <EscalasPCScreen/>,      label: 'Escalas (novo)' },
  ordensServicoPc:{ component: () => window.OrdensServicoPCScreen&& <OrdensServicoPCScreen/>,label: 'Ordens de Serviço (novo)' },
};

// Mini bar to switch between the redesign screens (only visible when one is active).
const RedesignSwitcher = ({ active, setActive }) => {
  const keys = Object.keys(REDESIGN_SCREENS);
  return (
    <div style={{
      position: 'fixed', bottom: 12, left: '50%', transform: 'translateX(-50%)',
      background: 'rgba(0,10,30,0.92)', color: '#FFF',
      padding: '6px 8px', borderRadius: 999, zIndex: 9999,
      display: 'flex', gap: 4, alignItems: 'center',
      boxShadow: '0 8px 24px rgba(0,0,0,0.35)',
      fontFamily: 'var(--font-ui)', fontSize: 11,
    }}>
      <button onClick={() => setActive('dashboard')} style={{
        background: 'transparent', border: 'none', color: '#FFF', cursor: 'pointer',
        padding: '4px 10px', fontSize: 11, fontWeight: 600, opacity: 0.7,
      }}>← original</button>
      <span style={{ width: 1, height: 16, background: 'rgba(255,255,255,0.2)' }}/>
      {keys.map(k => (
        <button key={k} onClick={() => setActive(k)} style={{
          background: active === k ? 'rgba(255,255,255,0.16)' : 'transparent',
          border: 'none', color: '#FFF', cursor: 'pointer',
          padding: '4px 10px', borderRadius: 999, fontSize: 11, fontWeight: 600,
        }}>{REDESIGN_SCREENS[k].label}</button>
      ))}
    </div>
  );
};

const PCApp = () => {
  useTheme();
  // Default opens the new dashboard ('dashboardPc') so the redesign is the front door.
  // Use the bottom switcher to compare with the original UI ('dashboard').
  const [active, setActive] = useState('dashboardPc');
  const isRedesign = !!REDESIGN_SCREENS[active];

  // Expose to redesign screens' internal sidebars so they can navigate.
  React.useEffect(() => { window.__setRedesignScreen = setActive; }, []);

  // Redesign screens render standalone (own sidebar/topbar) on the full root.
  if (isRedesign) {
    const C = REDESIGN_SCREENS[active].component;
    return (
      <>
        {C()}
        <RedesignSwitcher active={active} setActive={setActive}/>
      </>
    );
  }

  const [t, sub] = titles[active] || titles.dashboard;
  return (
    <>
      <PCSidebar active={active} setActive={setActive}/>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <PCTopbar title={t} subtitle={sub} extra={<ThemeToggle/>}/>
        {active === 'dashboard' && <DashboardView/>}
        {active === 'briefing' && <BriefingView/>}
        {active === 'mapa' && <MapaView/>}
        {active === 'alertas' && <AlertasView/>}
        {active === 'patrulhas' && <PatrulhasView/>}
        {active === 'viaturas' && <ViaturasView/>}
        {active === 'militares' && <MilitaresView/>}
        {active === 'ordens' && <OSView/>}
        {active === 'escalas' && <EscalasView/>}
        {active === 'chat' && <ChatView/>}
        {active === 'estatisticas' && <EstatisticasView/>}
        {active === 'cronologia'   && <CronologiaView/>}
        {active === 'ocorrencias'  && <OcorrenciasView/>}
        {active === 'ferias'       && <FeriasView/>}
        {active === 'admin'        && <AdminView/>}
      </div>
      <RedesignSwitcher active={active} setActive={setActive}/>
    </>
  );
};

</script>
<script type="text/babel">

const { useState, useEffect } = React;

/* ── Apply theme globally ── */
const useGlobalTheme = () => {
  const tema = window.SentinelaStore.useStore(s => s.tema);
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tema === 'noturno' ? 'dark' : 'light');
  }, [tema]);
};

/* ── Mobile wrapper ── */
const MobileView = ({ onBack }) => {
  const me = window.SentinelaStore.useStore(s => s.militarLogadoId);
  const tema = window.SentinelaStore.useStore(s => s.tema);
  useEffect(() => {
    const el = document.getElementById('statusTime');
    if (!el) return;
    const tick = () => { el.textContent = new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }); };
    tick(); const id = setInterval(tick, 30000); return () => clearInterval(id);
  }, []);

  return (
    <div style={{ width: '100vw', height: '100vh', background: 'var(--bg)', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Topbar — desktop only */}
      <div className="hub-topbar">
        <button onClick={onBack} className="hub-back-btn">
          <Icon name="arrow-left" size={14}/> Hub
        </button>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, opacity: 0.6 }}>Sentinela · App do Militar</span>
        <div style={{ flex: 1 }}/>
        <button onClick={() => { window.SentinelaStore.actions.reset(); }} title="Reset demo" style={{ background: 'transparent', border: 'none', color: 'inherit', cursor: 'pointer', opacity: 0.5, fontSize: 11 }}>↻ reset</button>
      </div>

      {/* Phone frame on desktop, fullscreen on mobile */}
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div className="phone-outer">
          <div className="phone-notch-el"></div>
          <div className="phone-screen-el">
            <div className="phone-statusbar-el">
              <span id="statusTime">14:32</span>
              <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span id="statusInd">GNR</span>
                <span>●●●●</span><span>4G</span><span>87%</span>
              </span>
            </div>
            <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
              <MobileShellV2/>
            </div>
          </div>
          <div className="phone-home-el"></div>
        </div>
      </div>
    </div>
  );
};

/* ── PC wrapper ── */
const PCView = ({ onBack }) => (
  <div style={{ width: '100vw', height: '100vh', display: 'flex', position: 'relative', overflow: 'hidden' }}>
    <PCApp/>
    <button onClick={onBack} title="Voltar ao hub"
      style={{ position: 'fixed', bottom: 20, right: 20, zIndex: 9999,
        background: 'var(--brand-green-deep)', color: '#C9A24B', border: 'none',
        borderRadius: 999, padding: '8px 16px', fontWeight: 700, fontSize: 12,
        cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6,
        boxShadow: '0 4px 16px rgba(0,0,0,0.3)',
      }}>
      <Icon name="arrow-left" size={13}/> Hub
    </button>
  </div>
);

/* ── Launcher ── */
const Launcher = ({ onSelect }) => {
  const patrulhas = window.SentinelaStore.useStore(s => s.patrulhasHistorico.length + (s.patrulhaAtual ? 1 : 0));
  const alertas   = window.SentinelaStore.useStore(s => s.alertas.filter(a => !a.confirmado).length);
  const tema      = window.SentinelaStore.useStore(s => s.tema);

  const scenario = (kind) => {
    const s = window.SentinelaStore;
    if (kind === 'alerta-critico') s.actions.addAlerta({ matricula: '12-AB-34', motivo: 'Viatura furtada', severidade: 'critico', origem: 'BNDV — Aveiro 2024-08-14', local: 'Av. Carvalho Araújo', militar: 'Cb. Silva', indicativo: 'VRL-21' });
    else if (kind === 'alerta-aviso') s.actions.addAlerta({ matricula: '57-DT-91', motivo: 'Sem seguro válido', severidade: 'aviso', origem: 'ASF — desde 2026-01-12', local: 'EN2, km 14', militar: 'Cb. Silva', indicativo: 'VRL-21' });
    else if (kind === 'os-nova') s.actions.enviarOS({ titulo: 'OS 046/2026 — Reforço fim de semana', autor: 'Sarg. Costa Ribeiro', paginas: 2 });
    else if (kind === 'panico') s.actions.activarPanico(null);
    else if (kind === 'tema') s.actions.setTema(s.getState().tema === 'noturno' ? 'claro' : 'noturno');
    else if (kind === 'reset') { s.actions.reset(); }
  };

  return (
    <div style={{ minHeight: '100vh', background: 'var(--bg)', overflowY: 'auto' }}>
      <div style={{ maxWidth: 900, margin: '0 auto', padding: '40px 24px 60px' }}>

        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 40 }}>
          <img src="assets/sentinela-shield.svg" style={{ height: 52 }} alt=""/>
          <div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 700, letterSpacing: '-0.02em' }}>SENTINELA</div>
            <div style={{ fontSize: 12, color: 'var(--brand-gold)', fontWeight: 600, letterSpacing: '0.12em' }}>PLATAFORMA OPERACIONAL · GNR</div>
          </div>
          <div style={{ flex: 1 }}/>
          <button onClick={() => scenario('tema')} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '7px 12px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 600, color: 'var(--fg)' }}>
            <Icon name={tema === 'noturno' ? 'sun' : 'moon'} size={14}/>
            {tema === 'noturno' ? 'Modo dia' : 'Ronda noturna'}
          </button>
        </div>

        {/* Main cards */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 20, marginBottom: 28 }}>

          <button onClick={() => onSelect('mobile')} style={{
            background: 'var(--brand-green)', color: '#FFF', border: 'none',
            borderRadius: 16, padding: 28, textAlign: 'left', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', gap: 14,
            boxShadow: '0 8px 32px rgba(15,42,32,0.18)',
            transition: 'transform 120ms, box-shadow 120ms',
          }}
            onMouseEnter={e => { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 12px 40px rgba(15,42,32,0.26)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow='0 8px 32px rgba(15,42,32,0.18)'; }}>
            <div style={{ width: 52, height: 52, background: 'rgba(255,255,255,0.15)', borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="shield" size={28}/>
            </div>
            <div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 700, marginBottom: 6 }}>App do Militar</div>
              <div style={{ fontSize: 13, opacity: 0.85, lineHeight: 1.5 }}>Login, abertura de patrulha, scanner ANPR, pânico, auto de notícia, chat e ordens de serviço.</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 600, color: '#C9A24B', marginTop: 'auto' }}>
              Abrir <Icon name="arrow-right" size={14}/>
            </div>
          </button>

          <button onClick={() => onSelect('pc')} style={{
            background: 'var(--surface)', color: 'var(--fg)',
            border: '1px solid var(--border)', borderRadius: 16, padding: 28, textAlign: 'left', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', gap: 14,
            boxShadow: 'var(--shadow-md)',
            transition: 'transform 120ms, box-shadow 120ms, border-color 120ms',
          }}
            onMouseEnter={e => { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.borderColor='var(--brand-green)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform=''; e.currentTarget.style.borderColor='var(--border)'; }}>
            <div style={{ width: 52, height: 52, background: 'var(--brand-green-deep)', color: '#C9A24B', borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="activity" size={28}/>
            </div>
            <div>
              <div style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 700, marginBottom: 6 }}>Comando do Posto</div>
              <div style={{ fontSize: 13, color: 'var(--fg-muted)', lineHeight: 1.5 }}>Dashboard, alertas ANPR em tempo real, mapa de viaturas, ordens de serviço, escalas e briefing.</div>
            </div>
            {alertas > 0 && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: 'var(--danger-soft)', color: 'var(--danger)', borderRadius: 8, padding: '6px 10px', fontSize: 12, fontWeight: 600, width: 'fit-content' }}>
                <Icon name="alert-octagon" size={14}/> {alertas} alerta{alertas > 1 ? 's' : ''} por confirmar
              </div>
            )}
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 600, color: 'var(--brand-green)', marginTop: 'auto' }}>
              Abrir <Icon name="arrow-right" size={14}/>
            </div>
          </button>
        </div>

        {/* Scenario bar */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 14, padding: '18px 20px' }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: 'var(--fg-muted)', marginBottom: 12 }}>
            Cenários demo — clica para simular eventos em tempo real
          </div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {[
              ['alerta-critico', 'alert-octagon', 'Alerta crítico (furto)', 'var(--danger)'],
              ['alerta-aviso',   'alert-triangle','Aviso (sem seguro)',    'var(--warning)'],
              ['os-nova',        'file-text',     'Nova OS',               'var(--info)'],
              ['panico',         'siren',         'Ativar pânico',         'var(--danger)'],
            ].map(([k, icon, label, color]) => (
              <button key={k} onClick={() => scenario(k)} style={{
                background: 'var(--surface-2)', border: '1px solid var(--border)',
                borderRadius: 8, padding: '7px 12px', cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, fontWeight: 600, color: 'var(--fg)',
              }}>
                <Icon name={icon} size={14} style={{ color }}/>
                {label}
              </button>
            ))}
            <button onClick={() => scenario('reset')} style={{
              marginLeft: 'auto', background: 'transparent', border: '1px solid var(--danger-soft)',
              borderRadius: 8, padding: '7px 12px', cursor: 'pointer', fontSize: 12, fontWeight: 600, color: 'var(--danger)',
            }}>↻ Reset demo</button>
          </div>
        </div>

        <p style={{ textAlign: 'center', fontSize: 11, color: 'var(--fg-soft)', marginTop: 32 }}>
          Posto Territorial de Vila Real · Protótipo de demonstração · Dados fictícios
        </p>
      </div>
    </div>
  );
};

/* ── Root ── */
const AppShell = () => {
  const [view, setView] = React.useState('launcher');
  useGlobalTheme();
  if (view === 'mobile') return <MobileView onBack={() => setView('launcher')}/>;
  if (view === 'pc')     return <PCView     onBack={() => setView('launcher')}/>;
  return <Launcher onSelect={setView}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<AppShell/>);

</script>
