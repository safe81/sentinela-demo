/* ==========================================================================
   Sentinela Design System — Tokens
   Cores institucionais (verde GNR-inspired) + tipografia + spacing + etc.
   ========================================================================== */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* ─── BRAND ──────────────────────────────────────────────────────────── */
  --brand-green:        #1F4D3A;   /* Verde Sentinela (primário) */
  --brand-green-hover:  #1A4231;
  --brand-green-deep:   #0F2A20;   /* Verde profundo (headers, sidebars) */
  --brand-green-soft:   #2D6B52;   /* Verde médio (chips ativos) */
  --brand-gold:         #C9A24B;   /* Dourado institucional */
  --brand-gold-soft:    #E8D9A8;
  --brand-gold-deep:    #8C6F2C;

  /* ─── SEMANTIC ───────────────────────────────────────────────────────── */
  --danger:        #C7322B;        /* Vermelho operacional — furto, mandado */
  --danger-soft:   #FBE8E6;
  --danger-deep:   #8E1F1A;
  --warning:       #D88A2A;        /* Âmbar — sem seguro, inspeção caducada */
  --warning-soft:  #FCEFD9;
  --warning-deep:  #9C5C12;
  --info:          #2E5C8A;        /* Azul informativo */
  --info-soft:     #E1ECF6;
  --info-deep:     #1B3D5E;
  --success:       #2F7D4A;        /* Verde positivo (separado do verde marca) */
  --success-soft:  #E1F1E5;

  /* ─── NEUTRAL SCALE (slate, levemente azulada) ───────────────────────── */
  --slate-50:  #F7F8F7;
  --slate-100: #EFF1EF;
  --slate-200: #E2E5E2;
  --slate-300: #C9CDC9;
  --slate-400: #9BA29B;
  --slate-500: #6E756E;
  --slate-600: #4D544D;
  --slate-700: #353A35;
  --slate-800: #20251F;
  --slate-900: #131814;

  /* ─── SURFACES — modo claro (default) ────────────────────────────────── */
  --bg:           #F4F2EC;          /* Off-white quente */
  --surface:      #FFFFFF;
  --surface-2:    #F7F8F7;          /* Cards num bg */
  --surface-3:    #EFF1EF;          /* Hover de surface-2 */
  --surface-inv:  var(--brand-green-deep);

  --fg:           var(--slate-900);
  --fg-muted:     var(--slate-600);
  --fg-soft:      var(--slate-500);
  --fg-on-brand:  #FFFFFF;
  --fg-on-gold:   #1A1208;

  --border:       #E2E5E2;
  --border-strong:#C9CDC9;
  --border-on-brand: rgba(255,255,255,0.16);

  --focus-ring:   var(--brand-gold);

  /* ─── SHADOWS ────────────────────────────────────────────────────────── */
  --shadow-sm: 0 1px 2px rgba(15,42,32,0.06);
  --shadow-md: 0 4px 12px rgba(15,42,32,0.08), 0 1px 2px rgba(15,42,32,0.04);
  --shadow-lg: 0 12px 32px rgba(15,42,32,0.12);
  --shadow-glow-danger: 0 0 0 3px rgba(199,50,43,0.18);
  --shadow-glow-warning: 0 0 0 3px rgba(216,138,42,0.20);

  /* ─── RADII ──────────────────────────────────────────────────────────── */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 999px;

  /* ─── SPACING (4px scale) ────────────────────────────────────────────── */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;

  /* ─── MOTION ─────────────────────────────────────────────────────────── */
  --motion-fast:    120ms;
  --motion-base:    200ms;
  --motion-modal:   320ms;
  --ease-out:       cubic-bezier(0.2, 0, 0, 1);
  --ease-in:        cubic-bezier(0.4, 0, 1, 1);
  --ease-in-out:    cubic-bezier(0.4, 0, 0.2, 1);

  /* ─── TYPOGRAPHY ─────────────────────────────────────────────────────── */
  --font-display: 'Inter Tight', 'Inter', system-ui, -apple-system, sans-serif;
  --font-ui:      'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* Type scale */
  --t-display-size:   40px;
  --t-display-line:   48px;
  --t-display-weight: 700;
  --t-display-tracking: -0.02em;

  --t-h1-size:   32px;
  --t-h1-line:   40px;
  --t-h1-weight: 600;
  --t-h1-tracking: -0.015em;

  --t-h2-size:   22px;
  --t-h2-line:   28px;
  --t-h2-weight: 600;
  --t-h2-tracking: -0.01em;

  --t-h3-size:   17px;
  --t-h3-line:   24px;
  --t-h3-weight: 600;
  --t-h3-tracking: -0.005em;

  --t-body-size:   15px;
  --t-body-line:   22px;
  --t-body-weight: 400;

  --t-body-sm-size:   13px;
  --t-body-sm-line:   18px;

  --t-caption-size:   12px;
  --t-caption-line:   16px;
  --t-caption-weight: 500;
  --t-caption-tracking: 0.02em;

  --t-overline-size:   11px;
  --t-overline-line:   14px;
  --t-overline-weight: 600;
  --t-overline-tracking: 0.08em;

  --t-mono-size:   14px;
  --t-mono-line:   20px;
}

/* ═══ DARK MODE ═══════════════════════════════════════════════════════════ */
[data-theme="dark"] {
  --bg:           #0E1A14;          /* Verde-noite */
  --surface:      #14241C;
  --surface-2:    #1A2D24;
  --surface-3:    #22382D;
  --surface-inv:  #F4F2EC;

  --fg:           #ECEEEC;
  --fg-muted:     #A8B0AA;
  --fg-soft:      #7A847E;
  --fg-on-brand:  #FFFFFF;

  --border:       #243A2F;
  --border-strong:#34503F;
  --border-on-brand: rgba(255,255,255,0.10);

  --brand-green-hover: #2A6048;

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.32);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.40), 0 1px 2px rgba(0,0,0,0.24);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.50);

  --danger-soft:  #3A1815;
  --warning-soft: #3A2812;
  --info-soft:    #15263A;
  --success-soft: #142A1C;
}

/* ═══ BASE ═══════════════════════════════════════════════════════════════ */
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-ui);
  font-size: var(--t-body-size);
  line-height: var(--t-body-line);
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ═══ TYPE UTILITIES ═════════════════════════════════════════════════════ */
.t-display { font-family: var(--font-display); font-size: var(--t-display-size); line-height: var(--t-display-line); font-weight: var(--t-display-weight); letter-spacing: var(--t-display-tracking); }
.t-h1      { font-family: var(--font-display); font-size: var(--t-h1-size); line-height: var(--t-h1-line); font-weight: var(--t-h1-weight); letter-spacing: var(--t-h1-tracking); }
.t-h2      { font-family: var(--font-display); font-size: var(--t-h2-size); line-height: var(--t-h2-line); font-weight: var(--t-h2-weight); letter-spacing: var(--t-h2-tracking); }
.t-h3      { font-family: var(--font-ui); font-size: var(--t-h3-size); line-height: var(--t-h3-line); font-weight: var(--t-h3-weight); letter-spacing: var(--t-h3-tracking); }
.t-body    { font-family: var(--font-ui); font-size: var(--t-body-size); line-height: var(--t-body-line); font-weight: var(--t-body-weight); }
.t-body-sm { font-family: var(--font-ui); font-size: var(--t-body-sm-size); line-height: var(--t-body-sm-line); font-weight: 400; }
.t-caption { font-family: var(--font-ui); font-size: var(--t-caption-size); line-height: var(--t-caption-line); font-weight: var(--t-caption-weight); letter-spacing: var(--t-caption-tracking); color: var(--fg-muted); }
.t-overline{ font-family: var(--font-ui); font-size: var(--t-overline-size); line-height: var(--t-overline-line); font-weight: var(--t-overline-weight); letter-spacing: var(--t-overline-tracking); text-transform: uppercase; color: var(--fg-muted); }
.t-mono    { font-family: var(--font-mono); font-size: var(--t-mono-size); line-height: var(--t-mono-line); font-weight: 500; font-variant-numeric: tabular-nums; }

h1 { font-family: var(--font-display); font-size: var(--t-h1-size); line-height: var(--t-h1-line); font-weight: var(--t-h1-weight); letter-spacing: var(--t-h1-tracking); margin: 0; }
h2 { font-family: var(--font-display); font-size: var(--t-h2-size); line-height: var(--t-h2-line); font-weight: var(--t-h2-weight); letter-spacing: var(--t-h2-tracking); margin: 0; }
h3 { font-family: var(--font-ui); font-size: var(--t-h3-size); line-height: var(--t-h3-line); font-weight: var(--t-h3-weight); margin: 0; }
p  { margin: 0; }

/* tabular numbers everywhere by default for operational data */
.tabular { font-variant-numeric: tabular-nums; }

/* ═══ FOCUS ═══════════════════════════════════════════════════════════════ */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* ═══ SCROLLBAR (subtle) ════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--slate-400); }


/* Form inputs */
.form-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  font-size: 13px;
  font-family: var(--font-ui);
  color: var(--fg);
  outline: none;
  box-sizing: border-box;
}
.form-input:focus {
  border-color: var(--brand-green);
  box-shadow: 0 0 0 3px rgba(31,77,58,0.10);
}
.form-input.mono {
  font-family: var(--font-mono);
  letter-spacing: 0.04em;
  font-weight: 600;
}
textarea.form-input {
  resize: vertical;
  font-family: var(--font-ui);
}


/* ── Single-file app shell ── */
html, body { height: 100%; margin: 0; overflow: hidden; }
#root { height: 100vh; }

.hub-topbar {
  height: 40px; background: var(--brand-green-deep); color: rgba(255,255,255,0.8);
  display: flex; align-items: center; padding: 0 16px; gap: 12; flex-shrink: 0;
  font-size: 12px;
}
.hub-back-btn {
  background: transparent; border: none; color: rgba(255,255,255,0.9); cursor: pointer;
  display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
  padding: 4px 8px; border-radius: 6px;
}
.hub-back-btn:hover { background: rgba(255,255,255,0.10); }

/* Phone frame — shown on desktop */
.phone-outer {
  width: 380px; height: calc(100vh - 80px); max-height: 780px;
  background: #0a0d0c; border-radius: 44px; padding: 12px;
  position: relative; border: 1.5px solid #2a3a35;
  box-shadow: 0 24px 60px rgba(15,42,32,0.22), 0 4px 12px rgba(15,42,32,0.12);
  display: flex; flex-direction: column;
}
.phone-notch-el {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  width: 90px; height: 22px; background: #0a0d0c; border-radius: 16px; z-index: 5;
}
.phone-screen-el {
  flex: 1; background: var(--bg); border-radius: 32px; overflow: hidden;
  display: flex; flex-direction: column;
}
.phone-statusbar-el {
  height: 28px; background: var(--brand-green-deep); color: #FFF;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 22px; font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}
.phone-home-el {
  position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 4px; background: #FFF; opacity: 0.4; border-radius: 4px;
}

/* On real mobile: phone frame becomes fullscreen */
@media (max-width: 500px) {
  .hub-topbar { display: none; }
  .phone-outer {
    width: 100vw; height: 100vh; max-height: none; border-radius: 0; padding: 0;
    border: none; box-shadow: none; background: transparent;
  }
  .phone-notch-el, .phone-home-el { display: none; }
  .phone-screen-el { border-radius: 0; }
}
</style>

    /* Demo control */
    ultimaActualizacao: Date.now(),
  };

  /* ---------------- Storage ---------------- */
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return JSON.parse(JSON.stringify(initialState));
      const parsed = JSON.parse(raw);
      // Merge to fill in any missing keys from new versions
      return { ...initialState, ...parsed };
    } catch (e) {
      return JSON.parse(JSON.stringify(initialState));
    }
  }

  function saveState(state) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {}
  }

  /* ---------------- Store ---------------- */
  let state = loadState();
  const listeners = new Set();

  // BroadcastChannel for cross-tab/cross-device sync
  let channel = null;
  try {
    channel = new BroadcastChannel(CHANNEL_NAME);
    channel.onmessage = (ev) => {
      if (ev.data && ev.data.type === 'state') {
        state = ev.data.state;
        listeners.forEach(fn => fn(state));
      }
    };
  } catch (e) { /* not supported */ }

  // Cross-window same-origin sync via storage events
  window.addEventListener('storage', (ev) => {
    if (ev.key === STORAGE_KEY && ev.newValue) {
      try {
        state = JSON.parse(ev.newValue);
        listeners.forEach(fn => fn(state));
      } catch (e) {}
    }
  });

  function getState() { return state; }

  function setState(updater) {
    const next = typeof updater === 'function' ? updater(state) : updater;
    state = { ...state, ...next, ultimaActualizacao: Date.now() };
    saveState(state);
    listeners.forEach(fn => fn(state));
    if (channel) {
      try { channel.postMessage({ type: 'state', state }); } catch (e) {}
    }
  }

  function subscribe(fn) {
    listeners.add(fn);
    return () => listeners.delete(fn);
  }

  function reset() {
    state = JSON.parse(JSON.stringify(initialState));
    saveState(state);
    listeners.forEach(fn => fn(state));
    if (channel) {
      try { channel.postMessage({ type: 'state', state }); } catch (e) {}
    }
  }

  /* ---------------- Seniority helpers ---------------- */
  const RANK_ORDER = { 'Sargento': 4, 'Cabo-chefe': 3, 'Cabo': 2, 'Guarda': 1 };
  function ordemAntiguidade(militares) {
    return [...militares].sort((a, b) => {
      const ra = RANK_ORDER[a.posto] || 0, rb = RANK_ORDER[b.posto] || 0;
      if (ra !== rb) return rb - ra;
      return (a.anoIngresso || 9999) - (b.anoIngresso || 9999);
    });
  }

  /* ---------------- Internal helpers ---------------- */
  function logEvento(tipo, descricao, dados = {}) {
    const hora = new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    const ev = { id: 'ev_' + Date.now() + '_' + Math.random().toString(36).slice(2,5), tipo, descricao, hora, ts: Date.now(), dados };
    setState(s => ({ eventos: [ev, ...s.eventos].slice(0, 300) }));
  }

  /* ---------------- Action helpers ---------------- */
  const actions = {
    login(militarId) {
      setState({ militarLogadoId: militarId });
    },
    logout() {
      setState({ militarLogadoId: null });
    },
    abrirPatrulha({ viaturaId, parceiroId, kmInicial, combustivelInicial, equipamento }) {
      const v = state.viaturas.find(x => x.id === viaturaId);
      const id = 'p_' + Date.now();
      const patrulha = {
        id, viaturaId, parceiroId,
        militares: [state.militarLogadoId, parceiroId].filter(Boolean),
        kmInicial: Number(kmInicial), combustivelInicial: Number(combustivelInicial),
        equipamento, abertaEm: new Date().toISOString(),
        indicativo: v ? v.indicativo : '—',
      };
      setState(s => ({ patrulhaAtual: patrulha, rotaAtual: [],
        viaturas: s.viaturas.map(x => x.id === viaturaId ? { ...x, estado: 'patrulha' } : x),
      }));
      logEvento('patrulha_aberta', `Patrulha ${patrulha.indicativo} iniciada`, { indicativo: patrulha.indicativo, viaturaId });
    },
    fecharPatrulha({ kmFinal, combustivelFinal, observacoes }) {
      const p = state.patrulhaAtual;
      if (!p) return;
      const rota = state.rotaAtual;
      const fechada = { ...p, kmFinal: Number(kmFinal), combustivelFinal: Number(combustivelFinal), observacoes, fechadaEm: new Date().toISOString(), rota };
      setState(s => ({
        patrulhaAtual: null, rotaAtual: [],
        patrulhasHistorico: [fechada, ...s.patrulhasHistorico],
        viaturas: s.viaturas.map(x => x.id === p.viaturaId ? { ...x, estado: 'disponivel', km: Number(kmFinal), combustivel: Number(combustivelFinal) } : x),
      }));
      logEvento('patrulha_fechada', `Patrulha ${p.indicativo} encerrada — ${Math.max(0, Number(kmFinal) - p.kmInicial)} km percorridos`, { indicativo: p.indicativo });
    },
    addAlerta(alerta) {
      const id = 'a_' + Date.now();
      const a = { id, hora: new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }), confirmado: false, ...alerta };
      setState(s => ({ alertas: [a, ...s.alertas] }));
      logEvento('alerta_anpr', `Alerta ANPR — ${alerta.matricula} — ${alerta.motivo}`, { matricula: alerta.matricula, severidade: alerta.severidade });
      return a;
    },
    confirmarAlerta(alertaId) {
      const a = state.alertas.find(x => x.id === alertaId);
      setState(s => ({ alertas: s.alertas.map(x => x.id === alertaId ? { ...x, confirmado: true } : x) }));
      if (a) logEvento('alerta_confirmado', `Alerta confirmado — ${a.matricula}`, { alertaId });
    },
    addOcorrencia(dados) {
      const numero = 'OC-2026-' + String(state.ocorrencias.length + 1).padStart(4, '0');
      const hora = new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });

      setState(s => ({ ocorrencias: [oc, ...s.ocorrencias] }));
      logEvento('ocorrencia', `Ocorrência ${numero} registada — ${dados.tipo}`, { numero, tipo: dados.tipo });
      return oc;
    },
    addPontoRota({ lat, lng }) {
      setState(s => ({ rotaAtual: [...s.rotaAtual, { lat, lng, ts: Date.now() }].slice(-150) }));
    },
    enviarMensagem(chatId, texto) {
      const hora = new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });

        chats: { ...s.chats, [chatId]: { ...s.chats[chatId], mensagens: [...s.chats[chatId].mensagens, { de: s.militarLogadoId, texto, hora }] } }

    },
    marcarOSLida(osId) {
      const mid = state.militarLogadoId;
      setState(s => ({
        ordens: s.ordens.map(o => o.id === osId ? { ...o, novo: false, lidoPor: [...new Set([...(o.lidoPor||[]), mid])] } : o),

    enviarOS(os) {
      setState(s => ({ ordens: [{ ...os, id: 'os_' + Date.now(), data: new Date().toLocaleDateString('pt-PT'), novo: true, lidoPor: [] }, ...s.ordens] }));

    enviarMensagemLogged(chatId, texto) {
      const hora = new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
      setState(s => ({
        chats: { ...s.chats, [chatId]: { ...s.chats[chatId], mensagens: [...s.chats[chatId].mensagens, { de: s.militarLogadoId, texto, hora }] } }

    },
    activarPanico(coords) {
      const m = state.militares.find(x => x.id === state.militarLogadoId);
      // Use real GPS coords if provided, otherwise fall back to Vila Real centre
      const lat = (coords && coords.lat != null) ? coords.lat : 41.3006 + (Math.random() - 0.5) * 0.005;
      const lng = (coords && coords.lng != null) ? coords.lng : -7.7456 + (Math.random() - 0.5) * 0.005;
      setState({
        panico: {
          militarId: state.militarLogadoId,
          indicativo: m ? m.indicativo : '—',
          militarNome: m ? `${m.postoAbrev} ${m.nome}` : '—',
          lat, lng,
          gpsReal: !!(coords && coords.lat != null),
          desde: new Date().toISOString(),
          reforcos: [],
        }
      });
      logEvento('panico_ativo', `PEDIDO DE REFORÇO — ${m ? m.indicativo : '—'}`, { lat, lng });
    },
    despacharReforco(indicativo) {
      setState(s => ({
        panico: s.panico ? { ...s.panico, reforcos: [...new Set([...(s.panico.reforcos||[]), indicativo])] } : null,

    cancelarPanico() {
      logEvento('panico_cancelado', 'Pedido de reforço cancelado', {});

    submeterAuto(auto) {
      setState(s => ({ autos: [{ ...auto, id: 'auto_' + Date.now(), data: new Date().toISOString() }, ...s.autos] }));
    },
    marcarNotificacaoLida(nId) {
      setState(s => ({ notificacoes: s.notificacoes.map(n => n.id === nId ? { ...n, lida: true } : n) }));
    },
    toggleDiretiva(dId) {
      setState(s => ({ diretivas: s.diretivas.map(d => d.id === dId ? { ...d, feito: !d.feito } : d) }));
    },
    updatePosto(patch) {
      setState(s => ({ posto: { ...s.posto, ...patch } }));
    },
    addMilitar(dados) {
      const id = 'm_' + Date.now();
      const m = { id, estado: 'servico', indicativo: '—', foto: null, ...dados };
      setState(s => ({ militares: [...s.militares, m] }));
      logEvento('militar_adicionado', `Novo militar adicionado: ${dados.nome}`, { id });
      return m;
    },
    updateMilitar(id, patch) {
      setState(s => ({ militares: s.militares.map(m => m.id === id ? { ...m, ...patch } : m) }));
    },
    addViatura(dados) {
      const id = 'v_' + Date.now();
      const v = { id, estado: 'disponivel', militares: [], ...dados };
      setState(s => ({ viaturas: [...s.viaturas, v] }));
      logEvento('viatura_adicionada', `Nova viatura: ${dados.matricula}`, { id });
      return v;
    },
    updateViatura(id, patch) {
      setState(s => ({ viaturas: s.viaturas.map(v => v.id === id ? { ...v, ...patch } : v) }));
    },
    resetFeriasAno(ano) {
      const primeiroId = ordemAntiguidade(state.militares)[0]?.id || null;
      setState(s => ({ ferias: { ano, turnoMilitarId: primeiroId, periodos: [], concluidos: [] } }));
      logEvento('ferias_reset', `Marcação de férias reiniciada para ${ano}`, { ano });
    },
    setDiasFerias(militarId, dias) {
      setState(s => ({ militares: s.militares.map(m => m.id === militarId ? { ...m, diasFerias: Number(dias) } : m) }));
    },
    adicionarPeriodoFerias({ militarId, inicio, fim }) {
      const meusPeriodos = state.ferias.periodos.filter(p => p.militarId === militarId);
      if (meusPeriodos.length >= 5) return null;
      const d1 = new Date(inicio), d2 = new Date(fim);
      const dias = Math.max(1, Math.round((d2 - d1) / (1000 * 60 * 60 * 24)) + 1);
      const periodo = { id: 'fp_' + Date.now(), militarId, inicio, fim, dias };
      setState(s => ({ ferias: { ...s.ferias, periodos: [...s.ferias.periodos, periodo] } }));
      logEvento('ferias_periodo', `Período de férias adicionado — ${dias} dias`, { militarId, inicio, fim });
      return periodo;
    },
    removerPeriodoFerias(periodoId) {
      setState(s => ({ ferias: { ...s.ferias, periodos: s.ferias.periodos.filter(p => p.id !== periodoId) } }));
    },
    concluirMarcacaoFerias(militarId) {
      const fila = ordemAntiguidade(state.militares).map(m => m.id);
      const concluidos = [...new Set([...state.ferias.concluidos, militarId])];
      const proxIdx = fila.indexOf(militarId) + 1;
      const proximo = fila.slice(proxIdx).find(id => !concluidos.includes(id)) || null;
      setState(s => ({ ferias: { ...s.ferias, concluidos, turnoMilitarId: proximo } }));
      if (proximo) {
        const atual = state.militares.find(m => m.id === militarId);
        const proxMilitar = state.militares.find(m => m.id === proximo);
        const hora = new Date().toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
        const texto = `${atual ? `${atual.postoAbrev} ${atual.nome}` : '—'} concluiu a marcação de férias. ${proxMilitar ? `${proxMilitar.postoAbrev} ${proxMilitar.nome}` : '—'}, é agora a sua vez de marcar.`;
        setState(s => ({
          notificacoes: [{ id: 'n_f_' + Date.now(), tipo: 'ferias', texto: 'Férias 2026 — é a sua vez de marcar', hora, lida: false }, ...s.notificacoes],
          chats: { ...s.chats, 'c1': { ...s.chats['c1'], mensagens: [...s.chats['c1'].mensagens, { de: 'sistema', texto, hora }] } },
        }));
        logEvento('ferias_turno', `Férias: ${proxMilitar ? `${proxMilitar.postoAbrev} ${proxMilitar.nome}` : '—'} pode agora marcar`, { militarId: proximo });
      }
    },
    setTema(tema) {
      setState({ tema });
    },
    updateBriefing(patch) {
      setState(s => ({ briefing: { ...s.briefing, ...patch } }));
    },
    reset,
  };

  /* ---------------- React hook ---------------- */
  function useStore(selector) {
    const [, setTick] = React.useState(0);
    React.useEffect(() => {
      return subscribe(() => setTick(t => t + 1));
    }, []);
    return selector ? selector(state) : state;
  }

  window.SentinelaStore = { getState, setState, subscribe, useStore, actions, reset, ordemAntiguidade };
})();

</script>

      background: 'var(--brand-green)', color: '#C9A24B',
      display: 'flex', alignItems: 'center', justifyContent: 'center',

      fontSize: size * 0.42, letterSpacing: '-0.02em',
      flexShrink: 0,
      ...style,
    }}>{initials}</div>
  );
};

  const sizes = {
    sm: { h: 20, fs: 11, padL: 16, padR: 8 },
    md: { h: 26, fs: 14, padL: 20, padR: 10 },
    lg: { h: 36, fs: 19, padL: 26, padR: 12 },
  };
  const s = sizes[size] || sizes.md;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'stretch', height: s.h,
      border: '1.5px solid #20251F', borderRadius: 3, overflow: 'hidden',
      background: '#FFFFFF', fontFamily: 'var(--font-mono)', fontWeight: 700,
      fontSize: s.fs, lineHeight: 1, letterSpacing: '0.06em',
      flexShrink: 0,
    }}>
      <span style={{
        background: '#003399', color: '#FFCC00', display: 'flex', alignItems: 'center',
        justifyContent: 'center', width: s.padL, fontSize: s.fs * 0.55, fontWeight: 800,
      }}>P</span>
      <span style={{ display: 'flex', alignItems: 'center', padding: `0 ${s.padR}px`, color: '#20251F' }}>
        {value}
      </span>
    </span>
  );
};

/* Status dot */
const StatusDot = ({ tone = 'success', size = 8 }) => {
  const tones = {
    success: 'var(--success)', warning: 'var(--warning)', danger: 'var(--danger)',
    info: 'var(--info)', muted: 'var(--slate-400)', brand: 'var(--brand-green)',
  };
  return <span style={{ width: size, height: size, borderRadius: '50%', background: tones[tone], display: 'inline-block', flexShrink: 0 }}/>;
};

/* Badge */
const Badge = ({ tone = 'neutral', children, size = 'md' }) => {
  const tones = {
    neutral: { bg: 'var(--slate-100)', fg: 'var(--slate-700)', bd: 'var(--border)' },
    brand:   { bg: 'rgba(31,77,58,0.10)', fg: 'var(--brand-green)', bd: 'rgba(31,77,58,0.20)' },
    danger:  { bg: 'var(--danger-soft)', fg: 'var(--danger-deep)', bd: 'rgba(199,50,43,0.22)' },
    warning: { bg: 'var(--warning-soft)', fg: 'var(--warning-deep)', bd: 'rgba(216,138,42,0.22)' },
    info:    { bg: 'var(--info-soft)', fg: 'var(--info-deep)', bd: 'rgba(46,92,138,0.22)' },
    success: { bg: 'var(--success-soft)', fg: 'var(--success)', bd: 'rgba(47,125,74,0.22)' },
    gold:    { bg: 'rgba(201,162,75,0.14)', fg: 'var(--brand-gold-deep)', bd: 'rgba(201,162,75,0.30)' },
  };
  const t = tones[tone] || tones.neutral;
  const sizes = {
    sm: { fs: 10, py: 2, px: 6, h: 18 },
    md: { fs: 11, py: 3, px: 8, h: 22 },
  };
  const sz = sizes[size] || sizes.md;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      height: sz.h, padding: `0 ${sz.px}px`,
      background: t.bg, color: t.fg, border: `1px solid ${t.bd}`,
      borderRadius: 'var(--radius-pill)',
      fontFamily: 'var(--font-ui)', fontSize: sz.fs, fontWeight: 600,
      letterSpacing: '0.02em', textTransform: 'uppercase', whiteSpace: 'nowrap',
    }}>{children}</span>
  );
};

/* Button */
const Button = ({ tone = 'primary', size = 'md', children, icon, iconRight, ...rest }) => {
  const tones = {
    primary:   { bg: 'var(--brand-green)', fg: '#FFFFFF', bd: 'var(--brand-green)' },
    secondary: { bg: 'var(--surface)', fg: 'var(--fg)', bd: 'var(--border-strong)' },
    ghost:     { bg: 'transparent', fg: 'var(--fg)', bd: 'transparent' },
    danger:    { bg: 'var(--danger)', fg: '#FFFFFF', bd: 'var(--danger)' },
    gold:      { bg: 'var(--brand-gold)', fg: 'var(--fg-on-gold)', bd: 'var(--brand-gold)' },
  };
  const t = tones[tone] || tones.primary;
  const sizes = {
    sm: { h: 28, px: 10, fs: 12, gap: 6, ic: 14 },
    md: { h: 36, px: 14, fs: 13, gap: 8, ic: 16 },
    lg: { h: 44, px: 18, fs: 15, gap: 10, ic: 18 },
  };
  const sz = sizes[size] || sizes.md;
  return (
    <button {...rest} style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: sz.gap,
      height: sz.h, padding: `0 ${sz.px}px`, background: t.bg, color: t.fg,
      border: `1px solid ${t.bd}`, borderRadius: 'var(--radius-md)',
      fontFamily: 'var(--font-ui)', fontSize: sz.fs, fontWeight: 600,
      cursor: 'pointer', letterSpacing: 0,
      transition: `background var(--motion-fast) var(--ease-out), transform var(--motion-fast) var(--ease-out)`,
      ...rest.style,
    }} onMouseDown={e=>e.currentTarget.style.transform='scale(0.98)'}
       onMouseUp={e=>e.currentTarget.style.transform=''}
       onMouseLeave={e=>e.currentTarget.style.transform=''}>
      {icon && <Icon name={icon} size={sz.ic}/>}
      {children}
      {iconRight && <Icon name={iconRight} size={sz.ic}/>}
    </button>
  );
};

Object.assign(window, { Icon, Avatar, Plate, StatusDot, Badge, Button });

</script>

window.LoginScreen = LoginScreen;

<script type="text/babel">
/* Sentinela Mobile — Abertura e Fecho de Patrulha (full forms) */

const AbrirPatrulhaScreen = ({ onBack, onDone }) => {
  const { useStore, actions } = window.SentinelaStore;
  const viaturas = useStore(s => s.viaturas).filter(v => v.estado === 'disponivel');
  const militares = useStore(s => s.militares);
  const meId = useStore(s => s.militarLogadoId);
  const me = militares.find(m => m.id === meId);

  const [step, setStep] = React.useState(1);
  const [viaturaId, setViaturaId] = React.useState(null);
  const [parceiroId, setParceiroId] = React.useState(null);
  const [km, setKm] = React.useState('');
  const [comb, setComb] = React.useState('');
  const [equip, setEquip] = React.useState({
    arma: true, colete: true, radio: true, taser: false, alcoolimetro: true, primeirosocorros: true,
  });

  const viatura = viaturas.find(v => v.id === viaturaId);

  const ScreenHeader = ({ title }) => (
    <div style={{
      height: 52, background: 'var(--brand-green-deep)', color: '#FFF',
      display: 'flex', alignItems: 'center', gap: 10, padding: '0 12px', flexShrink: 0,
    }}>
      <button onClick={onBack} style={{ background: 'transparent', border: 'none', color: '#FFF', display: 'flex', cursor: 'pointer', padding: 4 }}>
        <Icon name="arrow-left" size={20}/>
      </button>
      <div style={{ flex: 1 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 14 }}>{title}</div>
        <div style={{ fontSize: 10, color: '#C9A24B', fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase' }}>Passo {step} de 4</div>
      </div>
    </div>
  );

  // Step 1 — viatura
  if (step === 1) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
        <ScreenHeader title="Escolher viatura"/>
        <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div className="t-overline">VIATURAS DISPONÍVEIS</div>
          {viaturas.map(v => (
            <button key={v.id} onClick={() => { setViaturaId(v.id); setKm(String(v.km)); setComb(String(v.combustivel)); setStep(2); }} style={{
              background: 'var(--surface)', border: '1px solid var(--border)',
              borderLeft: '4px solid var(--success)',
              borderRadius: 'var(--radius-md)', padding: 12, textAlign: 'left',
              display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer',
            }}>
              <div style={{ width: 44, height: 44, background: 'var(--surface-2)', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name="car" size={22} style={{ color: 'var(--brand-green)' }}/>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 4 }}>
                  <Plate value={v.matricula} size="sm"/>
                  <Badge tone="brand" size="sm">{v.indicativo}</Badge>
                </div>
                <div style={{ fontSize: 12, color: 'var(--fg-muted)' }}>{v.marca} {v.modelo} · {v.km.toLocaleString('pt-PT')} km · {v.combustivel}%</div>
              </div>
              <Icon name="chevron-right" size={16} style={{ color: 'var(--fg-soft)' }}/>
            </button>
          ))}
          {viaturas.length === 0 && (
            <div style={{ background: 'var(--warning-soft)', color: 'var(--warning-deep)', padding: 14, borderRadius: 'var(--radius-md)', fontSize: 13 }}>
              Sem viaturas disponíveis. Contacta o comando.
            </div>
          )}
        </div>
      </div>
    );
  }

  // Step 2 — parceiro
  if (step === 2) {
    const parceiros = militares.filter(m => m.id !== meId && m.estado !== 'patrulha');
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
        <ScreenHeader title="Escolher patrulheiro"/>
        <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 8 }}>
          <button onClick={() => { setParceiroId(null); setStep(3); }} style={{
            background: 'var(--surface-2)', border: '1px dashed var(--border-strong)',
            borderRadius: 'var(--radius-md)', padding: 12, textAlign: 'left',
            display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer',
          }}>
            <Icon name="user" size={20} style={{ color: 'var(--fg-soft)' }}/>
            <div style={{ flex: 1, fontSize: 13, color: 'var(--fg-muted)' }}>Sair sozinho (sem parceiro)</div>
          </button>
          <div className="t-overline" style={{ marginTop: 8 }}>DISPONÍVEIS</div>
          {parceiros.map(m => (
            <button key={m.id} onClick={() => { setParceiroId(m.id); setStep(3); }} style={{
              background: 'var(--surface)', border: '1px solid var(--border)',
              borderRadius: 'var(--radius-md)', padding: 10, textAlign: 'left',
              display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer',
            }}>
              <Avatar name={m.nome} size={38}/>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{m.postoAbrev} {m.nome}</div>
                <div className="t-mono" style={{ fontSize: 11, color: 'var(--fg-muted)' }}>NIM {m.nim}</div>
              </div>
              <StatusDot tone={m.estado === 'servico' ? 'success' : 'muted'}/>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // Step 3 — KM, combustível
  if (step === 3) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
        <ScreenHeader title="Estado da viatura"/>
        <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div style={{ background: 'var(--surface-2)', borderRadius: 'var(--radius-md)', padding: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
            <Plate value={viatura.matricula} size="sm"/>
            <div style={{ fontSize: 12, color: 'var(--fg-muted)' }}>{viatura.marca} {viatura.modelo} · {viatura.indicativo}</div>
          </div>

          <FormField label="Quilómetros iniciais">
            <input type="number" value={km} onChange={e => setKm(e.target.value)} className="form-input mono"/>
          </FormField>
          <FormField label="Combustível inicial (%)">
            <input type="number" min="0" max="100" value={comb} onChange={e => setComb(e.target.value)} className="form-input mono"/>
            <input type="range" min="0" max="100" value={comb} onChange={e => setComb(e.target.value)} style={{ width: '100%', marginTop: 6, accentColor: 'var(--brand-green)' }}/>
          </FormField>

          <Button tone="primary" size="lg" onClick={() => setStep(4)} style={{ width: '100%' }} icon="arrow-right">Continuar</Button>
        </div>
      </div>
    );
  }

  // Step 4 — equipamento
  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
      <ScreenHeader title="Equipamento de patrulha"/>
      <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 6 }}>
        <div className="t-overline" style={{ marginBottom: 4 }}>CONFIRMA O EQUIPAMENTO LEVADO</div>
        {[
          ['arma', 'Arma de serviço'],
          ['colete', 'Colete balístico'],
          ['radio', 'Rádio SIRESP'],
          ['taser', 'Taser X26'],
          ['alcoolimetro', 'Alcoolímetro'],
          ['primeirosocorros', 'Primeiros socorros'],
        ].map(([k, label]) => (
          <button key={k} onClick={() => setEquip(e => ({ ...e, [k]: !e[k] }))} style={{
            background: 'var(--surface)', border: '1px solid var(--border)',
            borderRadius: 'var(--radius-md)', padding: 12, display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', textAlign: 'left',
          }}>
            <Icon name={equip[k] ? 'check-square' : 'square'} size={20} style={{ color: equip[k] ? 'var(--success)' : 'var(--fg-soft)' }}/>
            <div style={{ flex: 1, fontSize: 13, fontWeight: 500 }}>{label}</div>
          </button>
        ))}
        <div style={{ marginTop: 14, padding: 12, background: 'var(--info-soft)', color: 'var(--info-deep)', fontSize: 12, borderRadius: 'var(--radius-md)' }}>
          <Icon name="alert-triangle" size={14} style={{ verticalAlign: 'text-bottom', marginRight: 6 }}/>
          O comando do posto será notificado da abertura.
        </div>
        <Button tone="primary" size="lg" icon="shield" onClick={() => {
          actions.abrirPatrulha({
            viaturaId, parceiroId,
            kmInicial: Number(km), combustivelInicial: Number(comb),
            equipamento: Object.keys(equip).filter(k => equip[k]),
          });
          onDone();
        }} style={{ width: '100%', marginTop: 8 }}>
          Confirmar e iniciar patrulha
        </Button>
      </div>
    </div>
  );
};

/* GPS tracking hook — runs while patrol is open */
const useGPSTracking = (ativa) => {
  React.useEffect(() => {
    if (!ativa || !navigator.geolocation) return;
    const watchId = navigator.geolocation.watchPosition(
      pos => {
        window.SentinelaStore.actions.addPontoRota({ lat: pos.coords.latitude, lng: pos.coords.longitude });
      },
      () => {},
      { enableHighAccuracy: true, maximumAge: 20000, timeout: 30000 }
    );
    return () => navigator.geolocation.clearWatch(watchId);
  }, [ativa]);
};

const FecharPatrulhaScreen = ({ onBack, onDone }) => {
  const { useStore, actions } = window.SentinelaStore;
  const patrulha = useStore(s => s.patrulhaAtual);
  const viatura = useStore(s => s.viaturas).find(v => v.id === patrulha?.viaturaId);
  const rotaAtual = useStore(s => s.rotaAtual);
  const ocorrencias = useStore(s => s.ocorrencias);
  const [km, setKm] = React.useState(String((patrulha?.kmInicial || 0) + 40));
  const [comb, setComb] = React.useState(String(Math.max(0, (patrulha?.combustivelInicial || 50) - 18)));
  const [obs, setObs] = React.useState('');
  const [danos, setDanos] = React.useState(false);

  // Start GPS tracking while patrol screen is open
  useGPSTracking(!!patrulha);

  if (!patrulha) {
    return <div style={{ padding: 24 }}>Sem patrulha ativa.</div>;
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
      <div style={{
        height: 52, background: 'var(--brand-green-deep)', color: '#FFF',
        display: 'flex', alignItems: 'center', gap: 10, padding: '0 12px',
      }}>
        <button onClick={onBack} style={{ background: 'transparent', border: 'none', color: '#FFF', display: 'flex', cursor: 'pointer', padding: 4 }}>
          <Icon name="arrow-left" size={20}/>
        </button>
        <div style={{ flex: 1, fontWeight: 600, fontSize: 14, fontFamily: 'var(--font-display)' }}>Fechar patrulha</div>
      </div>
      <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div style={{ background: 'var(--surface-2)', borderRadius: 'var(--radius-md)', padding: 12 }}>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 6 }}>
            <Plate value={viatura?.matricula} size="sm"/>
            <Badge tone="brand" size="sm">{patrulha.indicativo}</Badge>
          </div>
          <div className="t-mono" style={{ fontSize: 11, color: 'var(--fg-muted)' }}>
            Início: {new Date(patrulha.abertaEm).toLocaleTimeString('pt-PT', {hour:'2-digit',minute:'2-digit'})} · KM ini.: {patrulha.kmInicial.toLocaleString('pt-PT')} · Comb. ini.: {patrulha.combustivelInicial}%
          </div>
        </div>

        <FormField label="Quilómetros finais">
          <input type="number" value={km} onChange={e => setKm(e.target.value)} className="form-input mono"/>
          <div style={{ fontSize: 11, color: 'var(--fg-muted)', marginTop: 4 }} className="t-mono">
            Percorridos: {Math.max(0, Number(km) - patrulha.kmInicial)} km
          </div>
        </FormField>
        <FormField label="Combustível final (%)">
          <input type="range" min="0" max="100" value={comb} onChange={e => setComb(e.target.value)} style={{ width: '100%', accentColor: 'var(--brand-green)' }}/>
          <div className="t-mono" style={{ fontSize: 13, fontWeight: 600 }}>{comb}%</div>
        </FormField>
        <FormField label="Houve danos na viatura?">
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={() => setDanos(false)} style={tabBtn(!danos)}>Não</button>
            <button onClick={() => setDanos(true)} style={tabBtn(danos)}>Sim</button>
          </div>
        </FormField>
        <FormField label="Observações">
          <textarea value={obs} onChange={e => setObs(e.target.value)} placeholder="Notas sobre a patrulha…" className="form-input" style={{ minHeight: 80, fontFamily: 'var(--font-ui)' }}/>
        </FormField>

        {(rotaAtual.length > 0 || ocorrencias.length > 0) && (
          <div style={{ background: 'var(--surface-2)', borderRadius: 8, padding: '10px 12px', display: 'flex', gap: 16 }}>
            {rotaAtual.length > 0 && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12 }}>
                <Icon name="map-pin" size={14} style={{ color: 'var(--brand-green)' }}/>
                <span style={{ color: 'var(--fg-muted)' }}>{rotaAtual.length} pontos GPS gravados</span>
              </div>
            )}
            {ocorrencias.filter(o => o.indicativo === patrulha.indicativo).length > 0 && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12 }}>
                <Icon name="clipboard-list" size={14} style={{ color: 'var(--brand-green)' }}/>
                <span style={{ color: 'var(--fg-muted)' }}>{ocorrencias.filter(o => o.indicativo === patrulha.indicativo).length} ocorrências</span>
              </div>
            )}
          </div>
        )}
        <Button tone="primary" size="lg" icon="check" onClick={() => {
          actions.fecharPatrulha({ kmFinal: Number(km), combustivelFinal: Number(comb), observacoes: obs });
          onDone();
        }} style={{ width: '100%', marginTop: 4 }}>
          Confirmar fecho · gerar relatório
        </Button>
        <button onClick={() => window.print()} style={{
          background: 'transparent', border: 'none', color: 'var(--brand-green)',
          fontSize: 12, fontWeight: 600, padding: 8, cursor: 'pointer',
          textDecoration: 'underline', textUnderlineOffset: 3,
        }}>
          Imprimir relatório de turno →
        </button>
      </div>
    </div>
  );
};

const tabBtn = (active) => ({
  flex: 1,
  background: active ? 'var(--brand-green)' : 'var(--surface)',
  color: active ? '#FFF' : 'var(--fg)',
  border: '1px solid ' + (active ? 'var(--brand-green)' : 'var(--border-strong)'),
  borderRadius: 'var(--radius-md)', padding: '10px', cursor: 'pointer',
  fontSize: 13, fontWeight: 600,
});

<script type="text/babel">
/* Sentinela Mobile — Registo rápido de ocorrência + ditado por voz */

const useSpeechRecognition = (onResult) => {
  const recRef = React.useRef(null);
  const [ouvindo, setOuvindo] = React.useState(false);
  const [suportado] = React.useState(() => !!(window.SpeechRecognition || window.webkitSpeechRecognition));

  const iniciar = React.useCallback(() => {
    if (!suportado) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SR();
    rec.lang = 'pt-PT';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    rec.onstart = () => setOuvindo(true);
    rec.onend = () => setOuvindo(false);
    rec.onerror = () => setOuvindo(false);
    rec.onresult = (e) => {
      const texto = e.results[0][0].transcript;
      onResult(texto);
    };
    recRef.current = rec;
    rec.start();
  }, [suportado, onResult]);

  const parar = React.useCallback(() => {
    if (recRef.current) recRef.current.stop();
  }, []);

  return { ouvindo, suportado, iniciar, parar };
};

const MicButton = ({ onResult, size = 'normal' }) => {
  const [texto, setTexto] = React.useState('');
  const { ouvindo, suportado, iniciar, parar } = useSpeechRecognition(t => {
    setTexto(t);
    onResult(t);
  });

  if (!suportado) return null;

  return (
    <button
      onMouseDown={iniciar} onMouseUp={parar} onTouchStart={iniciar} onTouchEnd={parar}
      title="Manter premido para ditar"
      style={{
        background: ouvindo ? 'var(--danger)' : 'var(--brand-green)',
        color: '#FFF', border: 'none',
        borderRadius: size === 'sm' ? '50%' : 8,
        width: size === 'sm' ? 34 : 42, height: size === 'sm' ? 34 : 42,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        cursor: 'pointer', flexShrink: 0,
        animation: ouvindo ? 'micPulse 0.6s ease-in-out infinite alternate' : 'none',
      }}>
      <style>{`@keyframes micPulse{from{box-shadow:0 0 0 0 rgba(199,50,43,0.5)}to{box-shadow:0 0 0 8px rgba(199,50,43,0)}}`}</style>
      <Icon name={ouvindo ? 'radio' : 'phone'} size={size === 'sm' ? 14 : 18}/>
    </button>
  );
};

const OcorrenciaModal = ({ alerta, onClose }) => {
  const { actions } = window.SentinelaStore;
  const [tipo, setTipo] = React.useState('contraordenacao');
  const [notas, setNotas] = React.useState('');
  const [acao, setAcao] = React.useState('auto_levantado');

  const appendVoz = React.useCallback(t => {
    setNotas(prev => prev ? prev + ' ' + t : t);
  }, []);

  const submeter = () => {
    const oc = actions.addOcorrencia({
      tipo,
      notas,
      acao,
      matricula: alerta?.matricula,
      alertaId: alerta?.id,
      local: alerta?.local || '—',
      indicativo: alerta?.indicativo || '—',
    });
    setSubmetido(oc);
  };

  if (submetido) {
    return (
      <div style={{
        position: 'absolute', inset: 0, background: 'var(--bg)', zIndex: 50,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        padding: 24, gap: 16, textAlign: 'center',
      }}>
        <div style={{ width: 72, height: 72, borderRadius: '50%', background: 'rgba(54,128,68,0.12)', color: 'var(--success)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="check" size={36}/>
        </div>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 20 }}>Ocorrência registada</div>
        <div style={{ fontFamily: 'var(--font-mono)', fontSize: 14, color: 'var(--brand-green)', fontWeight: 600 }}>{submetido.numero}</div>
        <div style={{ fontSize: 13, color: 'var(--fg-muted)', lineHeight: 1.6 }}>
          Sincronizado com o posto · {submetido.hora}<br/>
          Visível na Cronologia e Ocorrências

        <button onClick={onClose} style={{
          background: 'var(--brand-green)', color: '#FFF', border: 'none',
          borderRadius: 10, padding: '12px 32px', fontWeight: 700, fontSize: 14, cursor: 'pointer',
        }}>Concluído</button>
      </div>
    );
  }

  return (
    <div style={{ position: 'absolute', inset: 0, background: 'var(--bg)', zIndex: 50, display: 'flex', flexDirection: 'column' }}>
      <div style={{ height: 52, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', gap: 10, padding: '0 12px', flexShrink: 0 }}>
        <button onClick={onClose} style={{ background: 'transparent', border: 'none', color: '#FFF', display: 'flex', cursor: 'pointer', padding: 4 }}>
          <Icon name="x" size={20}/>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 14 }}>Registar ocorrência</div>
          {alerta && <div style={{ fontSize: 10, color: '#C9A24B', fontWeight: 600 }}>Associada ao alerta: {alerta.matricula}</div>}
        </div>
        <Icon name="clipboard-list" size={18}/>

      <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 14 }}>

        {alerta && (
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderLeft: '4px solid var(--warning)', borderRadius: 8, padding: '10px 12px' }}>
            <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
              <Plate value={alerta.matricula} size="sm"/>
              <div>
                <div style={{ fontSize: 12, fontWeight: 600 }}>{alerta.motivo}</div>

              </div>

        <div>
          <div className="t-overline" style={{ marginBottom: 6 }}>TIPO DE OCORRÊNCIA</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            {[
              ['contraordenacao', 'Contraordenação'],
              ['crime', 'Crime / SIIOP'],
              ['avaria', 'Avaria / acidente'],
              ['inspecao', 'Fiscalização'],
              ['suspeito', 'Indivíduo suspeito'],
              ['outro', 'Outro'],
            ].map(([v, l]) => (
              <button key={v} onClick={() => setTipo(v)} style={{
                background: tipo === v ? 'var(--brand-green)' : 'var(--surface)',
                color: tipo === v ? '#FFF' : 'var(--fg)',
                border: '1px solid ' + (tipo === v ? 'var(--brand-green)' : 'var(--border)'),
                borderRadius: 8, padding: '10px 8px', fontSize: 12, fontWeight: 600, cursor: 'pointer',
              }}>{l}</button>
            ))}
          </div>
        </div>

        <div>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
            <div className="t-overline">NOTAS E DESCRIÇÃO</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 10, color: 'var(--fg-muted)' }}>
              <Icon name="phone" size={11}/>
              Manter premido para ditar
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
            <textarea
              value={notas}
              onChange={e => setNotas(e.target.value)}
              placeholder="Descrição da ocorrência… Podes ditar por voz."
              rows={4}
              className="form-input"
              style={{ flex: 1, fontFamily: 'var(--font-sans)', fontSize: 13, resize: 'none' }}
            />
            <MicButton onResult={appendVoz}/>
          </div>
        </div>

        <div>
          <div className="t-overline" style={{ marginBottom: 6 }}>AÇÃO TOMADA</div>
          <select value={acao} onChange={e => setAcao(e.target.value)} className="form-input" style={{ fontSize: 13 }}>
            <option value="auto_levantado">Auto de contraordenação levantado</option>
            <option value="detencao">Detenção efetuada</option>
            <option value="notificacao">Notificação / contacto</option>
            <option value="comunicado_mp">Comunicado ao MP</option>
            <option value="sem_acao">Sem ação (informação)</option>
            <option value="reencaminhado">Reencaminhado para outro órgão</option>
          </select>
        </div>

        <button onClick={submeter} style={{
          background: 'var(--brand-green)', color: '#FFF', border: 'none',
          borderRadius: 10, padding: '14px', fontWeight: 700, fontSize: 14, cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, marginTop: 4,
        }}>
          <Icon name="send" size={16}/> Submeter ocorrência
        </button>
      </div>
    </div>
  );
};

Object.assign(window, { OcorrenciaModal, MicButton, useSpeechRecognition });

</script>
<script type="text/babel">
/* Sentinela Mobile — Scanner ANPR (store-driven, câmera real) */

const ScannerScreenV2 = () => {
  const { useStore, actions } = window.SentinelaStore;
  const alertas = useStore(s => s.alertas);
  const me = useStore(s => s.militares.find(x => x.id === s.militarLogadoId));
  const indicativo = useStore(s => s.patrulhaAtual?.indicativo) || me?.indicativo || '—';

  const [scanned, setScanned] = React.useState(0);
  const [running, setRunning] = React.useState(true);
  const [alertaAtivo, setAlertaAtivo] = React.useState(null);
  const [detalheVisivel, setDetalhe] = React.useState(false);
  const [registarOcorrencia, setRegistarOcorrencia] = React.useState(false);
  const [cameraAtiva, setCameraAtiva] = React.useState(false);
  const [cameraErro, setCameraErro] = React.useState(null);
  const videoRef = React.useRef(null);
  const streamRef = React.useRef(null);

  // Start camera
  React.useEffect(() => {
    if (!navigator.mediaDevices?.getUserMedia) {
      setCameraErro('Câmera não suportada neste dispositivo.');
      return;
    }
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
    })
    .then(stream => {
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        setCameraAtiva(true);
      }
    })
    .catch(() => setCameraErro('Acesso à câmera negado. A usar modo de simulação.'));

    return () => {
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    };
  }, []);

  // Pause/resume camera track when running toggles
  React.useEffect(() => {
    if (!streamRef.current) return;
    streamRef.current.getVideoTracks().forEach(t => { t.enabled = running; });
  }, [running]);

  React.useEffect(() => {
    if (!running) return;
    const t = setInterval(() => setScanned(s => s + 1 + Math.floor(Math.random()*3)), 900);
    return () => clearInterval(t);
  }, [running]);

  const simularAlerta = () => {
    const cenarios = [
      { matricula: '12-AB-34', motivo: 'Viatura furtada', severidade: 'critico', origem: 'BNDV — Aveiro 2024-08-14', local: 'Av. Carvalho Araújo' },
      { matricula: '89-NM-22', motivo: 'Procurada — furto a estabelecimento', severidade: 'critico', origem: 'MP Vila Real', local: 'R. Direita' },
      { matricula: '57-DT-91', motivo: 'Sem seguro válido', severidade: 'aviso', origem: 'ASF — desde 2026-01-12', local: 'EN2, km 14' },
      { matricula: '44-PV-22', motivo: 'Inspeção caducada', severidade: 'aviso', origem: 'IMT — caducou 2025-11-30', local: 'R. da República' },
    ];
    const c = cenarios[Math.floor(Math.random() * cenarios.length)];
    const a = actions.addAlerta({ ...c, militar: me ? `${me.postoAbrev} ${me.nome}` : '—', indicativo });
    setAlertaAtivo(a);
  };

  const confirmar = () => {
    actions.confirmarAlerta(alertaAtivo.id);
    setDetalhe(false);
    // Keep alertaAtivo so user can register occurrence
  };

  const tone = alertaAtivo?.severidade === 'critico' ? 'var(--danger)' : 'var(--warning)';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, background: '#000', color: '#FFF', position: 'relative' }}>
      {registarOcorrencia && (
        <OcorrenciaModal alerta={alertaAtivo} onClose={() => { setRegistarOcorrencia(false); setAlertaAtivo(null); }}/>
      )}
      <div style={{ position: 'relative', height: 240, overflow: 'hidden', background: '#000' }}>

        {/* Real camera feed */}
        <video ref={videoRef} autoPlay playsInline muted
          style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover',
            display: cameraAtiva ? 'block' : 'none' }}/>

        {/* Fallback simulated road view (shown when no camera) */}
        {!cameraAtiva && (
          <>
            <div style={{ position: 'absolute', inset: 0,
              background: `radial-gradient(ellipse at center bottom, rgba(80,90,85,0.4) 0%, transparent 60%),
                           linear-gradient(180deg, #0a0d0c 0%, #1f2724 50%, #2a3530 100%)` }}/>
            <svg width="100%" height="100%" viewBox="0 0 360 240" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0 }}>
              <path d="M180 240 L100 60" stroke="#3a4a44" strokeWidth="2"/>
              <path d="M180 240 L260 60" stroke="#3a4a44" strokeWidth="2"/>
              <path d="M180 240 L180 60" stroke="#5a6e64" strokeWidth="3" strokeDasharray="14 10"/>
            </svg>
            {cameraErro && (
              <div style={{ position: 'absolute', top: 8, left: 0, right: 0, textAlign: 'center',
                fontSize: 10, color: 'rgba(255,255,255,0.5)', fontFamily: 'var(--font-mono)' }}>
                {cameraErro}
              </div>
            )}
          </>
        )}

        {/* Scanning overlay — always on top */}
        <div style={{ position: 'absolute', left: '50%', top: '50%', transform: 'translate(-50%,-50%)',
          width: 220, height: 64, border: '2px solid #C9A24B', borderRadius: 6,
          boxShadow: '0 0 0 2000px rgba(0,0,0,0.45)' }}>
          <div style={{ position: 'absolute', left: 0, right: 0, height: 2, background: '#C9A24B',
            top: '50%', boxShadow: '0 0 12px #C9A24B', animation: running ? 'scanLine 2s ease-in-out infinite' : 'none' }}/>
        </div>
        <style>{`@keyframes scanLine{0%,100%{top:8%}50%{top:92%}}`}</style>

        {/* Status bar */}
        <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0,
          padding: '8px 14px', display: 'flex', alignItems: 'center', gap: 14,
          background: 'rgba(0,0,0,0.55)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
          <span style={{ display: 'flex', alignItems: 'center', gap: 6, color: running ? '#7DD896' : '#A8B0AA' }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: running ? '#7DD896' : '#A8B0AA' }}/>
            {running ? 'ATIVO' : 'PAUSADO'}
          </span>
          <span style={{ display: 'flex', alignItems: 'center', gap: 4, color: cameraAtiva ? '#A8D8B8' : '#A8B0AA', fontSize: 10 }}>
            <Icon name="camera" size={11}/>
            {cameraAtiva ? 'CÂMERA' : 'SIM'}
          </span>
          <span style={{ color: '#A8B0AA' }}>SCAN: <b style={{ color: '#FFF' }}>{scanned}</b></span>
          <span style={{ color: '#A8B0AA', marginLeft: 'auto' }}>{indicativo}</span>
        </div>
      </div>

      <div style={{ padding: 10, background: '#0a0d0c', display: 'flex', gap: 8 }}>
        <button onClick={simularAlerta} style={{
          flex: 1, background: 'var(--brand-gold)', color: '#1A1208', border: 'none',
          borderRadius: 8, padding: '10px', fontWeight: 700, fontSize: 12, cursor: 'pointer',

        <button onClick={() => setRunning(r => !r)} style={{
          background: 'transparent', border: '1px solid #C9A24B', color: '#C9A24B',
          borderRadius: 8, padding: '0 14px', fontSize: 12, fontWeight: 600, cursor: 'pointer',
        }}>{running ? 'Pausar' : 'Retomar'}</button>
      </div>

      {alertaAtivo && !detalheVisivel && (
        <div style={{ margin: 10, background: tone, color: '#FFF', borderRadius: 'var(--radius-md)', flexShrink: 0,
          animation: 'alertPulse 0.8s ease-in-out infinite alternate' }}>
          <style>{`@keyframes alertPulse{from{box-shadow:0 0 0 0 rgba(199,50,43,0)}to{box-shadow:0 0 0 6px rgba(199,50,43,0.18)}}`}</style>
          <div style={{ padding: '12px 14px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
              <Icon name={alertaAtivo.severidade === 'critico' ? 'alert-octagon' : 'alert-triangle'} size={18}/>

          <div style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 12 }}>

                <Icon name="clipboard-list" size={16}/> Registar ocorrência

const ChatThreadScreen = ({ chatId, onBack }) => {
  const { useStore, actions } = window.SentinelaStore;
  const chat = useStore(s => s.chats[chatId]);
  const me = useStore(s => s.militarLogadoId);
  const militares = useStore(s => s.militares);
  const [texto, setTexto] = React.useState('');
  const scrollRef = React.useRef();

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [chat?.mensagens.length]);

  const labelDe = (id) => {
    if (id === 'sistema') return 'Sistema';
    const m = militares.find(x => x.id === id);
    return m ? `${m.postoAbrev} ${m.nome.split(' ').slice(-1)[0]}` : id;
  };
  const indDe = (id) => {
    const m = militares.find(x => x.id === id);
    return m ? m.indicativo : '';
  };

  const enviar = () => {
    if (!texto.trim()) return;
    actions.enviarMensagem(chatId, texto.trim());
    setTexto('');
  };

  if (!chat) return null;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--surface-2)' }}>
      <div style={{ height: 52, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 12px', gap: 10 }}>
        <button onClick={onBack} style={{ background: 'transparent', border: 'none', color: '#FFF', display: 'flex', cursor: 'pointer' }}><Icon name="arrow-left" size={20}/></button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 13, fontFamily: 'var(--font-display)' }}>{chat.nome}</div>
          <div style={{ fontSize: 10, color: '#C9A24B', fontWeight: 600 }}>{chat.mensagens.length} mensagens</div>
        </div>
        <Icon name="phone" size={18}/>
      </div>
      <div ref={scrollRef} style={{ flex: 1, overflowY: 'auto', padding: '12px 12px', display: 'flex', flexDirection: 'column', gap: 6 }}>
        {chat.mensagens.map((m, i) => {
          const proprio = m.de === me;
          return (
            <div key={i} style={{ display: 'flex', justifyContent: proprio ? 'flex-end' : 'flex-start' }}>
              <div style={{
                maxWidth: '78%', background: proprio ? 'var(--brand-green)' : 'var(--surface)',
                color: proprio ? '#FFF' : 'var(--fg)',
                border: proprio ? 'none' : '1px solid var(--border)',
                borderRadius: 10, padding: '8px 12px',
                borderTopRightRadius: proprio ? 2 : 10, borderTopLeftRadius: proprio ? 10 : 2,
              }}>
                {!proprio && (
                  <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--brand-green-deep)', marginBottom: 2 }}>
                    {labelDe(m.de)} {indDe(m.de) && <span style={{ color: 'var(--fg-muted)', fontFamily: 'var(--font-mono)', fontWeight: 500 }}>· {indDe(m.de)}</span>}
                  </div>
                )}
                <div style={{ fontSize: 13, lineHeight: '18px' }}>{m.texto}</div>
                <div className="t-mono" style={{ fontSize: 10, opacity: 0.7, textAlign: 'right', marginTop: 2 }}>{m.hora}</div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ padding: 8, background: 'var(--surface)', borderTop: '1px solid var(--border)', display: 'flex', gap: 8, alignItems: 'flex-end' }}>
        <textarea value={texto} onChange={e => setTexto(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); } }}
          placeholder="Mensagem…" rows={1} style={{
            flex: 1, border: '1px solid var(--border)', borderRadius: 18, padding: '8px 12px',
            fontSize: 13, fontFamily: 'inherit', resize: 'none', outline: 'none', background: 'var(--bg)', color: 'var(--fg)', maxHeight: 80,
          }}/>
        <MicButton onResult={t => setTexto(prev => prev ? prev + ' ' + t : t)} size="sm"/>
        <button onClick={enviar} style={{
          background: 'var(--brand-green)', color: '#FFF', border: 'none', borderRadius: '50%',
          width: 38, height: 38, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer',
        }}>
          <Icon name="send" size={16}/>
        </button>
      </div>
    </div>
  );
};

const PanicoScreen = ({ onBack }) => {
  const { useStore, actions } = window.SentinelaStore;
  const panico = useStore(s => s.panico);
  const me = useStore(s => s.militares.find(x => x.id === s.militarLogadoId));
  const [confirming, setConfirming] = React.useState(false);
  const [holdProgress, setHoldProgress] = React.useState(0);
  const [gpsStatus, setGpsStatus] = React.useState(null); // null | 'a obter' | 'obtido' | 'sem gps'
  const holdRef = React.useRef(null);

  const activarComGPS = () => {
    if (!navigator.geolocation) {
      actions.activarPanico(null);
      return;
    }
    setGpsStatus('a obter');
    navigator.geolocation.getCurrentPosition(
      pos => {
        setGpsStatus('obtido');
        actions.activarPanico({ lat: pos.coords.latitude, lng: pos.coords.longitude });
      },
      () => {
        setGpsStatus('sem gps');
        actions.activarPanico(null);
      },
      { timeout: 6000, enableHighAccuracy: true }
    );
  };

  const startHold = () => {
    holdRef.current = setInterval(() => {
      setHoldProgress(p => {
        if (p >= 100) {
          clearInterval(holdRef.current);
          activarComGPS();
          return 100;
        }
        return p + 4;
      });
    }, 40);
  };
  const stopHold = () => {
    clearInterval(holdRef.current);
    if (holdProgress < 100) setHoldProgress(0);
  };

  if (panico) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--danger)', color: '#FFF' }}>

<script type="text/babel">
/* Sentinela Mobile — Marcação de férias por ordem de antiguidade */

const FeriasScreen = ({ onBack }) => {
  const { useStore, actions, ordemAntiguidade } = window.SentinelaStore;
  const meuId = useStore(s => s.militarLogadoId);
  const ferias = useStore(s => s.ferias);
  const militares = useStore(s => s.militares);

  const eu = militares.find(m => m.id === meuId);
  const fila = ordemAntiguidade(militares);
  const minhaPosicao = fila.findIndex(m => m.id === meuId) + 1;
  const meusTurnoConcluido = ferias.concluidos.includes(meuId);
  const meuTurnoAtivo = ferias.turnoMilitarId === meuId;
  const meusPeriodos = ferias.periodos.filter(p => p.militarId === meuId);
  const diasUsados = meusPeriodos.reduce((s, p) => s + p.dias, 0);
  const diasTotais = eu ? eu.diasFerias : 0;
  const diasRestantes = diasTotais - diasUsados;
  const turnoAtualMilitar = militares.find(m => m.id === ferias.turnoMilitarId);

  const [inicio, setInicio] = React.useState('');
  const [fim, setFim] = React.useState('');
  const [erro, setErro] = React.useState('');
  const [concluido, setConcluido] = React.useState(false);

  const formatDate = d => {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  };

  const adicionarPeriodo = () => {
    setErro('');
    if (!inicio || !fim) { setErro('Escolhe data de início e fim.'); return; }
    if (new Date(fim) < new Date(inicio)) { setErro('A data de fim não pode ser anterior ao início.'); return; }
    const dias = Math.round((new Date(fim) - new Date(inicio)) / 86400000) + 1;
    if (diasUsados + dias > diasTotais) { setErro(`Excede os ${diasTotais} dias disponíveis (${diasRestantes} restantes).`); return; }
    actions.adicionarPeriodoFerias({ militarId: meuId, inicio, fim });
    setInicio('');
    setFim('');
  };

  const concluirMarcacao = () => {
    if (meusPeriodos.length === 0) { setErro('Adiciona pelo menos um período antes de concluir.'); return; }
    actions.concluirMarcacaoFerias(meuId);
    setConcluido(true);
  };

  const todasConcluidas = ferias.turnoMilitarId === null && ferias.concluidos.length > 0;
  const quantosEmFrente = fila.slice(0, minhaPosicao - 1).filter(m => !ferias.concluidos.includes(m.id)).length;

  const inputStyle = {
    width: '100%', padding: '9px 10px', background: 'var(--bg)',
    border: '1px solid var(--border)', borderRadius: 6, fontSize: 13,
    color: 'var(--fg)', boxSizing: 'border-box', fontFamily: 'var(--font-sans)',
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ height: 56, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 14px', gap: 12, flexShrink: 0 }}>
