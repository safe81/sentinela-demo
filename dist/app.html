          <Icon name="arrow-left" size={20}/>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16 }}>Férias {ferias.ano}</div>
          <div style={{ fontSize: 11, color: '#C9A24B' }}>Marcação por antiguidade</div>
        </div>
        <div style={{ fontSize: 11, textAlign: 'right' }}>
          <div style={{ fontWeight: 700 }}>{ferias.concluidos.length}/{militares.length}</div>
          <div style={{ color: '#C9A24B' }}>concluídos</div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 14, background: 'var(--bg)' }}>

        {/* Status banner */}
        {todasConcluidas ? (
          <div style={{ background: 'var(--success)', color: '#FFF', borderRadius: 10, padding: 14, display: 'flex', alignItems: 'center', gap: 10 }}>
            <Icon name="check-circle" size={24}/>
            <div>
              <div style={{ fontWeight: 700 }}>Marcação concluída</div>
              <div style={{ fontSize: 11, opacity: 0.9 }}>Todos os militares marcaram as férias de {ferias.ano}.</div>
            </div>
          </div>
        ) : meusTurnoConcluido ? (
          <div style={{ background: 'rgba(54,128,68,0.10)', border: '1px solid var(--success)', borderRadius: 10, padding: 14, display: 'flex', alignItems: 'center', gap: 10, color: 'var(--success)' }}>
            <Icon name="check-circle" size={20}/>
            <div>
              <div style={{ fontWeight: 700 }}>Marcação concluída</div>
              <div style={{ fontSize: 11 }}>
                {meusPeriodos.length} período{meusPeriodos.length !== 1 ? 's' : ''} · {diasUsados} dias marcados
              </div>
            </div>
          </div>
        ) : meuTurnoAtivo ? (
          <div style={{ background: 'linear-gradient(135deg, #b8912a 0%, var(--brand-gold) 100%)', color: '#FFF', borderRadius: 10, padding: 14, display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 44, height: 44, background: 'rgba(255,255,255,0.20)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Icon name="calendar" size={22}/>
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15 }}>É a sua vez!</div>
              <div style={{ fontSize: 11, opacity: 0.9 }}>Posição {minhaPosicao}ª · até 5 períodos · {diasTotais} dias disponíveis</div>
            </div>
          </div>
        ) : (
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 14 }}>
            <div className="t-overline" style={{ marginBottom: 6 }}>A AGUARDAR</div>
            <div style={{ fontSize: 13, fontWeight: 600 }}>
              {quantosEmFrente} militar{quantosEmFrente !== 1 ? 'es' : ''} à sua frente
            </div>
            <div style={{ fontSize: 11, color: 'var(--fg-muted)', marginTop: 4 }}>
              A marcar agora: {turnoAtualMilitar ? `${turnoAtualMilitar.postoAbrev} ${turnoAtualMilitar.nome}` : '—'} · A sua posição: {minhaPosicao}ª
            </div>
          </div>
        )}

        {/* Days summary bar */}
        {(meuTurnoAtivo || meusTurnoConcluido) && (
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 12 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: 12 }}>
              <span style={{ fontWeight: 600 }}>{diasUsados} dias marcados</span>
              <span style={{ color: 'var(--fg-muted)' }}>{diasRestantes} restantes de {diasTotais}</span>
            </div>
            <div style={{ height: 6, background: 'var(--border)', borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${Math.min((diasUsados / diasTotais) * 100, 100)}%`, background: 'var(--brand-green)', borderRadius: 3, transition: 'width 0.4s' }}/>
            </div>
          </div>
        )}

        {/* My periods */}
        {meusPeriodos.length > 0 && (
          <div>
            <div className="t-overline" style={{ marginBottom: 8 }}>OS MEUS PERÍODOS</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {meusPeriodos.map((p, i) => (
                <div key={p.id} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 28, height: 28, borderRadius: 6, background: 'rgba(31,77,58,0.08)', color: 'var(--brand-green)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700 }}>{i + 1}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, fontWeight: 600 }}>{formatDate(p.inicio)} – {formatDate(p.fim)}</div>
                    <div style={{ fontSize: 10, color: 'var(--fg-muted)' }}>{p.dias} dia{p.dias !== 1 ? 's' : ''}</div>
                  </div>
                  {!meusTurnoConcluido && (
                    <button onClick={() => actions.removerPeriodoFerias(p.id)} style={{ background: 'transparent', border: 'none', color: 'var(--danger)', cursor: 'pointer', padding: 4 }}>
                      <Icon name="trash-2" size={14}/>
                    </button>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Add period form */}
        {meuTurnoAtivo && !meusTurnoConcluido && (
          <div>
            <div className="t-overline" style={{ marginBottom: 8 }}>NOVO PERÍODO ({meusPeriodos.length}/5)</div>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', display: 'block', marginBottom: 4 }}>INÍCIO</label>
                  <input type="date" value={inicio} onChange={e => { setInicio(e.target.value); setErro(''); }}
                    min="2026-01-01" max="2026-12-31" style={inputStyle}/>
                </div>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', display: 'block', marginBottom: 4 }}>FIM</label>
                  <input type="date" value={fim} onChange={e => { setFim(e.target.value); setErro(''); }}
                    min={inicio || '2026-01-01'} max="2026-12-31" style={inputStyle}/>
                </div>
              </div>
              {erro && (
                <div style={{ fontSize: 11, color: 'var(--danger)', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <Icon name="alert-circle" size={13}/> {erro}
                </div>
              )}
              <button onClick={adicionarPeriodo} disabled={meusPeriodos.length >= 5}
                style={{ background: meusPeriodos.length >= 5 ? 'var(--border)' : 'var(--brand-green)', color: '#FFF', border: 'none', borderRadius: 8, padding: 11, fontWeight: 700, fontSize: 13, cursor: meusPeriodos.length >= 5 ? 'not-allowed' : 'pointer' }}>
                {meusPeriodos.length >= 5 ? 'Máximo atingido (5/5)' : '+ Adicionar período'}
              </button>
            </div>
          </div>
        )}

        {/* Conclude button */}
        {meuTurnoAtivo && !meusTurnoConcluido && (
          <button onClick={concluirMarcacao} style={{
            width: '100%', background: meusPeriodos.length > 0 ? 'var(--brand-gold)' : 'var(--surface)',
            color: meusPeriodos.length > 0 ? '#FFF' : 'var(--fg-muted)',
            border: meusPeriodos.length > 0 ? 'none' : '1px solid var(--border)',
            borderRadius: 10, padding: '13px 14px', fontWeight: 700, fontSize: 14, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}>
            <Icon name="check-circle" size={18}/>
            Concluir marcação e passar ao seguinte
          </button>
        )}

        {/* Queue overview */}
        <div>
          <div className="t-overline" style={{ marginBottom: 8 }}>ORDEM DE ANTIGUIDADE</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {fila.map((m, i) => {
              const concluido = ferias.concluidos.includes(m.id);
              const ativo = ferias.turnoMilitarId === m.id;
              const sou = m.id === meuId;
              return (
                <div key={m.id} style={{
                  background: sou ? 'rgba(201,162,75,0.07)' : 'var(--surface)',
                  border: `1px solid ${sou ? 'var(--brand-gold)' : ativo ? 'var(--brand-green)' : 'var(--border)'}`,
                  borderRadius: 8, padding: '8px 12px', display: 'flex', alignItems: 'center', gap: 8,
                }}>
                  <span className="t-mono" style={{ fontSize: 10, color: 'var(--fg-muted)', width: 20, textAlign: 'right' }}>{i + 1}.</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <span style={{ fontSize: 12, fontWeight: sou ? 700 : 600, color: sou ? 'var(--brand-gold)' : 'var(--fg)' }}>
                      {m.postoAbrev} {m.nome}
                    </span>
                  </div>
                  {concluido
                    ? <Icon name="check-circle" size={14} style={{ color: 'var(--success)', flexShrink: 0 }}/>
                    : ativo
                    ? <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--brand-green)', boxShadow: '0 0 6px var(--brand-green)', flexShrink: 0 }}/>
                    : <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--border)', flexShrink: 0 }}/>
                  }
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
};

window.FeriasScreen = FeriasScreen;

</script>
<script type="text/babel">
/* Sentinela Mobile — Home/Shell with bottom nav */

const HomeScreen = ({ onNav }) => {
  const { useStore } = window.SentinelaStore;
  const me = useStore(s => s.militares.find(x => x.id === s.militarLogadoId));
  const patrulhaAtual = useStore(s => s.patrulhaAtual);
  const ordens = useStore(s => s.ordens);
  const notificacoes = useStore(s => s.notificacoes);
  const alertas = useStore(s => s.alertas);
  const diretivas = useStore(s => s.diretivas);

  const novasOS = ordens.filter(o => o.novo).length;
  const naoLidas = notificacoes.filter(n => !n.lida).length;
  const alertasPorConfirmar = alertas.filter(a => !a.confirmado).length;
  const diretivasPendentes = diretivas.filter(d => !d.feito).length;

  if (!me) return null;

  const StatusBanner = patrulhaAtual ? (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
      <button onClick={() => onNav('scanner')} style={{
        width: '100%', background: 'linear-gradient(135deg, var(--brand-green) 0%, var(--brand-green-deep) 100%)',
        color: '#FFF', border: 'none', borderRadius: 12, padding: 14, textAlign: 'left', cursor: 'pointer',
        display: 'flex', alignItems: 'center', gap: 12,
      }}>
        <div style={{ width: 44, height: 44, background: 'rgba(255,255,255,0.15)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="radio" size={22}/>
        </div>
        <div style={{ flex: 1 }}>
          <div className="t-overline" style={{ color: '#C9A24B', marginBottom: 2 }}>EM PATRULHA · {patrulhaAtual.indicativo}</div>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16 }}>Scanner ANPR ativo</div>
          <div style={{ fontSize: 11, opacity: 0.85 }}>{alertasPorConfirmar} alertas por confirmar · {diretivasPendentes} diretivas</div>
        </div>
        <Icon name="chevron-right" size={18}/>
      </button>
      <button onClick={() => onNav('fecharPatrulha')} style={{
        width: '100%', background: 'var(--surface)', border: '1px solid var(--border)',
        borderRadius: 10, padding: '10px 14px', textAlign: 'left', cursor: 'pointer',
        display: 'flex', alignItems: 'center', gap: 10, color: 'var(--fg)',
      }}>
        <Icon name="check-square" size={18} style={{ color: 'var(--brand-green)' }}/>
        <span style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>Fechar patrulha</span>
        <Icon name="chevron-right" size={14} style={{ color: 'var(--fg-soft)' }}/>
      </button>
    </div>
  ) : (
    <button onClick={() => onNav('abrirPatrulha')} style={{
      width: '100%', background: 'var(--surface)', border: '2px dashed var(--brand-green)', color: 'var(--brand-green)',
      borderRadius: 12, padding: 16, textAlign: 'left', cursor: 'pointer',
      display: 'flex', alignItems: 'center', gap: 12,
    }}>
      <div style={{ width: 44, height: 44, background: 'var(--brand-green-soft)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name="play" size={22}/>
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16 }}>Abrir patrulha</div>
        <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>Escolher viatura, parceiro e equipamento</div>
      </div>
      <Icon name="chevron-right" size={18}/>
    </button>
  );

  const QuickAction = ({ icon, label, badge, onClick, color = 'var(--brand-green)' }) => (
    <button onClick={onClick} style={{
      background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10,
      padding: '12px 8px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
      cursor: 'pointer', position: 'relative',
    }}>
      <div style={{
        width: 40, height: 40, borderRadius: 10, background: color === 'var(--danger)' ? 'rgba(199,50,43,0.10)' : 'rgba(31,77,58,0.08)',
        color, display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <Icon name={icon} size={20}/>
      </div>
      <div style={{ fontSize: 11, fontWeight: 600, textAlign: 'center', color: 'var(--fg)' }}>{label}</div>
      {badge > 0 && (
        <span style={{ position: 'absolute', top: 8, right: 8, background: 'var(--danger)', color: '#FFF', fontSize: 10, fontWeight: 700, borderRadius: 999, padding: '1px 6px', minWidth: 18, textAlign: 'center' }}>{badge}</span>
      )}
    </button>
  );

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ height: 60, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 14px', gap: 12, flexShrink: 0 }}>
        <button onClick={() => onNav('perfil')} style={{ background: 'transparent', border: 'none', padding: 0, cursor: 'pointer' }}>
          <Avatar name={me.nome} size={36} style={{ border: '2px solid #C9A24B' }}/>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 14 }}>{me.postoAbrev} {me.nome.split(' ').slice(-1)[0]}</div>
          <div style={{ fontSize: 11, color: '#C9A24B' }}>{me.indicativo} · {me.secao}</div>
        </div>
        <button onClick={() => onNav('notificacoes')} style={{ background: 'transparent', border: 'none', color: '#FFF', cursor: 'pointer', position: 'relative', padding: 4 }}>
          <Icon name="bell" size={20}/>
          {naoLidas > 0 && <span style={{ position: 'absolute', top: 0, right: 0, background: 'var(--danger)', color: '#FFF', fontSize: 9, fontWeight: 700, borderRadius: 999, padding: '0 5px', minWidth: 14, textAlign: 'center' }}>{naoLidas}</span>}
        </button>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 14, background: 'var(--bg)' }}>
        {StatusBanner}

        <div>
          <div className="t-overline" style={{ marginBottom: 8 }}>AÇÕES</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
            <QuickAction icon="scan" label="Scanner" onClick={() => onNav('scanner')}/>
            <QuickAction icon="file-text" label="Auto" onClick={() => onNav('auto')}/>
            <QuickAction icon="message-square" label="Chat" badge={3} onClick={() => onNav('chats')}/>
            <QuickAction icon="siren" label="Pânico" color="var(--danger)" onClick={() => onNav('panico')}/>
          </div>
        </div>

        <div>
          <div className="t-overline" style={{ marginBottom: 8 }}>SERVIÇO</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
            <QuickAction icon="file-text" label="OS" badge={novasOS} onClick={() => onNav('ordens')}/>
            <QuickAction icon="clipboard" label="Briefing" onClick={() => onNav('briefing')}/>
            <QuickAction icon="calendar" label="Escala" onClick={() => onNav('escalas')}/>
            <QuickAction icon="users" label="Lista" onClick={() => onNav('lista')}/>
            <QuickAction icon="sun" label="Férias" onClick={() => onNav('ferias')}/>
          </div>
        </div>

        <div>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 8 }}>
            <div className="t-overline">ÚLTIMAS DETEÇÕES ANPR</div>
            <button onClick={() => onNav('scanner')} style={{ background: 'transparent', border: 'none', color: 'var(--brand-green)', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>Ver tudo</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {alertas.slice(0, 3).map(a => (
              <div key={a.id} style={{
                background: 'var(--surface)', border: '1px solid var(--border)',
                borderLeft: `4px solid ${a.severidade === 'critico' ? 'var(--danger)' : a.severidade === 'aviso' ? 'var(--warning)' : 'var(--info)'}`,
                borderRadius: 8, padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 10,
              }}>
                <Plate value={a.matricula} size="sm"/>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{a.motivo}</div>
                  <div style={{ fontSize: 10, color: 'var(--fg-muted)' }}>{a.hora} · {a.indicativo}</div>
                </div>
                {a.confirmado && <Icon name="check" size={14} style={{ color: 'var(--success)' }}/>}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

const MobileShellV2 = () => {
  const { useStore } = window.SentinelaStore;
  const meId = useStore(s => s.militarLogadoId);
  const panico = useStore(s => s.panico);

  const [route, setRoute] = React.useState('home');
  const [chatId, setChatId] = React.useState(null);

  if (!meId) return <LoginScreen/>;

  // Pânico ativo overrides everything
  if (panico) return <PanicoScreen onBack={() => setRoute('home')}/>;

  const tabActive = ['home', 'scanner', 'chats', 'ordens', 'perfil'].includes(route);

  let content;
  if (route === 'home') content = <HomeScreen onNav={setRoute}/>;
  else if (route === 'scanner') content = <ScannerScreenV2/>;
  else if (route === 'abrirPatrulha') content = <AbrirPatrulhaScreen onBack={() => setRoute('home')} onDone={() => setRoute('scanner')}/>;
  else if (route === 'fecharPatrulha') content = <FecharPatrulhaScreen onBack={() => setRoute('home')} onDone={() => setRoute('home')}/>;
  else if (route === 'auto') content = <AutoNoticiaScreen onBack={() => setRoute('home')} onDone={() => setRoute('home')}/>;
  else if (route === 'panico') content = <PanicoScreen onBack={() => setRoute('home')}/>;
  else if (route === 'ordens') content = <OrdensScreen onBack={() => setRoute('home')}/>;
  else if (route === 'chats') content = chatId ? <ChatThreadScreen chatId={chatId} onBack={() => setChatId(null)}/> : <ChatListScreen onOpen={setChatId} onBack={() => setRoute('home')}/>;
  else if (route === 'lista') content = <ListaTelefonicaScreen onBack={() => setRoute('home')}/>;
  else if (route === 'briefing') content = <BriefingScreen onBack={() => setRoute('home')}/>;
  else if (route === 'escalas') content = <EscalasScreen onBack={() => setRoute('home')}/>;
  else if (route === 'notificacoes') content = <NotificacoesScreen onBack={() => setRoute('home')}/>;
  else if (route === 'perfil') content = <PerfilScreen onBack={() => setRoute('home')}/>;
  else if (route === 'ferias') content = <FeriasScreen onBack={() => setRoute('home')}/>;
  else content = <HomeScreen onNav={setRoute}/>;

  const TabBtn = ({ id, icon, label }) => {
    const ativo = route === id || (id === 'chats' && route === 'chats');
    return (
      <button onClick={() => { setRoute(id); setChatId(null); }} style={{
        flex: 1, background: 'transparent', border: 'none', cursor: 'pointer',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: '6px 0',
        color: ativo ? 'var(--brand-green)' : 'var(--fg-muted)',
      }}>
        <Icon name={icon} size={20}/>
        <span style={{ fontSize: 10, fontWeight: ativo ? 700 : 500 }}>{label}</span>
      </button>
    );
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {content}
      </div>
      {tabActive && (
        <div style={{
          height: 56, background: 'var(--surface)', borderTop: '1px solid var(--border)',
          display: 'flex', flexShrink: 0, paddingBottom: 4,
        }}>
          <TabBtn id="home" icon="home" label="Início"/>
          <TabBtn id="scanner" icon="scan" label="Scanner"/>
          <TabBtn id="chats" icon="message-square" label="Chat"/>
          <TabBtn id="ordens" icon="file-text" label="OS"/>
          <TabBtn id="perfil" icon="user" label="Perfil"/>
        </div>
      )}
    </div>
  );
};

window.MobileShellV2 = MobileShellV2;
window.HomeScreen = HomeScreen;

</script>

/* ---------- MAPA ---------- */
const MapaView = () => {
  const { useStore } = window.SentinelaStore;
  const viaturasMapa = useStore(s => s.viaturasMapa);
  const panico = useStore(s => s.panico);
  const rotaAtual = useStore(s => s.rotaAtual);

  // Animate vehicles slightly
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1500);
    return () => clearInterval(id);
  }, []);

  // Map bounds (Vila Real area)
  const bounds = { minLat: 41.290, maxLat: 41.315, minLng: -7.760, maxLng: -7.735 };
  const project = (lat, lng) => {
    const x = ((lng - bounds.minLng) / (bounds.maxLng - bounds.minLng)) * 100;
    const y = ((bounds.maxLat - lat) / (bounds.maxLat - bounds.minLat)) * 100;
    return { x, y };
  };

  return (
    <div style={{ flex: 1, position: 'relative', background: '#E8EBE5', overflow: 'hidden' }}>
      {/* Stylised map */}
      <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1000 700" style={{ position: 'absolute', inset: 0 }}>
        <defs>
          <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(0,0,0,0.04)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)"/>
        {/* Roads */}
        <path d="M 0 350 Q 200 320, 400 360 T 800 380 L 1000 400" stroke="#FFF" strokeWidth="20" fill="none"/>
        <path d="M 0 350 Q 200 320, 400 360 T 800 380 L 1000 400" stroke="#C8B47A" strokeWidth="3" fill="none"/>
        <path d="M 500 0 L 480 700" stroke="#FFF" strokeWidth="14" fill="none"/>
        <path d="M 500 0 L 480 700" stroke="#C8B47A" strokeWidth="2" fill="none"/>
        <path d="M 100 100 Q 300 150, 500 200 T 900 280" stroke="#FFF" strokeWidth="10" fill="none"/>
        {/* River */}
        <path d="M 0 500 Q 250 480, 500 520 T 1000 530" stroke="#A8C8D8" strokeWidth="14" fill="none" opacity="0.6"/>
        {/* Buildings */}
        <rect x="430" y="320" width="80" height="60" fill="rgba(120,140,120,0.25)" stroke="rgba(120,140,120,0.5)"/>
        <rect x="450" y="280" width="50" height="40" fill="rgba(120,140,120,0.25)" stroke="rgba(120,140,120,0.5)"/>
        <rect x="380" y="380" width="60" height="60" fill="rgba(120,140,120,0.25)" stroke="rgba(120,140,120,0.5)"/>
        <text x="490" y="380" fill="rgba(0,0,0,0.4)" fontSize="11" fontFamily="serif" fontWeight="600">Vila Real centro</text>
        <text x="200" y="350" fill="rgba(0,0,0,0.35)" fontSize="10" fontFamily="serif">EN2</text>
        <text x="850" y="395" fill="rgba(0,0,0,0.35)" fontSize="10" fontFamily="serif">A24</text>
        <text x="510" y="600" fill="rgba(0,0,0,0.35)" fontSize="10" fontFamily="serif">Corgo</text>
      </svg>

      {/* GPS route trail from mobile */}
      {rotaAtual.length >= 2 && (
        <svg viewBox="0 0 100 100" preserveAspectRatio="none"
          style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
          <polyline
            points={rotaAtual.map(p => { const pos = project(p.lat, p.lng); return `${pos.x},${pos.y}`; }).join(' ')}
            fill="none" stroke="#C9A24B" strokeWidth="0.5"
            strokeLinecap="round" strokeLinejoin="round" strokeDasharray="1.2 0.8" opacity="0.9"
          />
          {(() => {
            const last = rotaAtual[rotaAtual.length - 1];
            const pos = project(last.lat, last.lng);
            return <circle cx={pos.x} cy={pos.y} r="1.2" fill="#C9A24B" stroke="#FFF" strokeWidth="0.4"/>;
          })()}
        </svg>
      )}

      {/* Vehicles */}
      {viaturasMapa.map(v => {
        const pos = project(v.lat + Math.sin(tick * 0.5) * 0.0005, v.lng + Math.cos(tick * 0.3) * 0.0005);
        return (
          <div key={v.id} style={{
            position: 'absolute', left: `${pos.x}%`, top: `${pos.y}%`,
            transform: 'translate(-50%, -100%)', transition: 'all 1.5s linear',
          }}>
            <div style={{
              background: 'var(--brand-green-deep)', color: '#FFF', padding: '4px 10px',
              borderRadius: 6, fontSize: 11, fontWeight: 700, fontFamily: 'var(--font-mono)',
              boxShadow: '0 2px 8px rgba(0,0,0,0.3)', whiteSpace: 'nowrap', display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <Icon name="car" size={12}/>
              {v.id}
              <span style={{ color: '#C9A24B', fontSize: 9 }}>{v.velocidade}km/h</span>
            </div>
            <div style={{
              width: 14, height: 14, borderRadius: '50%', background: '#C9A24B',
              border: '3px solid var(--brand-green-deep)', margin: '4px auto 0',
              boxShadow: '0 0 0 4px rgba(201,162,75,0.3)',
            }}/>
            <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--fg)', marginTop: 2, textShadow: '0 0 4px #FFF', textAlign: 'center' }}>{v.militar}</div>
          </div>
        );
      })}

      {/* Panic location */}
      {panico && (() => {
        const pos = project(panico.lat, panico.lng);
        return (
          <div style={{ position: 'absolute', left: `${pos.x}%`, top: `${pos.y}%`, transform: 'translate(-50%, -50%)' }}>
            <div style={{
              width: 60, height: 60, borderRadius: '50%', background: 'rgba(199,50,43,0.3)',
              animation: 'panicPing 1s ease-out infinite', position: 'absolute', inset: '50% 50%', transform: 'translate(-50%, -50%)',
            }}/>
            <div style={{
              width: 24, height: 24, borderRadius: '50%', background: 'var(--danger)',
              border: '3px solid #FFF', position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#FFF',
              boxShadow: '0 4px 12px rgba(0,0,0,0.4)',
            }}>
              <Icon name="siren" size={12}/>
            </div>
            <div style={{
              background: 'var(--danger)', color: '#FFF', padding: '4px 10px',
              borderRadius: 6, fontSize: 11, fontWeight: 700, marginTop: 8, whiteSpace: 'nowrap',
            }}>{panico.indicativo} · PÂNICO</div>
            <style>{`@keyframes panicPing{0%{transform:translate(-50%,-50%) scale(0.5);opacity:1}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}`}</style>
          </div>
        );
      })()}

      {/* Map controls */}
      <div style={{ position: 'absolute', top: 16, right: 16, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: 12, minWidth: 200 }}>
        <div className="t-overline" style={{ marginBottom: 6 }}>UNIDADES NO TERRENO</div>
        {viaturasMapa.map(v => (
          <div key={v.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0', fontSize: 12 }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: v.velocidade > 0 ? 'var(--success)' : 'var(--warning)' }}/>
            <span className="t-mono" style={{ fontWeight: 600 }}>{v.id}</span>
            <span style={{ flex: 1, color: 'var(--fg-muted)' }}>{v.militar}</span>
            <span className="t-mono" style={{ fontSize: 10 }}>{v.velocidade}km/h</span>
          </div>
        ))}
      </div>
    </div>
  );
};

                  <Badge tone={a.severidade === 'critico' ? 'danger' : a.severidade === 'aviso' ? 'warning' : 'info'} size="sm">{a.severidade}</Badge>
                </td>
                <td style={{ padding: '10px 14px' }}>
                  {a.confirmado ? <span style={{ color: 'var(--success)', fontSize: 11, display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="check" size={14}/> ok</span>
                                : <button onClick={() => actions.confirmarAlerta(a.id)} style={{ background: 'var(--brand-green)', color: '#FFF', border: 'none', borderRadius: 4, padding: '4px 10px', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>Confirmar</button>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

Object.assign(window, { PCSidebar, PCTopbar, DashboardView, MapaView, AlertasView });

              <div className="rds-grid-row">
                <div className="rds-grid-label">KM inicial</div>
                <div className="rds-grid-val mono">{patrulha.kmInicial.toLocaleString('pt-PT')}</div>
                <div className="rds-grid-label">KM final</div>
                <div className="rds-grid-val mono">{patrulha.kmFinal ? patrulha.kmFinal.toLocaleString('pt-PT') : '—'}</div>
              </div>
              <div className="rds-grid-row">
                <div className="rds-grid-label">KM percorridos</div>
                <div className="rds-grid-val mono" style={{ fontWeight: 700, color: '#1F4D3A' }}>{km != null ? km.toLocaleString('pt-PT') + ' km' : '—'}</div>
                <div className="rds-grid-label">Combustível</div>
                <div className="rds-grid-val mono">{patrulha.combustivelInicial}% → {patrulha.combustivelFinal != null ? patrulha.combustivelFinal + '%' : '—'} {combConsumido != null && <span style={{ color: '#C7322B', marginLeft: 6 }}>(–{combConsumido}%)</span>}</div>
              </div>
            </div>
          </div>

          {/* Bloco 4 — Ocorrências */}
          <div style={{ marginTop: 14 }}>
            <SectionTitle num="4" title="Ocorrências e eventos do turno"/>
            {eventos.length === 0 ? (
              <div style={{ marginTop: 6, padding: 10, fontSize: 10, color: '#5A6D63', fontStyle: 'italic', border: '1px dashed #C9C2A8' }}>
                Sem ocorrências registadas durante o turno.
              </div>
            ) : (
              <table style={{ width: '100%', borderCollapse: 'collapse', marginTop: 6, fontSize: 10, border: '1px solid #0F2A20' }}>
                <thead>
                  <tr style={{ background: '#F4F2EC' }}>
                    {['Hora','Tipo','Local','Descrição'].map(h => (
                      <th key={h} style={{ padding: '6px 10px', textAlign: 'left', fontSize: 9, fontWeight: 700, letterSpacing: '0.06em', textTransform: 'uppercase', color: '#3A5044', borderBottom: '1px solid #0F2A20', borderRight: '1px solid #C9C2A8' }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {eventos.map((e, i) => (
                    <tr key={e.id || i} style={{ borderBottom: i < eventos.length - 1 ? '1px solid #E8E4D2' : 'none' }}>
                      <td className="t-mono" style={{ padding: '6px 10px', borderRight: '1px solid #E8E4D2', whiteSpace: 'nowrap' }}>{fmtT(e.timestamp || e.criadoEm || patrulha.abertaEm)}</td>
                      <td style={{ padding: '6px 10px', borderRight: '1px solid #E8E4D2', fontWeight: 600 }}>{e.tipo || 'ANPR'}</td>
                      <td style={{ padding: '6px 10px', borderRight: '1px solid #E8E4D2' }}>{e.local || e.matricula || '—'}</td>
                      <td style={{ padding: '6px 10px' }}>{e.descricao || e.motivo || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}
          </div>

          {/* Bloco 5 — Observações */}
          <div style={{ marginTop: 14 }}>
            <SectionTitle num="5" title="Observações do chefe de patrulha"/>
            <div style={{ marginTop: 6, minHeight: 60, padding: '10px 12px', border: '1px solid #C9C2A8', fontSize: 11, color: '#3A5044', whiteSpace: 'pre-wrap' }}>
              {patrulha.observacoes || 'Serviço sem ocorrências de relevo. Patrulhamento conforme escala. Ver detalhe das leituras ANPR no sistema Sentinela.'}
            </div>
          </div>

          {/* Footer / signatures */}
          <div style={{ marginTop: 30, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 30 }}>
            {[tripulacao[0], tripulacao[1] || tripulacao[0]].filter(Boolean).map((m, i) => (
              <div key={i} style={{ textAlign: 'center' }}>
                <div style={{ borderBottom: '1px solid #0F2A20', height: 28 }}/>
                <div style={{ fontSize: 9, color: '#5A6D63', marginTop: 4, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>
                  {i === 0 ? 'Chefe de patrulha' : 'Patrulheiro'}
                </div>
                <div style={{ fontSize: 10, color: '#0F2A20', marginTop: 2 }}>
                  {m.postoAbrev} {m.nome}
                </div>
              </div>
            ))}
          </div>

          <div style={{ marginTop: 24, paddingTop: 10, borderTop: '1px solid #C9C2A8', fontSize: 8, color: '#7A847E', textAlign: 'center' }}>
            Documento gerado automaticamente pela plataforma Sentinela · {new Date().toLocaleString('pt-PT')} · folha 1/1 · uso interno
          </div>
        </div>
      </div>
    </>
  );
};

const SectionTitle = ({ num, title }) => (
  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
    <div style={{
      width: 18, height: 18, background: '#0F2A20', color: '#fff',
      fontSize: 10, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: 'var(--font-mono)',

    <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: '#0F2A20' }}>
      {title}
    </div>
    <div style={{ flex: 1, height: 1, background: '#C9C2A8' }}/>
  </div>
);

window.PatrulhaRDSModal = PatrulhaRDSModal;

</script>

  const submit = () => {
    if (!titulo.trim()) return;
    actions.enviarOS({ titulo, autor: 'Sarg. Costa Ribeiro', paginas: Number(paginas) });
    setTitulo(''); setPaginas(2); setShowForm(false);
  };

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: 22 }}>

        <div style={{ background: 'var(--surface)', border: '1px solid var(--brand-green)', borderRadius: 10, padding: 14, marginBottom: 14 }}>

            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

const MilitaresView = () => {
  const { useStore } = window.SentinelaStore;
  const militares = useStore(s => s.militares);
  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: 22 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
        {militares.map(m => (
          <div key={m.id} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 12, display: 'flex', alignItems: 'center', gap: 12 }}>

            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 600, fontSize: 13 }}>{m.postoAbrev} {m.nome}</div>
              <div className="t-mono" style={{ fontSize: 11, color: 'var(--fg-muted)' }}>NIM {m.nim} · {m.indicativo}</div>
              <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>{m.secao}</div>
            </div>
            <StatusDot tone={m.estado === 'patrulha' ? 'warning' : m.estado === 'servico' ? 'success' : 'muted'}/>
          </div>
        ))}
      </div>
    </div>
  );
};

const PatrulhasView = () => {
  const { useStore } = window.SentinelaStore;
  const patrulhas = useStore(s => s.patrulhasHistorico);
  const viaturas = useStore(s => s.viaturas);
  const militares = useStore(s => s.militares);
  const [rdsId, setRdsId] = React.useState(null);
  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: 22 }}>
      <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10 }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead><tr style={{ background: 'var(--surface-2)' }}>
            {['Indicativo','Viatura','Militares','KM (i/f)','Comb. (i/f)','Aberta','Estado',''].map(h => (
              <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid var(--border)' }}>{h}</th>
            ))}
          </tr></thead>
          <tbody>
            {patrulhas.map(p => {
              const v = viaturas.find(x => x.id === p.viaturaId);
              return (
                <tr key={p.id} style={{ borderBottom: '1px solid var(--border)' }}>
                  <td className="t-mono" style={{ padding: '10px 14px', fontWeight: 700 }}>{p.indicativo}</td>
                  <td style={{ padding: '10px 14px' }}><Plate value={v?.matricula || '—'} size="sm"/></td>
                  <td style={{ padding: '10px 14px', fontSize: 12 }}>
                    {p.militares.map(id => militares.find(m => m.id === id)?.nome.split(' ').slice(-1)[0]).join(' / ')}
                  </td>
                  <td className="t-mono" style={{ padding: '10px 14px', fontSize: 11 }}>{p.kmInicial.toLocaleString('pt-PT')} / {p.kmFinal ? p.kmFinal.toLocaleString('pt-PT') : '—'}</td>
                  <td className="t-mono" style={{ padding: '10px 14px', fontSize: 11 }}>{p.combustivelInicial}% / {p.combustivelFinal != null ? p.combustivelFinal + '%' : '—'}</td>

const EscalasView = () => {
  const D = window.SENTINELA_DATA;
  return (

          <tbody>
            {D.escala.linhas.map(l => (
              <tr key={l.militar} style={{ borderBottom: '1px solid var(--border)' }}>

                  <td key={i} className="t-mono" style={{ padding: '8px', textAlign: 'center', fontSize: 11, fontWeight: 600,
                      background: t === 'FOLGA' ? 'var(--surface-2)' : t === '20-08' ? 'rgba(46,92,138,0.10)' : 'rgba(31,77,58,0.08)',
                      color: t === 'FOLGA' ? 'var(--fg-soft)' : t === '20-08' ? 'var(--info-deep)' : 'var(--brand-green)' }}>{t}</td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const ChatView = () => {
  const { useStore, actions } = window.SentinelaStore;
  const chats = useStore(s => s.chats);
  const militares = useStore(s => s.militares);
  const [active, setActive] = React.useState('c1');
  const [texto, setTexto] = React.useState('');
  const chat = chats[active];

  const labelDe = (id) => {
    if (id === 'sistema') return 'Sistema';
    if (id === 'm_costa') return 'Sarg. Costa (tu)';
    const m = militares.find(x => x.id === id);
    return m ? `${m.postoAbrev} ${m.nome.split(' ').slice(-1)[0]}` : id;
  };

  const enviar = () => {
    if (!texto.trim()) return;
    // PC sempre envia como Sarg. Costa (cmdt)
    const prevId = window.SentinelaStore.getState().militarLogadoId;
    window.SentinelaStore.setState({ militarLogadoId: 'm_costa' });
    actions.enviarMensagem(active, texto.trim());
    if (prevId) window.SentinelaStore.setState({ militarLogadoId: prevId });
    setTexto('');
  };

  return (
    <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
      <div style={{ width: 260, background: 'var(--surface)', borderRight: '1px solid var(--border)', overflowY: 'auto' }}>
        {Object.values(chats).map(c => {
          const last = c.mensagens[c.mensagens.length - 1];
          return (
            <button key={c.id} onClick={() => setActive(c.id)} style={{
              width: '100%', background: active === c.id ? 'var(--surface-2)' : 'transparent',
              border: 'none', borderBottom: '1px solid var(--border)',
              borderLeft: '3px solid ' + (active === c.id ? 'var(--brand-green)' : 'transparent'),
              padding: '12px 14px', textAlign: 'left', cursor: 'pointer',
            }}>
              <div style={{ fontSize: 13, fontWeight: 600 }}>{c.nome}</div>
              <div style={{ fontSize: 11, color: 'var(--fg-muted)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', marginTop: 2 }}>
                {last ? last.texto : '—'}
              </div>
            </button>
          );
        })}
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
        <div style={{ padding: '14px 18px', background: 'var(--surface)', borderBottom: '1px solid var(--border)' }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 14 }}>{chat?.nome}</div>
          <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>{chat?.mensagens.length} mensagens</div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: 18, display: 'flex', flexDirection: 'column', gap: 8 }}>
          {chat?.mensagens.map((m, i) => {
            const proprio = m.de === 'm_costa';
            return (
              <div key={i} style={{ display: 'flex', justifyContent: proprio ? 'flex-end' : 'flex-start' }}>
                <div style={{
                  maxWidth: '70%', background: proprio ? 'var(--brand-green)' : 'var(--surface)',
                  color: proprio ? '#FFF' : 'var(--fg)', border: proprio ? 'none' : '1px solid var(--border)',
                  borderRadius: 10, padding: '8px 12px',
                }}>
                  {!proprio && <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--brand-green-deep)', marginBottom: 2 }}>{labelDe(m.de)}</div>}
                  <div style={{ fontSize: 13 }}>{m.texto}</div>
                  <div className="t-mono" style={{ fontSize: 10, opacity: 0.7, textAlign: 'right', marginTop: 2 }}>{m.hora}</div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ padding: 12, background: 'var(--surface)', borderTop: '1px solid var(--border)', display: 'flex', gap: 8 }}>
          <input value={texto} onChange={e => setTexto(e.target.value)} onKeyDown={e => e.key === 'Enter' && enviar()} placeholder="Mensagem… (envia para o móvel)" className="form-input" style={{ flex: 1 }}/>
          <Button tone="primary" icon="send" onClick={enviar}>Enviar</Button>
        </div>
      </div>
    </div>
  );
};

Object.assign(window, { OSView, ViaturasView, MilitaresView, PatrulhasView, EscalasView, ChatView });

</script>

const GraficoLinha = ({ dados }) => {
  const W = 500, H = 150;
  const pad = { top: 16, right: 36, bottom: 28, left: 36 };
  const gW = W - pad.left - pad.right;
  const gH = H - pad.top - pad.bottom;
  const n = dados.length;
  const xs = dados.map((_, i) => pad.left + (i / (n - 1)) * gW);
  // scale alertas: visible range 8–26
  const yV = v => pad.top + gH - ((v - 8) / 18) * gH;
  const pts = dados.map((d, i) => `${xs[i]},${yV(d.alertas)}`).join(' ');
  const area = `M ${xs[0]},${yV(dados[0].alertas)} ` +
    dados.slice(1).map((d, i) => `L ${xs[i+1]},${yV(d.alertas)}`).join(' ') +
    ` L ${xs[n-1]},${pad.top + gH} L ${xs[0]},${pad.top + gH} Z`;

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ display: 'block' }}>
      {[10, 15, 20, 25].map(v => {
        const y = yV(v);
        if (y < pad.top - 2 || y > pad.top + gH + 2) return null;
        return (
          <g key={v}>
            <line x1={pad.left} y1={y} x2={W - pad.right} y2={y}
              stroke="var(--border)" strokeWidth="1" strokeDasharray="4 3"/>
            <text x={pad.left - 6} y={y + 4} fill="var(--fg-muted)" fontSize="9.5"
              textAnchor="end" fontFamily="var(--font-mono)">{v}</text>
          </g>
        );
      })}

      {dados.map((d, i) => (
        <text key={i} x={xs[i]} y={H - 4} fill="var(--fg-muted)" fontSize="9.5"
          textAnchor="middle" fontFamily="var(--font-sans)">{d.mes}</text>
      ))}

      <path d={area} fill="rgba(199,50,43,0.07)"/>
      <polyline points={pts} fill="none" stroke="#C7322B" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>

      {dados.map((d, i) => (
        <g key={i}>
          <circle cx={xs[i]} cy={yV(d.alertas)} r="4" fill="#C7322B" stroke="var(--surface)" strokeWidth="2.5"/>
          {i === n - 1 && (
            <text x={xs[i] + 10} y={yV(d.alertas) + 4} fill="#C7322B" fontSize="11" fontWeight="700"
              fontFamily="var(--font-mono)">{d.alertas}</text>
          )}
        </g>
      ))}
    </svg>
  );
};

const GraficoBarras = ({ dados }) => {
  const W = 300, H = 130;
  const max = Math.max(...dados.map(d => d.n));
  const barW = 26;
  const step = (W - 10) / dados.length;
  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ display: 'block' }}>
      {dados.map((d, i) => {
        const x = 5 + i * step + (step - barW) / 2;
        const barH = (d.n / (max + 1)) * 95;
        const y = 100 - barH;
        const isMax = d.n === max;
        return (
          <g key={d.dia}>
            <rect x={x} y={y} width={barW} height={barH} rx="5"
              fill={isMax ? 'var(--brand-green)' : 'rgba(31,77,58,0.15)'}/>
            <text x={x + barW / 2} y={y - 5} fill={isMax ? 'var(--brand-green)' : 'var(--fg-muted)'}
              fontSize="9.5" fontWeight="700" textAnchor="middle" fontFamily="var(--font-mono)">{d.n}</text>
            <text x={x + barW / 2} y={118} fill="var(--fg-muted)" fontSize="9.5"
              textAnchor="middle" fontFamily="var(--font-sans)">{d.dia}</text>
          </g>
        );
      })}
    </svg>
  );
};

<script type="text/babel">
/* Sentinela PC — Cronologia de turno + Notificações push + Ocorrências */

/* ── Browser push notifications ── */
const useNotificacoesPush = () => {
  const [permissao, setPermissao] = React.useState(() => {
    if (!('Notification' in window)) return 'unsupported';
    return Notification.permission;
  });

  const pedirPermissao = async () => {
    if (!('Notification' in window)) return;
    const result = await Notification.requestPermission();
    setPermissao(result);
  };

  const notificar = React.useCallback((titulo, opcoes = {}) => {
    if (Notification.permission !== 'granted') return;
    const n = new Notification(titulo, {
      icon: 'assets/sentinela-shield.svg',
      badge: 'assets/sentinela-shield.svg',
      ...opcoes,
    });
    setTimeout(() => n.close(), 6000);
  }, []);

  return { permissao, pedirPermissao, notificar };
};

/* Hook that fires a notification whenever a new critical alert arrives */
const useAlertasNotifier = (notificar) => {
  const alertas = window.SentinelaStore.useStore(s => s.alertas);
  const prevLen = React.useRef(alertas.length);
  React.useEffect(() => {
    if (alertas.length > prevLen.current) {
      const novo = alertas[0];
      if (novo && novo.severidade === 'critico') {
        notificar(`⚠ Alerta CRÍTICO — ${novo.matricula}`, {
          body: `${novo.motivo}\n${novo.local} · ${novo.indicativo}`,
          tag: novo.id,
        });
      } else if (novo) {
        notificar(`Alerta ANPR — ${novo.matricula}`, {
          body: `${novo.motivo} · ${novo.local}`,
          tag: novo.id,
        });
      }
    }
    prevLen.current = alertas.length;
  }, [alertas.length]);
};

const NotifBell = () => {
  const { permissao, pedirPermissao, notificar } = useNotificacoesPush();
  useAlertasNotifier(notificar);

  if (permissao === 'unsupported') return null;

  return (
    <button
      onClick={permissao === 'granted' ? undefined : pedirPermissao}
      title={permissao === 'granted' ? 'Notificações ativas' : 'Ativar notificações do browser'}
      style={{
        background: permissao === 'granted' ? 'rgba(54,128,68,0.12)' : 'var(--surface-2)',
        border: '1px solid ' + (permissao === 'granted' ? 'var(--success)' : 'var(--border)'),
        borderRadius: 6, padding: '6px 10px', cursor: permissao === 'granted' ? 'default' : 'pointer',
        display: 'flex', alignItems: 'center', gap: 6,
        fontSize: 11, fontWeight: 600,
        color: permissao === 'granted' ? 'var(--success)' : 'var(--fg-muted)',
      }}>
      <Icon name="bell" size={14}/>
      {permissao === 'granted' ? 'Notificações ativas' : permissao === 'denied' ? 'Bloqueado' : 'Ativar notificações'}
    </button>
  );
};

/* ── Cronologia ── */
const TIPO_META = {
  patrulha_aberta:   { icon: 'play',           label: 'Patrulha iniciada',    cor: 'var(--success)' },
  patrulha_fechada:  { icon: 'check-square',   label: 'Patrulha encerrada',   cor: 'var(--brand-green)' },
  alerta_anpr:       { icon: 'alert-triangle', label: 'Alerta ANPR',          cor: 'var(--warning)' },
  alerta_confirmado: { icon: 'check',          label: 'Alerta confirmado',    cor: 'var(--info)' },
  ocorrencia:        { icon: 'clipboard-list', label: 'Ocorrência registada', cor: 'var(--brand-gold)' },
  mensagem:          { icon: 'message-square', label: 'Mensagem',             cor: 'var(--fg-soft)' },
  panico_ativo:      { icon: 'siren',          label: 'PEDIDO DE REFORÇO',    cor: 'var(--danger)' },
  panico_cancelado:  { icon: 'x',             label: 'Reforço cancelado',    cor: 'var(--fg-muted)' },
};

const CronologiaView = () => {
  const { useStore } = window.SentinelaStore;
  const eventos = useStore(s => s.eventos);
  const [filtro, setFiltro] = React.useState('todos');

  const tipos = ['todos', 'patrulha_aberta', 'patrulha_fechada', 'alerta_anpr', 'ocorrencia', 'panico_ativo'];

  const visiveis = filtro === 'todos'
    ? eventos
    : eventos.filter(e => e.tipo === filtro);

  if (eventos.length === 0) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 14, color: 'var(--fg-muted)', padding: 40 }}>
        <Icon name="clock" size={40} style={{ opacity: 0.3 }}/>
        <div style={{ fontSize: 14, fontWeight: 600 }}>Sem eventos registados</div>
        <div style={{ fontSize: 12, textAlign: 'center', maxWidth: 280 }}>
          Os eventos aparecem aqui automaticamente — abre uma patrulha, gera alertas ANPR ou regista ocorrências.
        </div>
      </div>
    );
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Filter bar */}
      <div style={{ padding: '12px 22px', borderBottom: '1px solid var(--border)', display: 'flex', gap: 6, flexWrap: 'wrap', background: 'var(--surface)', flexShrink: 0 }}>
        {tipos.map(t => {
          const meta = TIPO_META[t];
          return (
            <button key={t} onClick={() => setFiltro(t)} style={{
              background: filtro === t ? 'var(--brand-green)' : 'var(--surface-2)',
              color: filtro === t ? '#FFF' : 'var(--fg)',
              border: '1px solid ' + (filtro === t ? 'var(--brand-green)' : 'var(--border)'),
              borderRadius: 6, padding: '5px 12px', fontSize: 11, fontWeight: 600, cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 5,
            }}>
              {meta && <Icon name={meta.icon} size={12}/>}
              {meta ? meta.label : 'Todos'}
            </button>
          );
        })}
        <div style={{ flex: 1 }}/>
        <div style={{ fontSize: 11, color: 'var(--fg-muted)', alignSelf: 'center' }}>{visiveis.length} evento{visiveis.length !== 1 ? 's' : ''}</div>
      </div>

      {/* Timeline */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 22px' }}>
        <div style={{ position: 'relative' }}>
          {/* Vertical line */}
          <div style={{ position: 'absolute', left: 19, top: 0, bottom: 0, width: 2, background: 'var(--border)' }}/>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
            {visiveis.map((ev, i) => {
              const meta = TIPO_META[ev.tipo] || { icon: 'info', label: ev.tipo, cor: 'var(--fg-muted)' };
              const isPanico = ev.tipo === 'panico_ativo';
              return (
                <div key={ev.id} style={{ display: 'flex', gap: 14, paddingBottom: 20, position: 'relative' }}>
                  {/* Icon dot */}
                  <div style={{
                    width: 40, height: 40, borderRadius: '50%', flexShrink: 0, zIndex: 1,
                    background: isPanico ? 'var(--danger)' : 'var(--surface)',
                    border: `2px solid ${meta.cor}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: isPanico ? '#FFF' : meta.cor,
                    boxShadow: isPanico ? '0 0 0 4px rgba(199,50,43,0.15)' : 'none',
                  }}>
                    <Icon name={meta.icon} size={16}/>
                  </div>

                  {/* Content */}
                  <div style={{
                    flex: 1, background: 'var(--surface)', border: '1px solid var(--border)',
                    borderLeft: `3px solid ${meta.cor}`,
                    borderRadius: 8, padding: '10px 14px', marginTop: 4,
                    background: isPanico ? 'rgba(199,50,43,0.04)' : 'var(--surface)',
                  }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 2 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: isPanico ? 'var(--danger)' : 'var(--fg)' }}>
                        {ev.descricao}
                      </div>
                      <span className="t-mono" style={{ fontSize: 10, color: 'var(--fg-muted)', marginLeft: 'auto' }}>{ev.hora}</span>
                    </div>
                    <div style={{ fontSize: 10, color: 'var(--fg-muted)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{meta.label}</div>
                    {ev.dados?.matricula && (
                      <div style={{ marginTop: 6 }}><Plate value={ev.dados.matricula} size="sm"/></div>
                    )}
                    {ev.dados?.numero && (
                      <div style={{ marginTop: 4 }}><Badge tone="brand" size="sm">{ev.dados.numero}</Badge></div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ── Ocorrências view (PC) ── */

};

Object.assign(window, { CronologiaView, OcorrenciasView, NotifBell });

<script type="text/babel">
/* Sentinela PC — Gestão de férias anuais */

const FeriasView = () => {
  const { useStore, ordemAntiguidade } = window.SentinelaStore;
  const ferias = useStore(s => s.ferias);
  const militares = useStore(s => s.militares);

  const fila = ordemAntiguidade(militares);

  // Year 2026 Gantt helpers
  const YEAR_START = new Date('2026-01-01');
  const YEAR_DAYS = 365;
  const dayOffset = dateStr => Math.floor((new Date(dateStr) - YEAR_START) / 86400000);

  const MONTHS = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const MONTH_DAYS = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
  const monthPct = d => (d / YEAR_DAYS) * 100;

  const totalConcluidos = ferias.concluidos.length;
  const turnoAtualMilitar = militares.find(m => m.id === ferias.turnoMilitarId);
  const formatDate = d => { if (!d) return '—'; const [y, m, day] = d.split('-'); return `${day}/${m}/${y}`; };

  const totalDiasMarcados = ferias.periodos.reduce((s, p) => s + p.dias, 0);
  const totalDiasDisponiveis = militares.reduce((s, m) => s + (m.diasFerias || 0), 0);

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Sub-header KPIs */}
      <div style={{ padding: '12px 22px', background: 'var(--surface)', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 20, flexShrink: 0 }}>
        {[
          { label: 'Concluídos', value: totalConcluidos, total: militares.length, color: 'var(--success)' },
          { label: 'Aguardam', value: militares.length - totalConcluidos, color: 'var(--fg-muted)' },
          { label: 'Períodos marcados', value: ferias.periodos.length, color: 'var(--brand-green)' },
          { label: 'Dias marcados', value: totalDiasMarcados, color: 'var(--info)' },
        ].map(k => (
          <div key={k.label} style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: k.color, fontFamily: 'var(--font-display)', lineHeight: 1 }}>
              {k.value}{k.total ? `/${k.total}` : ''}
            </div>
            <div style={{ fontSize: 10, color: 'var(--fg-muted)', marginTop: 2, fontWeight: 600, letterSpacing: '0.05em', textTransform: 'uppercase' }}>{k.label}</div>
          </div>
        ))}
        <div style={{ flex: 1 }}/>
        {turnoAtualMilitar ? (
          <div style={{ background: 'rgba(201,162,75,0.12)', border: '1px solid var(--brand-gold)', borderRadius: 8, padding: '7px 14px', display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--brand-gold)', boxShadow: '0 0 6px var(--brand-gold)', animation: 'pulse 1.5s ease-in-out infinite' }}/>
            <div>
              <div style={{ fontSize: 10, fontWeight: 700, color: 'var(--brand-gold)', letterSpacing: '0.06em' }}>A MARCAR AGORA</div>
              <div style={{ fontSize: 13, fontWeight: 600 }}>{turnoAtualMilitar.postoAbrev} {turnoAtualMilitar.nome}</div>
            </div>
          </div>
        ) : ferias.concluidos.length > 0 ? (
          <div style={{ background: 'rgba(54,128,68,0.10)', border: '1px solid var(--success)', borderRadius: 8, padding: '7px 14px', display: 'flex', alignItems: 'center', gap: 8, color: 'var(--success)' }}>
            <Icon name="check-circle" size={16}/>
            <div style={{ fontSize: 13, fontWeight: 600 }}>Toda a marcação concluída</div>
          </div>
        ) : null}
        <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}`}</style>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: 22 }}>

        {/* Gantt chart */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden', marginBottom: 20 }}>
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 8 }}>
            <Icon name="calendar" size={16} style={{ color: 'var(--brand-green)' }}/>
            <div style={{ fontWeight: 600, fontSize: 13 }}>Distribuição anual de férias — {ferias.ano}</div>
            <div style={{ flex: 1 }}/>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, fontSize: 11 }}>
              <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style={{ width: 12, height: 8, background: 'var(--brand-green)', borderRadius: 2, display: 'inline-block' }}/> Confirmado
              </span>
              <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <span style={{ width: 12, height: 8, background: 'var(--brand-green)', borderRadius: 2, display: 'inline-block', opacity: 0.4 }}/> Em edição
              </span>
            </div>
          </div>

          {/* Month header row */}
          <div style={{ display: 'flex', borderBottom: '1px solid var(--border)', background: 'var(--surface-2)', height: 30 }}>
            <div style={{ width: 190, flexShrink: 0, borderRight: '1px solid var(--border)', display: 'flex', alignItems: 'center', padding: '0 14px' }}>
              <span style={{ fontSize: 10, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase' }}>Militar</span>
            </div>
            <div style={{ flex: 1, position: 'relative' }}>
              {MONTHS.map((m, i) => (
                <React.Fragment key={m}>
                  <div style={{ position: 'absolute', left: `${monthPct(MONTH_DAYS[i])}%`, top: 0, bottom: 0, width: 1, background: 'var(--border)' }}/>
                  <div style={{ position: 'absolute', left: `${monthPct(MONTH_DAYS[i])}%`, top: '50%', transform: 'translateY(-50%)', paddingLeft: 4, fontSize: 10, fontWeight: 600, color: 'var(--fg-muted)', pointerEvents: 'none', whiteSpace: 'nowrap' }}>{m}</div>
                </React.Fragment>
              ))}
            </div>
          </div>

          {/* Military rows */}
          {fila.map((m, i) => {
            const periodos = ferias.periodos.filter(p => p.militarId === m.id);
            const concluido = ferias.concluidos.includes(m.id);
            const ativo = ferias.turnoMilitarId === m.id;
            const diasUsados = periodos.reduce((s, p) => s + p.dias, 0);

            return (
              <div key={m.id} style={{
                display: 'flex', borderBottom: '1px solid var(--border)', minHeight: 34,
                background: ativo ? 'rgba(201,162,75,0.04)' : i % 2 === 0 ? 'transparent' : 'rgba(0,0,0,0.012)',
              }}>
                <div style={{ width: 190, flexShrink: 0, borderRight: '1px solid var(--border)', padding: '6px 14px', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span className="t-mono" style={{ fontSize: 10, color: 'var(--fg-muted)', width: 18 }}>{i + 1}.</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.postoAbrev} {m.nome}</div>
                    <div style={{ fontSize: 10, color: 'var(--fg-muted)' }}>{diasUsados}/{m.diasFerias}d</div>
                  </div>
                  {concluido
                    ? <Icon name="check-circle" size={12} style={{ color: 'var(--success)', flexShrink: 0 }}/>
                    : ativo
                    ? <div style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--brand-gold)', flexShrink: 0 }}/>
                    : null
                  }
                </div>
                <div style={{ flex: 1, position: 'relative' }}>
                  {/* Month grid lines */}
                  {MONTH_DAYS.map((d, j) => (
                    <div key={j} style={{ position: 'absolute', left: `${monthPct(d)}%`, top: 0, bottom: 0, width: 1, background: 'var(--border)', opacity: 0.4 }}/>
                  ))}
                  {/* Vacation bars */}
                  {periodos.map(p => {
                    const left = (dayOffset(p.inicio) / YEAR_DAYS) * 100;
                    const width = Math.max((p.dias / YEAR_DAYS) * 100, 0.3);
                    return (
                      <div key={p.id} title={`${formatDate(p.inicio)} – ${formatDate(p.fim)} (${p.dias} dias)`}
                        style={{
                          position: 'absolute', top: '18%', height: '64%',
                          left: `${left}%`, width: `${width}%`,
                          background: 'var(--brand-green)', borderRadius: 3,
                          opacity: concluido ? 0.85 : 0.45,
                          cursor: 'default',
                        }}
                      />
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* Queue table */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
          <div style={{ padding: '12px 16px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 8 }}>
            <Icon name="users" size={16} style={{ color: 'var(--brand-green)' }}/>
            <div style={{ fontWeight: 600, fontSize: 13 }}>Ordem de antiguidade · Marcação de férias {ferias.ano}</div>
          </div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
              <thead>
                <tr style={{ background: 'var(--surface-2)' }}>
                  {['#','Militar','Posto','Ano ingresso','Estado','Períodos','Dias marcados','Dias disponíveis','Detalhes'].map(h => (
                    <th key={h} style={{ padding: '8px 14px', textAlign: 'left', fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid var(--border)', whiteSpace: 'nowrap' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {fila.map((m, i) => {
                  const periodos = ferias.periodos.filter(p => p.militarId === m.id);
                  const concluido = ferias.concluidos.includes(m.id);
                  const ativo = ferias.turnoMilitarId === m.id;
                  const diasUsados = periodos.reduce((s, p) => s + p.dias, 0);

                  return (
                    <tr key={m.id} style={{
                      borderBottom: '1px solid var(--border)',
                      background: ativo ? 'rgba(201,162,75,0.05)' : 'transparent',
                    }}>
                      <td className="t-mono" style={{ padding: '10px 14px', color: 'var(--fg-muted)', fontSize: 11 }}>{i + 1}</td>
                      <td style={{ padding: '10px 14px', fontWeight: 600 }}>{m.nome}</td>
                      <td style={{ padding: '10px 14px' }}>
                        <span style={{ background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 4, padding: '2px 7px', fontSize: 11, fontWeight: 600 }}>{m.postoAbrev}</span>
                      </td>
                      <td className="t-mono" style={{ padding: '10px 14px', fontSize: 12 }}>{m.anoIngresso}</td>
                      <td style={{ padding: '10px 14px' }}>
                        {concluido
                          ? <Badge tone="success" size="sm">Concluído</Badge>
                          : ativo
                          ? <Badge tone="warning" size="sm">A marcar</Badge>
                          : <Badge tone="info" size="sm">Aguarda</Badge>
                        }
                      </td>
                      <td className="t-mono" style={{ padding: '10px 14px', fontSize: 12 }}>{periodos.length}/5</td>
                      <td className="t-mono" style={{ padding: '10px 14px', fontSize: 12, fontWeight: 600 }}>{diasUsados}</td>
                      <td style={{ padding: '10px 14px' }}>
                        <span className="t-mono" style={{ fontSize: 12, color: 'var(--brand-green)', fontWeight: 700 }}>{m.diasFerias}</span>
                      </td>
                      <td style={{ padding: '10px 14px', fontSize: 11, color: 'var(--fg-muted)' }}>
                        {periodos.map(p => `${formatDate(p.inicio)}–${formatDate(p.fim)}`).join(' · ') || '—'}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
};

window.FeriasView = FeriasView;

</script>

/* ---- Tab: Sistema ---- */
const AdminSistema = () => {
  const { useStore, actions, getState } = window.SentinelaStore;
  const tema = useStore(s => s.tema);
  const [resetConf, setResetConf] = React.useState(false);

  const exportarJSON = () => {
    const data = JSON.stringify(getState(), null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sentinela-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div style={{ maxWidth: 540 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>

        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 16 }}>
          <div className="t-overline" style={{ marginBottom: 12 }}>TEMA DA INTERFACE</div>
          <div style={{ display: 'flex', gap: 8 }}>
            {[['claro', 'sun', 'Modo dia'], ['noturno', 'moon', 'Ronda noturna']].map(([t, icon, label]) => (
              <button key={t} onClick={() => actions.setTema(t)} style={{
                flex: 1, padding: '10px 14px',
                border: `1px solid ${tema === t ? 'var(--brand-green)' : 'var(--border)'}`,
                borderRadius: 8, cursor: 'pointer',
                background: tema === t ? 'rgba(31,77,58,0.08)' : 'var(--bg)',
                color: tema === t ? 'var(--brand-green)' : 'var(--fg)',
                fontWeight: tema === t ? 700 : 500, fontSize: 13,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              }}>
                <Icon name={icon} size={16}/> {label}
              </button>
            ))}
          </div>
        </div>

        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 16 }}>
          <div className="t-overline" style={{ marginBottom: 12 }}>DADOS E BACKUP</div>
          <button onClick={exportarJSON} style={{
            background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 8,
            padding: '10px 14px', cursor: 'pointer', fontWeight: 600, fontSize: 13,
            display: 'flex', alignItems: 'center', gap: 8, width: '100%',
          }}>
            <Icon name="download" size={16} style={{ color: 'var(--brand-green)' }}/>
            Exportar dados para JSON (backup completo)
          </button>
        </div>

        <div style={{ background: 'var(--surface)', border: '1px solid rgba(199,50,43,0.3)', borderRadius: 10, padding: 16 }}>
          <div className="t-overline" style={{ marginBottom: 12, color: 'var(--danger)' }}>ZONA DE PERIGO</div>
          {!resetConf ? (
            <button onClick={() => setResetConf(true)} style={{
              background: 'transparent', border: '1px solid var(--danger)', borderRadius: 8,
              padding: '9px 14px', cursor: 'pointer', fontWeight: 600, fontSize: 13,
              color: 'var(--danger)', display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <Icon name="trash-2" size={15}/> Repor dados de demonstração
            </button>
          ) : (
            <div>
              <p style={{ fontSize: 12, color: 'var(--fg-muted)', margin: '0 0 12px' }}>
                Tens a certeza? Todos os dados actuais serão apagados e substituídos pelos dados de demonstração. Esta acção não pode ser desfeita.
