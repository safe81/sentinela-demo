                {o.novo && <Badge tone="danger" size="sm">NOVA</Badge>}
              </div>
              <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>{o.autor} · {o.data}</div>
            </div>
            <Icon name="chevron-right" size={16} style={{ color: 'var(--fg-soft)' }}/>
          </button>
        ))}
      </div>
    </div>
  );
};

Object.assign(window, { PanicoScreen, AutoNoticiaScreen, OrdensScreen });

</script>
<script type="text/babel">
/* Sentinela Mobile — Marcação de férias por ordem de antiguidade */

const FeriasScreen = ({ onBack }) => {
  const { useStore, actions, ordemAntiguidade } = window.SentinelaStore;
  const meuId = useStore(s => s.militarLogadoId);
  const ferias = useStore(s => s.ferias);
  const militares = useStore(s => s.militares);

  const eu = militares.find(m => m.id === meuId);
  const fila = ordemAntiguidade(militares);
  const minhaPosicao = fila.findIndex(m => m.id === meuId) + 1;
  const meusTurnoConcluido = ferias.concluidos.includes(meuId);
  const meuTurnoAtivo = ferias.turnoMilitarId === meuId;
  const meusPeriodos = ferias.periodos.filter(p => p.militarId === meuId);
  const diasUsados = meusPeriodos.reduce((s, p) => s + p.dias, 0);
  const diasTotais = eu ? eu.diasFerias : 0;
  const diasRestantes = diasTotais - diasUsados;
  const turnoAtualMilitar = militares.find(m => m.id === ferias.turnoMilitarId);

  const [inicio, setInicio] = React.useState('');
  const [fim, setFim] = React.useState('');
  const [erro, setErro] = React.useState('');
  const [concluido, setConcluido] = React.useState(false);

  const formatDate = d => {
    if (!d) return '—';
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  };

  const adicionarPeriodo = () => {
    setErro('');
    if (!inicio || !fim) { setErro('Escolhe data de início e fim.'); return; }
    if (new Date(fim) < new Date(inicio)) { setErro('A data de fim não pode ser anterior ao início.'); return; }
    const dias = Math.round((new Date(fim) - new Date(inicio)) / 86400000) + 1;
    if (diasUsados + dias > diasTotais) { setErro(`Excede os ${diasTotais} dias disponíveis (${diasRestantes} restantes).`); return; }
    actions.adicionarPeriodoFerias({ militarId: meuId, inicio, fim });
    setInicio('');
    setFim('');
  };

  const concluirMarcacao = () => {
    if (meusPeriodos.length === 0) { setErro('Adiciona pelo menos um período antes de concluir.'); return; }
    actions.concluirMarcacaoFerias(meuId);
    setConcluido(true);
  };

  const todasConcluidas = ferias.turnoMilitarId === null && ferias.concluidos.length > 0;
  const quantosEmFrente = fila.slice(0, minhaPosicao - 1).filter(m => !ferias.concluidos.includes(m.id)).length;

  const inputStyle = {
    width: '100%', padding: '9px 10px', background: 'var(--bg)',
    border: '1px solid var(--border)', borderRadius: 6, fontSize: 13,
    color: 'var(--fg)', boxSizing: 'border-box', fontFamily: 'var(--font-sans)',
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ height: 56, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 14px', gap: 12, flexShrink: 0 }}>
        <button onClick={onBack} style={{ background: 'transparent', border: 'none', color: '#FFF', cursor: 'pointer', padding: 4 }}>
          <Icon name="arrow-left" size={20}/>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16 }}>Férias {ferias.ano}</div>
          <div style={{ fontSize: 11, color: '#C9A24B' }}>Marcação por antiguidade</div>
        </div>
        <div style={{ fontSize: 11, textAlign: 'right' }}>
          <div style={{ fontWeight: 700 }}>{ferias.concluidos.length}/{militares.length}</div>
          <div style={{ color: '#C9A24B' }}>concluídos</div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 14, background: 'var(--bg)' }}>

        {/* Status banner */}
        {todasConcluidas ? (
          <div style={{ background: 'var(--success)', color: '#FFF', borderRadius: 10, padding: 14, display: 'flex', alignItems: 'center', gap: 10 }}>
            <Icon name="check-circle" size={24}/>
            <div>
              <div style={{ fontWeight: 700 }}>Marcação concluída</div>
              <div style={{ fontSize: 11, opacity: 0.9 }}>Todos os militares marcaram as férias de {ferias.ano}.</div>
            </div>
          </div>
        ) : meusTurnoConcluido ? (
          <div style={{ background: 'rgba(54,128,68,0.10)', border: '1px solid var(--success)', borderRadius: 10, padding: 14, display: 'flex', alignItems: 'center', gap: 10, color: 'var(--success)' }}>
            <Icon name="check-circle" size={20}/>
            <div>
              <div style={{ fontWeight: 700 }}>Marcação concluída</div>
              <div style={{ fontSize: 11 }}>
                {meusPeriodos.length} período{meusPeriodos.length !== 1 ? 's' : ''} · {diasUsados} dias marcados
              </div>
            </div>
          </div>
        ) : meuTurnoAtivo ? (
          <div style={{ background: 'linear-gradient(135deg, #b8912a 0%, var(--brand-gold) 100%)', color: '#FFF', borderRadius: 10, padding: 14, display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 44, height: 44, background: 'rgba(255,255,255,0.20)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Icon name="calendar" size={22}/>
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15 }}>É a sua vez!</div>
              <div style={{ fontSize: 11, opacity: 0.9 }}>Posição {minhaPosicao}ª · até 5 períodos · {diasTotais} dias disponíveis</div>
            </div>
          </div>
        ) : (
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 14 }}>
            <div className="t-overline" style={{ marginBottom: 6 }}>A AGUARDAR</div>
            <div style={{ fontSize: 13, fontWeight: 600 }}>
              {quantosEmFrente} militar{quantosEmFrente !== 1 ? 'es' : ''} à sua frente
            </div>
            <div style={{ fontSize: 11, color: 'var(--fg-muted)', marginTop: 4 }}>
              A marcar agora: {turnoAtualMilitar ? `${turnoAtualMilitar.postoAbrev} ${turnoAtualMilitar.nome}` : '—'} · A sua posição: {minhaPosicao}ª
            </div>
          </div>
        )}

        {/* Days summary bar */}
        {(meuTurnoAtivo || meusTurnoConcluido) && (
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 12 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 8, fontSize: 12 }}>
              <span style={{ fontWeight: 600 }}>{diasUsados} dias marcados</span>
              <span style={{ color: 'var(--fg-muted)' }}>{diasRestantes} restantes de {diasTotais}</span>
            </div>
            <div style={{ height: 6, background: 'var(--border)', borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${Math.min((diasUsados / diasTotais) * 100, 100)}%`, background: 'var(--brand-green)', borderRadius: 3, transition: 'width 0.4s' }}/>
            </div>
          </div>
        )}

        {/* My periods */}
        {meusPeriodos.length > 0 && (
          <div>
            <div className="t-overline" style={{ marginBottom: 8 }}>OS MEUS PERÍODOS</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {meusPeriodos.map((p, i) => (
                <div key={p.id} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 28, height: 28, borderRadius: 6, background: 'rgba(31,77,58,0.08)', color: 'var(--brand-green)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700 }}>{i + 1}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, fontWeight: 600 }}>{formatDate(p.inicio)} – {formatDate(p.fim)}</div>
                    <div style={{ fontSize: 10, color: 'var(--fg-muted)' }}>{p.dias} dia{p.dias !== 1 ? 's' : ''}</div>
                  </div>
                  {!meusTurnoConcluido && (
                    <button onClick={() => actions.removerPeriodoFerias(p.id)} style={{ background: 'transparent', border: 'none', color: 'var(--danger)', cursor: 'pointer', padding: 4 }}>
                      <Icon name="trash-2" size={14}/>
                    </button>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Add period form */}
        {meuTurnoAtivo && !meusTurnoConcluido && (
          <div>
            <div className="t-overline" style={{ marginBottom: 8 }}>NOVO PERÍODO ({meusPeriodos.length}/5)</div>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: 14, display: 'flex', flexDirection: 'column', gap: 10 }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', display: 'block', marginBottom: 4 }}>INÍCIO</label>
                  <input type="date" value={inicio} onChange={e => { setInicio(e.target.value); setErro(''); }}
                    min="2026-01-01" max="2026-12-31" style={inputStyle}/>
                </div>
                <div>
                  <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', display: 'block', marginBottom: 4 }}>FIM</label>
                  <input type="date" value={fim} onChange={e => { setFim(e.target.value); setErro(''); }}
                    min={inicio || '2026-01-01'} max="2026-12-31" style={inputStyle}/>
                </div>
              </div>
              {erro && (
                <div style={{ fontSize: 11, color: 'var(--danger)', display: 'flex', alignItems: 'center', gap: 6 }}>
                  <Icon name="alert-circle" size={13}/> {erro}
                </div>
              )}
              <button onClick={adicionarPeriodo} disabled={meusPeriodos.length >= 5}
                style={{ background: meusPeriodos.length >= 5 ? 'var(--border)' : 'var(--brand-green)', color: '#FFF', border: 'none', borderRadius: 8, padding: 11, fontWeight: 700, fontSize: 13, cursor: meusPeriodos.length >= 5 ? 'not-allowed' : 'pointer' }}>
                {meusPeriodos.length >= 5 ? 'Máximo atingido (5/5)' : '+ Adicionar período'}
              </button>
            </div>
          </div>
        )}

        {/* Conclude button */}
        {meuTurnoAtivo && !meusTurnoConcluido && (
          <button onClick={concluirMarcacao} style={{
            width: '100%', background: meusPeriodos.length > 0 ? 'var(--brand-gold)' : 'var(--surface)',
            color: meusPeriodos.length > 0 ? '#FFF' : 'var(--fg-muted)',
            border: meusPeriodos.length > 0 ? 'none' : '1px solid var(--border)',
            borderRadius: 10, padding: '13px 14px', fontWeight: 700, fontSize: 14, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}>
            <Icon name="check-circle" size={18}/>
            Concluir marcação e passar ao seguinte
          </button>
        )}

        {/* Queue overview */}
        <div>
          <div className="t-overline" style={{ marginBottom: 8 }}>ORDEM DE ANTIGUIDADE</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {fila.map((m, i) => {
              const concluido = ferias.concluidos.includes(m.id);
              const ativo = ferias.turnoMilitarId === m.id;
              const sou = m.id === meuId;
              return (
                <div key={m.id} style={{
                  background: sou ? 'rgba(201,162,75,0.07)' : 'var(--surface)',
                  border: `1px solid ${sou ? 'var(--brand-gold)' : ativo ? 'var(--brand-green)' : 'var(--border)'}`,
                  borderRadius: 8, padding: '8px 12px', display: 'flex', alignItems: 'center', gap: 8,
                }}>
                  <span className="t-mono" style={{ fontSize: 10, color: 'var(--fg-muted)', width: 20, textAlign: 'right' }}>{i + 1}.</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <span style={{ fontSize: 12, fontWeight: sou ? 700 : 600, color: sou ? 'var(--brand-gold)' : 'var(--fg)' }}>
                      {m.postoAbrev} {m.nome}
                    </span>
                  </div>
                  {concluido
                    ? <Icon name="check-circle" size={14} style={{ color: 'var(--success)', flexShrink: 0 }}/>
                    : ativo
                    ? <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--brand-green)', boxShadow: '0 0 6px var(--brand-green)', flexShrink: 0 }}/>
                    : <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--border)', flexShrink: 0 }}/>
                  }
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
};

window.FeriasScreen = FeriasScreen;

</script>
<script type="text/babel">
/* Sentinela Mobile — Registo de Patrulha (Fecho / Finalizar) */

const RegistoPatrulhaScreen = ({ onBack, store }) => {
  const { useStore, actions } = window.SentinelaStore;
  const patrulhaAtual = useStore(s => s.patrulhaAtual);
  const viaturas = useStore(s => s.viaturas);

  const viatura = patrulhaAtual ? viaturas.find(v => v.id === patrulhaAtual.viaturaId) : null;
  const matricula = viatura ? viatura.matricula : 'GNR-—-——';

  const [kmFinais, setKmFinais] = React.useState('');
  const [litros, setLitros] = React.useState('');
  const [localAbastecimento, setLocalAbastecimento] = React.useState('');
  const [temDanos, setTemDanos] = React.useState(false);
  const [descricaoDanos, setDescricaoDanos] = React.useState('');
  const [enviando, setEnviando] = React.useState(false);
  const [enviado, setEnviado] = React.useState(false);

  const handleFinalizar = () => {
    if (!kmFinais) return;
    setEnviando(true);
    setTimeout(() => {
      setEnviando(false);
      setEnviado(true);
      setTimeout(() => onBack(), 1500);
    }, 1200);
  };

  if (enviado) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: 'var(--bg)', gap: 16, padding: 24 }}>
        <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'var(--success-soft)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <Icon name="check" size={32} style={{ color: 'var(--success)' }}/>
        </div>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 18, textAlign: 'center' }}>Relatório enviado</div>
        <div style={{ fontSize: 13, color: 'var(--fg-muted)', textAlign: 'center' }}>A patrulha foi fechada com sucesso.</div>
      </div>
    );
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ height: 52, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 12px', gap: 10, flexShrink: 0 }}>
        <button onClick={onBack} style={{ background: 'transparent', border: 'none', color: '#FFF', display: 'flex', cursor: 'pointer', padding: 4 }}>
          <Icon name="arrow-left" size={20}/>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 14, fontFamily: 'var(--font-display)' }}>Registo de Patrulha</div>
          <div style={{ fontSize: 10, color: '#C9A24B' }}>Finalizar serviço · {matricula}</div>
        </div>
        <Icon name="clipboard" size={18}/>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', background: 'var(--bg)', padding: '14px 14px', display: 'flex', flexDirection: 'column', gap: 14 }}>

        {/* Viatura info */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 40, height: 40, borderRadius: 10, background: 'var(--brand-green-soft)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <Icon name="truck" size={20} style={{ color: '#FFF' }}/>
          </div>
          <div style={{ flex: 1 }}>
            <div className="t-overline" style={{ marginBottom: 2 }}>VIATURA EM SERVIÇO</div>
            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 15 }}>{matricula}</div>
            {patrulhaAtual && (
              <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>Km iniciais: {patrulhaAtual.kmInicial?.toLocaleString('pt-PT') ?? '—'} km</div>
            )}
          </div>
        </div>

        {/* Km Finais */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
          <div style={{ padding: '10px 14px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
            <Icon name="gauge" size={16} style={{ color: 'var(--brand-green)' }}/>
            <div style={{ fontWeight: 600, fontSize: 13 }}>Km Finais</div>
          </div>
          <div style={{ padding: '12px 14px' }}>
            <input
              type="number"
              value={kmFinais}
              onChange={e => setKmFinais(e.target.value)}
              placeholder="Ex: 184 500"
              style={{
                width: '100%', border: '1px solid var(--border)', borderRadius: 8,
                padding: '10px 12px', fontSize: 15, fontFamily: 'var(--font-mono)',
                background: 'var(--bg)', color: 'var(--fg)', outline: 'none', boxSizing: 'border-box',
              }}
            />
            <div style={{ fontSize: 11, color: 'var(--fg-muted)', marginTop: 6 }}>
              {kmFinais && patrulhaAtual?.kmInicial ? `Percurso: ${(parseInt(kmFinais) - patrulhaAtual.kmInicial).toLocaleString('pt-PT')} km` : 'Introduza a quilometragem final do contador da viatura'}
            </div>
          </div>
        </div>

        {/* Combustível */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
          <div style={{ padding: '10px 14px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
            <Icon name="fuel" size={16} style={{ color: 'var(--brand-green)' }}/>
            <div style={{ fontWeight: 600, fontSize: 13 }}>Combustível &amp; Abastecimento</div>
          </div>
          <div style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div>
              <label style={{ fontSize: 11, color: 'var(--fg-muted)', display: 'block', marginBottom: 4 }}>Litros de Combustível</label>
              <input
                type="number"
                value={litros}
                onChange={e => setLitros(e.target.value)}
                placeholder="Ex: 35"
                style={{
                  width: '100%', border: '1px solid var(--border)', borderRadius: 8,
                  padding: '9px 12px', fontSize: 13, fontFamily: 'var(--font-mono)',
                  background: 'var(--bg)', color: 'var(--fg)', outline: 'none', boxSizing: 'border-box',
                }}
              />
            </div>
            <div>
              <label style={{ fontSize: 11, color: 'var(--fg-muted)', display: 'block', marginBottom: 4 }}>Local do Abastecimento</label>
              <input
                type="text"
                value={localAbastecimento}
                onChange={e => setLocalAbastecimento(e.target.value)}
                placeholder="Ex: Galp Alcochete"
                style={{
                  width: '100%', border: '1px solid var(--border)', borderRadius: 8,
                  padding: '9px 12px', fontSize: 13,
                  background: 'var(--bg)', color: 'var(--fg)', outline: 'none', boxSizing: 'border-box',
                }}
              />
            </div>
          </div>
        </div>

        {/* Danos */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
          <div style={{ padding: '10px 14px', borderBottom: '1px solid var(--border)', display: 'flex', alignItems: 'center', gap: 10 }}>
            <Icon name="alert-triangle" size={16} style={{ color: 'var(--warning)' }}/>
            <div style={{ fontWeight: 600, fontSize: 13 }}>Existência de Danos</div>
          </div>
          <div style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ display: 'flex', gap: 10 }}>
              {[false, true].map(val => (
                <button key={String(val)} onClick={() => setTemDanos(val)} style={{
                  flex: 1, padding: '10px 0', borderRadius: 8, border: `2px solid ${temDanos === val ? (val ? 'var(--danger)' : 'var(--success)') : 'var(--border)'}`,
                  background: temDanos === val ? (val ? 'var(--danger-soft)' : 'var(--success-soft)') : 'var(--bg)',
                  color: temDanos === val ? (val ? 'var(--danger-deep)' : 'var(--success)') : 'var(--fg-muted)',
                  fontWeight: 700, fontSize: 14, cursor: 'pointer',
                }}>
                  {val ? 'SIM' : 'NÃO'}
                </button>
              ))}
            </div>
            {temDanos && (
              <textarea
                value={descricaoDanos}
                onChange={e => setDescricaoDanos(e.target.value)}
                placeholder="Descreva os danos observados na viatura..."
                rows={3}
                style={{
                  width: '100%', border: '1px solid var(--danger)', borderRadius: 8,
                  padding: '9px 12px', fontSize: 13, fontFamily: 'inherit', resize: 'none',
                  background: 'var(--danger-soft)', color: 'var(--fg)', outline: 'none', boxSizing: 'border-box',
                }}
              />
            )}
          </div>
        </div>

        {/* Aviso */}
        <div style={{ background: 'var(--warning-soft)', border: '1px solid var(--warning)', borderRadius: 10, padding: '12px 14px', display: 'flex', gap: 10 }}>
          <Icon name="alert-triangle" size={16} style={{ color: 'var(--warning-deep)', flexShrink: 0, marginTop: 1 }}/>
          <div style={{ fontSize: 12, color: 'var(--warning-deep)', lineHeight: '17px' }}>
            Os dados submetidos serão enviados para o <strong>Comando Territorial</strong> e não poderão ser alterados após confirmação. Certifique-se que os valores são corretos.
          </div>
        </div>

        {/* Botão */}
        <button onClick={handleFinalizar} disabled={!kmFinais || enviando} style={{
          width: '100%', background: kmFinais ? 'var(--brand-green)' : 'var(--surface-3)',
          color: kmFinais ? '#FFF' : 'var(--fg-muted)',
          border: 'none', borderRadius: 10, padding: '14px 0',
          fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 15,
          cursor: kmFinais ? 'pointer' : 'not-allowed',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
        }}>
          <Icon name={enviando ? 'loader' : 'upload-cloud'} size={18}/>
          {enviando ? 'A enviar…' : 'Finalizar Patrulha e Enviar Relatório'}
        </button>

        <div style={{ height: 8 }}/>
      </div>
    </div>

<script type="text/babel">

window.ChecklistScreen = ChecklistScreen;

</script>
<script type="text/babel">
/* Sentinela Mobile — Escalas de Serviço */

const EscalasFullScreen = ({ onBack, store }) => {
  const { useStore } = window.SentinelaStore;
  const me = useStore(s => s.militares.find(x => x.id === s.militarLogadoId));
  const D = window.SENTINELA_DATA;

  const [tabAtiva, setTabAtiva] = React.useState('minha'); // 'minha' | 'geral'
  const [semanaOffset, setSemanaOffset] = React.useState(0);

  // Mock schedule data based on store escala
  const escala = D?.escala;
  const diasSemana = escala?.dias || ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];

  const hoje = new Date();
  const inicioSemana = new Date(hoje);
  inicioSemana.setDate(hoje.getDate() - hoje.getDay() + 1 + semanaOffset * 7);
  const fimSemana = new Date(inicioSemana);
  fimSemana.setDate(inicioSemana.getDate() + 6);

  const formatarIntervalo = (d1, d2) => {
    const opts = { day: '2-digit', month: 'short' };
    return `${d1.toLocaleDateString('pt-PT', opts)} – ${d2.toLocaleDateString('pt-PT', opts)}`;
  };

  // Static upcoming shifts for "Minha Escala"
  const proximosTurnos = [
    { dia: 'Amanhã', hora: '08:00', tipo: 'Patrulha Territorial', parceiro: 'Guard. Mendes', estado: 'confirmado' },
    { dia: 'Quinta', hora: '20:00', tipo: 'Patrulha Noturna', parceiro: 'Cabo Ferreira', estado: 'confirmado' },
    { dia: 'Sexta', hora: '08:00', tipo: 'Serviço Posto', parceiro: '—', estado: 'pendente' },
  ];

  const corEstado = e => e === 'confirmado' ? 'var(--success)' : e === 'pendente' ? 'var(--warning)' : 'var(--fg-muted)';
  const bgEstado = e => e === 'confirmado' ? 'var(--success-soft)' : e === 'pendente' ? 'var(--warning-soft)' : 'var(--surface-2)';

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ height: 52, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 12px', gap: 10, flexShrink: 0 }}>
        <button onClick={onBack} style={{ background: 'transparent', border: 'none', color: '#FFF', display: 'flex', cursor: 'pointer', padding: 4 }}>
          <Icon name="arrow-left" size={20}/>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 14, fontFamily: 'var(--font-display)' }}>Escalas de Serviço</div>
          <div style={{ fontSize: 10, color: '#C9A24B' }}>Planeamento operacional</div>
        </div>
        <Icon name="calendar" size={18}/>
      </div>

      {/* Profile strip */}
      {me && (
        <div style={{ background: 'var(--brand-green)', color: '#FFF', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 12 }}>
          <Avatar name={me.nome} size={38} style={{ border: '2px solid #C9A24B' }}/>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 13 }}>{me.postoAbrev} {me.nome.split(' ').slice(-1)[0]}</div>
            <div style={{ fontSize: 11, color: '#C9A24B' }}>{me.secao}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div className="t-mono" style={{ fontSize: 13, fontWeight: 700 }}>142/160h</div>
            <div style={{ fontSize: 10, opacity: 0.8 }}>este mês</div>
          </div>
        </div>
      )}

      {/* Tabs */}
      <div style={{ background: 'var(--surface)', borderBottom: '1px solid var(--border)', display: 'flex', flexShrink: 0 }}>
        {[['minha', 'Minha Escala'], ['geral', 'Escala Geral']].map(([id, label]) => (
          <button key={id} onClick={() => setTabAtiva(id)} style={{
            flex: 1, background: 'transparent', border: 'none', padding: '11px 0',
            fontWeight: tabAtiva === id ? 700 : 500, fontSize: 13, cursor: 'pointer',
            color: tabAtiva === id ? 'var(--brand-green)' : 'var(--fg-muted)',
            borderBottom: `2px solid ${tabAtiva === id ? 'var(--brand-green)' : 'transparent'}`,
          }}>{label}</button>
        ))}
      </div>

      <div style={{ flex: 1, overflowY: 'auto', background: 'var(--bg)' }}>
        {tabAtiva === 'minha' ? (
          <div style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 14 }}>

            {/* Stats */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px', textAlign: 'center' }}>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 22, color: 'var(--brand-green)' }}>4</div>
                <div className="t-overline" style={{ fontSize: 9 }}>DIAS DE FOLGA ACUM.</div>
              </div>
              <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px', textAlign: 'center' }}>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 22, color: 'var(--info)' }}>3</div>
                <div className="t-overline" style={{ fontSize: 9 }}>TURNOS ESTA SEMANA</div>
              </div>
            </div>

            {/* Próximos turnos */}
            <div>
              <div className="t-overline" style={{ marginBottom: 8 }}>PRÓXIMOS TURNOS</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {proximosTurnos.map((t, i) => (
                  <div key={i} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12 }}>
                    <div style={{ textAlign: 'center', minWidth: 44 }}>
                      <div style={{ fontSize: 10, color: 'var(--fg-muted)' }}>{t.dia}</div>
                      <div className="t-mono" style={{ fontWeight: 700, fontSize: 14, color: 'var(--brand-green)' }}>{t.hora}</div>
                    </div>
                    <div style={{ flex: 1, borderLeft: '1px solid var(--border)', paddingLeft: 12 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{t.tipo}</div>
                      {t.parceiro !== '—' && (
                        <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>
                          <Icon name="user" size={11}/> {t.parceiro}
                        </div>
                      )}
                    </div>
                    <span style={{ fontSize: 10, fontWeight: 700, color: corEstado(t.estado), background: bgEstado(t.estado), borderRadius: 6, padding: '3px 8px' }}>
                      {t.estado === 'confirmado' ? 'CONF.' : 'PEND.'}
                    </span>
                  </div>
                ))}
              </div>
            </div>

            {/* Alerta troca */}
            <div style={{ background: 'var(--warning-soft)', border: '1px solid var(--warning)', borderRadius: 10, padding: '12px 14px', display: 'flex', gap: 10 }}>
              <Icon name="alert-circle" size={16} style={{ color: 'var(--warning-deep)', flexShrink: 0, marginTop: 1 }}/>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--warning-deep)', marginBottom: 2 }}>Pedido de troca pendente</div>
                <div style={{ fontSize: 11, color: 'var(--warning-deep)', lineHeight: '16px' }}>Guard. Costa solicitou troca do turno de 30 Out. Responda até amanhã.</div>
              </div>
            </div>
          </div>
        ) : (
          /* Escala Geral — Tabela */
          <div style={{ padding: 12 }}>
            {/* Navegação semana */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
              <button onClick={() => setSemanaOffset(o => o - 1)} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '6px 10px', cursor: 'pointer', color: 'var(--fg)' }}>
                <Icon name="chevron-left" size={16}/>
              </button>
              <div style={{ flex: 1, textAlign: 'center', fontSize: 12, fontWeight: 600, color: 'var(--fg)' }}>
                {formatarIntervalo(inicioSemana, fimSemana)}
              </div>
              <button onClick={() => setSemanaOffset(o => o + 1)} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: '6px 10px', cursor: 'pointer', color: 'var(--fg)' }}>
                <Icon name="chevron-right" size={16}/>
              </button>
            </div>

            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 11 }}>
                <thead>
                  <tr style={{ background: 'var(--surface-2)' }}>
                    <th style={{ padding: '8px 10px', textAlign: 'left', fontSize: 10, color: 'var(--fg-muted)', borderBottom: '1px solid var(--border)', whiteSpace: 'nowrap' }}>Militar</th>
                    {diasSemana.map(d => (
                      <th key={d} style={{ padding: '8px 4px', fontSize: 10, color: 'var(--fg-muted)', borderBottom: '1px solid var(--border)', textAlign: 'center' }}>{d}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {escala?.linhas?.map(l => (
                    <tr key={l.militar} style={{ borderBottom: '1px solid var(--border)' }}>
                      <td style={{ padding: '6px 10px', fontWeight: 600, fontSize: 11, whiteSpace: 'nowrap' }}>{l.militar}</td>
                      {l.turnos.map((t, i) => (
                        <td key={i} className="t-mono" style={{
                          padding: '6px 2px', textAlign: 'center', fontSize: 10, fontWeight: 600,
                          background: t === 'FOLGA' ? 'var(--surface-2)' : t === '20-08' ? 'rgba(46,92,138,0.10)' : 'rgba(31,77,58,0.08)',
                          color: t === 'FOLGA' ? 'var(--fg-soft)' : t === '20-08' ? 'var(--info-deep)' : 'var(--brand-green)',
                        }}>{t}</td>
                      ))}
                    </tr>
                  )) ?? (
                    <tr>
                      <td colSpan={diasSemana.length + 1} style={{ padding: '20px', textAlign: 'center', color: 'var(--fg-muted)', fontSize: 12 }}>
                        Sem dados de escala disponíveis
                      </td>
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

window.EscalasFullScreen = EscalasFullScreen;

</script>

<script type="text/babel">
/* Sentinela Mobile — Ordens de Serviço */

const OrdensServicoScreen = ({ onBack, store }) => {
  const { useStore, actions } = window.SentinelaStore;
  const ordens = useStore(s => s.ordens);
  const me = useStore(s => s.militares.find(x => x.id === s.militarLogadoId));

  const [tabAtiva, setTabAtiva] = React.useState('recentes'); // 'recentes' | 'arquivo'
  const [filtro, setFiltro] = React.useState('');
  const [filtroLidas, setFiltroLidas] = React.useState('todas'); // 'todas' | 'lidas' | 'nao_lidas'
  const [filtroPrioritario, setFiltroPrioritario] = React.useState(false);
  const [ordemAberta, setOrdemAberta] = React.useState(null);

  const hoje = new Date().toLocaleDateString('pt-PT', { weekday: 'short', day: '2-digit', month: 'short' }).toUpperCase();

  const ordensVisiveis = ordens.filter(o => {
    const meId = me?.id;
    const lida = o.lidoPor?.includes(meId);
    if (filtroLidas === 'lidas' && !lida) return false;
    if (filtroLidas === 'nao_lidas' && lida) return false;
    if (filtroPrioritario && o.prioridade !== 'alta') return false;
    const t = filtro.toLowerCase();
    if (t && !o.titulo?.toLowerCase().includes(t) && !o.ref?.toLowerCase().includes(t)) return false;
    return tabAtiva === 'arquivo' ? o.arquivado : !o.arquivado;
  });

  const totalMes = ordens.length;
  const pendentes = ordens.filter(o => !o.lidoPor?.includes(me?.id)).length;
  const lidasCount = totalMes - pendentes;

  if (ordemAberta) {
    const lida = ordemAberta.lidoPor?.includes(me?.id);
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
        <div style={{ height: 52, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 12px', gap: 10 }}>
          <button onClick={() => setOrdemAberta(null)} style={{ background: 'transparent', border: 'none', color: '#FFF', display: 'flex', cursor: 'pointer', padding: 4 }}>
            <Icon name="arrow-left" size={20}/>
          </button>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 13, fontFamily: 'var(--font-display)' }}>{ordemAberta.titulo}</div>

              {ordemAberta.prioridade === 'alta' && (

              )}
              <span className="t-mono" style={{ fontSize: 10, color: 'var(--fg-muted)' }}>{ordemAberta.data}</span>
            </div>
            <div style={{ fontSize: 13, lineHeight: '20px', color: 'var(--fg)' }}>
              {ordemAberta.conteudo || ordemAberta.texto || 'Sem conteúdo disponível.'}

              flex: 1, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8,
              padding: '10px 0', fontSize: 12, fontWeight: 600, cursor: 'pointer', color: 'var(--fg)',
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
            }}>
              <Icon name="file-text" size={15}/>

            </button>
            {!lida && (
              <button onClick={() => { actions.marcarOSLida(ordemAberta.id); setOrdemAberta(null); }} style={{
                flex: 1, background: 'var(--brand-green)', color: '#FFF', border: 'none', borderRadius: 8,
                padding: '10px 0', fontSize: 12, fontWeight: 600, cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
              }}>
                <Icon name="check" size={15}/>
                MARCAR LIDA
              </button>
            )}
          </div>
        </div>
      </div>
    );

    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

          <Icon name="arrow-left" size={20}/>

        <div style={{ flex: 1 }}>

        </div>
        <Icon name="file-text" size={18}/>
      </div>

      {/* Stats strip */}
      <div style={{ background: 'var(--brand-green)', color: '#FFF', padding: '10px 14px', display: 'flex', gap: 0, flexShrink: 0 }}>
        {[
          [totalMes, 'Ordens Este Mês'],
          [pendentes, 'Pendentes'],
          [lidasCount, 'Lidas'],
        ].map(([n, l], i) => (
          <div key={l} style={{ flex: 1, textAlign: 'center', borderLeft: i ? '1px solid rgba(255,255,255,0.2)' : 'none' }}>

            <div style={{ fontSize: 10, opacity: 0.8 }}>{l}</div>

      {/* Tabs */}
      <div style={{ background: 'var(--surface)', borderBottom: '1px solid var(--border)', display: 'flex', flexShrink: 0 }}>
        {[['recentes', 'Recentes'], ['arquivo', 'Arquivo']].map(([id, label]) => (
          <button key={id} onClick={() => setTabAtiva(id)} style={{
            flex: 1, background: 'transparent', border: 'none', padding: '11px 0',
            fontWeight: tabAtiva === id ? 700 : 500, fontSize: 13, cursor: 'pointer',
            color: tabAtiva === id ? 'var(--brand-green)' : 'var(--fg-muted)',
            borderBottom: `2px solid ${tabAtiva === id ? 'var(--brand-green)' : 'transparent'}`,

          <input value={filtro} onChange={e => setFiltro(e.target.value)} placeholder="Pesquisar ordens…" style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 13, color: 'var(--fg)' }}/>
        </div>
        <div style={{ display: 'flex', gap: 6, overflowX: 'auto' }}>
          {[['todas', 'Todas'], ['nao_lidas', 'Não Lidas'], ['lidas', 'Lidas']].map(([id, label]) => (
            <button key={id} onClick={() => setFiltroLidas(id)} style={{
              background: filtroLidas === id ? 'var(--brand-green)' : 'var(--surface-2)',
              color: filtroLidas === id ? '#FFF' : 'var(--fg)',

            cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0,

          </button>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, padding: '5px 10px', background: 'var(--surface-2)', borderRadius: 999, fontSize: 11, color: 'var(--fg-muted)', flexShrink: 0 }}>
            <Icon name="calendar" size={12}/>
            {hoje}
          </div>
        </div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', background: 'var(--bg)' }}>
        {/* Ordem em destaque */}
        {tabAtiva === 'recentes' && ordens[0] && (
          <div style={{ margin: '12px 12px 0' }}>
            <div className="t-overline" style={{ marginBottom: 6 }}>EM DESTAQUE</div>
            <button onClick={() => setOrdemAberta(ordens[0])} style={{
              width: '100%', background: 'var(--surface)', border: '1px solid var(--border)',
              borderLeft: '4px solid var(--brand-green)', borderRadius: 10, padding: 14,
              textAlign: 'left', cursor: 'pointer',
            }}>
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 6 }}>{ordens[0].titulo}</div>
              <div style={{ fontSize: 12, color: 'var(--fg-muted)', lineHeight: '16px', marginBottom: 10 }}>
                {ordens[0].texto?.slice(0, 100) ?? ''}…
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 4, background: 'var(--surface-2)', borderRadius: 6, padding: '4px 8px', fontSize: 11, color: 'var(--fg)' }}>
                  <Icon name="file-text" size={12}/>
                  ABRIR PDF
                </div>
                <span className="t-mono" style={{ fontSize: 10, color: 'var(--fg-muted)' }}>{ordens[0].ref || `OS-${ordens[0].id}`}</span>
              </div>

        {/* Lista */}
        <div style={{ padding: '12px 12px', display: 'flex', flexDirection: 'column', gap: 6 }}>
          {ordensVisiveis.slice(tabAtiva === 'recentes' ? 1 : 0).map(o => {
            const lida = o.lidoPor?.includes(me?.id);
            return (
              <button key={o.id} onClick={() => setOrdemAberta(o)} style={{
                background: 'var(--surface)', border: '1px solid var(--border)',
                borderLeft: `3px solid ${o.prioridade === 'alta' ? 'var(--danger)' : 'var(--border)'}`,
                borderRadius: 10, padding: '11px 12px',
                display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', textAlign: 'left', width: '100%',
              }}>
                <div style={{
                  width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
                  background: lida ? 'var(--fg-soft)' : 'var(--danger)',
                }}/>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: lida ? 500 : 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{o.titulo}</div>
                  <div style={{ fontSize: 11, color: 'var(--fg-muted)', marginTop: 1 }} className="t-mono">{o.data}</div>

                {!lida && (
                  <span style={{ fontSize: 10, fontWeight: 700, color: '#FFF', background: 'var(--danger)', borderRadius: 4, padding: '2px 6px', flexShrink: 0 }}>NOVO</span>
                )}
                <Icon name="chevron-right" size={14} style={{ color: 'var(--fg-soft)', flexShrink: 0 }}/>
              </button>

          {ordensVisiveis.length === 0 && (

<script type="text/babel">
/* Sentinela Mobile — Emergência e Reforço */

const EmergenciaScreen = ({ onBack, store }) => {
  const { useStore, actions } = window.SentinelaStore;
  const patrulhaAtual = useStore(s => s.patrulhaAtual);
  const me = useStore(s => s.militares.find(x => x.id === s.militarLogadoId));

  const [modoEmergencia, setModoEmergencia] = React.useState(false);
  const [pressaoAtiva, setPressaoAtiva] = React.useState(false);
  const [progresso, setProgresso] = React.useState(0);
  const [reforcoEnviado, setReforcoEnviado] = React.useState(false);
  const [timerRef, setTimerRef] = React.useState(null);

  const DURACAO_SEGUNDOS = 2;

  const iniciarPressao = () => {
    setPressaoAtiva(true);
    setProgresso(0);
    const inicio = Date.now();
    const intervalo = setInterval(() => {
      const elapsed = (Date.now() - inicio) / 1000;
      const pct = Math.min((elapsed / DURACAO_SEGUNDOS) * 100, 100);
      setProgresso(pct);
      if (pct >= 100) {
        clearInterval(intervalo);
        setPressaoAtiva(false);
        setReforcoEnviado(true);
        setModoEmergencia(true);
      }
    }, 50);
    setTimerRef(intervalo);
  };

  const cancelarPressao = () => {
    if (timerRef) clearInterval(timerRef);
    setPressaoAtiva(false);
    setProgresso(0);
  };

  const cancelarEmergencia = () => {
    setModoEmergencia(false);
    setReforcoEnviado(false);
    setProgresso(0);
  };

  // Approximate GPS position mock
  const localizacao = {
    nome: patrulhaAtual ? 'Localização da Patrulha' : 'Posto GNR — Vila Real',
    coords: '41.2987° N, 7.7425° W',
    precisao: '± 5m',
  };

  const postoMaisProximo = 'Comando Territorial de Vila Real';

  if (reforcoEnviado && modoEmergencia) {
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: 'var(--danger-soft)' }}>
        {/* Header vermelho */}
        <div style={{ height: 52, background: 'var(--danger)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 12px', gap: 10 }}>
          <button onClick={onBack} style={{ background: 'transparent', border: 'none', color: '#FFF', display: 'flex', cursor: 'pointer', padding: 4 }}>
            <Icon name="arrow-left" size={20}/>
          </button>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 14, fontFamily: 'var(--font-display)' }}>ESTADO DE ALERTA</div>
            <div style={{ fontSize: 10 }}>Modo de Emergência Ativo</div>
          </div>
          <div style={{ width: 10, height: 10, borderRadius: '50%', background: '#FFF', animation: 'pulse 1s infinite' }}/>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: 16, display: 'flex', flexDirection: 'column', gap: 14 }}>

          {/* Confirmação */}
          <div style={{ background: 'var(--danger)', color: '#FFF', borderRadius: 12, padding: 20, textAlign: 'center' }}>
            <div style={{ width: 60, height: 60, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', margin: '0 auto 12px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="shield" size={30}/>
            </div>
            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 20, marginBottom: 6 }}>REFORÇO SOLICITADO</div>
            <div style={{ fontSize: 12, opacity: 0.9 }}>Alerta de pânico enviado para a Central de Comando</div>
          </div>

          {/* Localização */}
          <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
              <Icon name="map-pin" size={16} style={{ color: 'var(--danger)' }}/>
              <div className="t-overline">LOCALIZAÇÃO GPS ATUAL</div>
            </div>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 4 }}>{localizacao.nome}</div>
            <div className="t-mono" style={{ fontSize: 11, color: 'var(--fg-muted)' }}>{localizacao.coords} · Precisão: {localizacao.precisao}</div>
            <div style={{ height: 100, background: 'var(--surface-2)', borderRadius: 8, marginTop: 10, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="map" size={32} style={{ color: 'var(--fg-soft)' }}/>
            </div>
          </div>

          {/* Timer e posto */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                <Icon name="clock" size={14} style={{ color: 'var(--warning)' }}/>
                <div className="t-overline" style={{ fontSize: 9 }}>TEMPO DE CONFIRMAÇÃO</div>
              </div>
              <div className="t-mono" style={{ fontSize: 18, fontWeight: 700, color: 'var(--warning)' }}>~ 45s</div>
              <div style={{ fontSize: 10, color: 'var(--fg-muted)' }}>ESTIMADO</div>
            </div>
            <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
                <Icon name="radio" size={14} style={{ color: 'var(--brand-green)' }}/>
                <div className="t-overline" style={{ fontSize: 9 }}>POSTO MAIS PRÓXIMO</div>
              </div>
              <div style={{ fontSize: 12, fontWeight: 600, lineHeight: '16px' }}>{postoMaisProximo}</div>
            </div>
          </div>

          {/* Cancelar */}
          <button onClick={cancelarEmergencia} style={{
            width: '100%', background: 'var(--surface)', border: '2px solid var(--danger)', borderRadius: 10,
            padding: '13px 0', fontSize: 14, fontWeight: 700, color: 'var(--danger)', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          }}>
            <Icon name="x-circle" size={18}/>
            Cancelar Alerta de Emergência
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {/* Header */}
      <div style={{ height: 52, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 12px', gap: 10, flexShrink: 0 }}>
        <button onClick={onBack} style={{ background: 'transparent', border: 'none', color: '#FFF', display: 'flex', cursor: 'pointer', padding: 4 }}>
          <Icon name="arrow-left" size={20}/>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 600, fontSize: 14, fontFamily: 'var(--font-display)' }}>Emergência e Reforço</div>

          </div>
          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>{localizacao.nome}</div>
          <div className="t-mono" style={{ fontSize: 11, color: 'var(--fg-muted)' }}>{localizacao.coords} · Precisão: {localizacao.precisao}</div>

            <Icon name="map" size={28} style={{ color: 'var(--fg-soft)' }}/>
          </div>
        </div>

        {/* Info: Posto próximo */}
        <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12 }}>
          <Icon name="radio" size={18} style={{ color: 'var(--brand-green)', flexShrink: 0 }}/>
          <div style={{ flex: 1 }}>
            <div className="t-overline" style={{ marginBottom: 2 }}>POSTO MAIS PRÓXIMO</div>
            <div style={{ fontSize: 13, fontWeight: 600 }}>{postoMaisProximo}</div>
          </div>
        </div>

        {/* Ações secundárias */}
        <div>
          <div className="t-overline" style={{ marginBottom: 8 }}>AÇÕES RÁPIDAS</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {[
              { icon: 'phone-call', label: 'Ligar 112', cor: 'var(--danger)', action: () => { window.location.href = 'tel:112'; } },
              { icon: 'radio', label: 'Contactar Central', cor: 'var(--brand-green)', action: () => alert('Pedido enviado: Contactar Central') },
              { icon: 'users', label: 'Pedir Reforço', cor: 'var(--info)', action: () => actions.activarPanico() },
              { icon: 'message-square', label: 'Enviar Localização', cor: 'var(--warning)', action: () => alert('Pedido enviado: Enviar Localização') },
            ].map(({ icon, label, cor, action }) => (
              <button key={label} onClick={action} style={{
                background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10,
                padding: '14px 8px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8,
                cursor: 'pointer',
              }}>
                <div style={{ width: 40, height: 40, borderRadius: 10, background: 'var(--surface-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: cor }}>
                  <Icon name={icon} size={20}/>
                </div>
                <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--fg)', textAlign: 'center' }}>{label}</span>
              </button>
            ))}
          </div>
        </div>

        <div style={{ height: 8 }}/>
      </div>
    </div>
  );
};

window.EmergenciaScreen = EmergenciaScreen;

</script>
<script type="text/babel">

        </div>
        <div style={{ flex: 1 }}>
          <div className="t-overline" style={{ color: '#C9A24B', marginBottom: 2 }}>EM PATRULHA · {patrulhaAtual.indicativo}</div>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16 }}>Scanner ANPR ativo</div>
          <div style={{ fontSize: 11, opacity: 0.85 }}>{alertasPorConfirmar} alertas por confirmar · {diretivasPendentes} diretivas</div>
        </div>
        <Icon name="chevron-right" size={18}/>

        display: 'flex', alignItems: 'center', gap: 10, color: 'var(--fg)',

        <Icon name="check-square" size={18} style={{ color: 'var(--brand-green)' }}/>
        <span style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>Fechar patrulha</span>
        <Icon name="chevron-right" size={14} style={{ color: 'var(--fg-soft)' }}/>

    <button onClick={() => onNav('abrirPatrulha')} style={{
      width: '100%', background: 'var(--surface)', border: '2px dashed var(--brand-green)', color: 'var(--brand-green)',

      display: 'flex', alignItems: 'center', gap: 12,
    }}>
      <div style={{ width: 44, height: 44, background: 'var(--brand-green-soft)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name="play" size={22}/>
      </div>
      <div style={{ flex: 1 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16 }}>Abrir patrulha</div>
        <div style={{ fontSize: 11, color: 'var(--fg-muted)' }}>Escolher viatura, parceiro e equipamento</div>
      </div>
      <Icon name="chevron-right" size={18}/>
    </button>
  );

  const QuickAction = ({ icon, label, badge, onClick, color = 'var(--brand-green)' }) => (
    <button onClick={onClick} style={{
      background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10,
      padding: '12px 8px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
      cursor: 'pointer', position: 'relative',
    }}>
      <div style={{
        width: 40, height: 40, borderRadius: 10, background: color === 'var(--danger)' ? 'rgba(199,50,43,0.10)' : 'rgba(31,77,58,0.08)',
        color, display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <Icon name={icon} size={20}/>
      </div>
      <div style={{ fontSize: 11, fontWeight: 600, textAlign: 'center', color: 'var(--fg)' }}>{label}</div>
      {badge > 0 && (
        <span style={{ position: 'absolute', top: 8, right: 8, background: 'var(--danger)', color: '#FFF', fontSize: 10, fontWeight: 700, borderRadius: 999, padding: '1px 6px', minWidth: 18, textAlign: 'center' }}>{badge}</span>
      )}

  );

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ height: 60, background: 'var(--brand-green-deep)', color: '#FFF', display: 'flex', alignItems: 'center', padding: '0 14px', gap: 12, flexShrink: 0 }}>
        <button onClick={() => onNav('perfil')} style={{ background: 'transparent', border: 'none', padding: 0, cursor: 'pointer' }}>
          <Avatar name={me.nome} size={36} style={{ border: '2px solid #C9A24B' }}/>
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 14 }}>{me.postoAbrev} {me.nome.split(' ').slice(-1)[0]}</div>

        <button onClick={() => onNav('notificacoes')} style={{ background: 'transparent', border: 'none', color: '#FFF', cursor: 'pointer', position: 'relative', padding: 4 }}>
          <Icon name="bell" size={20}/>
          {naoLidas > 0 && <span style={{ position: 'absolute', top: 0, right: 0, background: 'var(--danger)', color: '#FFF', fontSize: 9, fontWeight: 700, borderRadius: 999, padding: '0 5px', minWidth: 14, textAlign: 'center' }}>{naoLidas}</span>}
        </button>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: 14, display: 'flex', flexDirection: 'column', gap: 14, background: 'var(--bg)' }}>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
            <QuickAction icon="scan" label="Scanner" onClick={() => onNav('scanner')}/>
            <QuickAction icon="file-text" label="Auto" onClick={() => onNav('auto')}/>
            <QuickAction icon="message-square" label="Chat" badge={3} onClick={() => onNav('chats')}/>
            <QuickAction icon="siren" label="Pânico" color="var(--danger)" onClick={() => onNav('panico')}/>
          </div>
        </div>

        <div>
          <div className="t-overline" style={{ marginBottom: 8 }}>SERVIÇO</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
            <QuickAction icon="file-text" label="OS" badge={novasOS} onClick={() => onNav('ordens')}/>
            <QuickAction icon="clipboard" label="Briefing" onClick={() => onNav('briefing')}/>
            <QuickAction icon="calendar" label="Escala" onClick={() => onNav('escalas')}/>
            <QuickAction icon="users" label="Lista" onClick={() => onNav('lista')}/>
            <QuickAction icon="sun" label="Férias" onClick={() => onNav('ferias')}/>
          </div>
        </div>

        <div>
          <div className="t-overline" style={{ marginBottom: 8 }}>OPERACIONAL</div>

            <QuickAction icon="check-square" label="Diretivas" onClick={() => onNav('checklist')}/>
            <QuickAction icon="calendar-days" label="Escalas" onClick={() => onNav('escalasFull')}/>
            <QuickAction icon="book-open" label="Wiki GNR" onClick={() => onNav('wiki')}/>
            <QuickAction icon="file-text" label="Ordens" onClick={() => onNav('ordensServico')}/>
            <QuickAction icon="alert-triangle" label="Emergência" color="var(--danger)" onClick={() => onNav('emergencia')}/>
          </div>
        </div>

        <div>
          <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 8 }}>
            <div className="t-overline">ÚLTIMAS DETEÇÕES ANPR</div>
            <button onClick={() => onNav('scanner')} style={{ background: 'transparent', border: 'none', color: 'var(--brand-green)', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>Ver tudo</button>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {alertas.slice(0, 3).map(a => (
              <div key={a.id} style={{
                background: 'var(--surface)', border: '1px solid var(--border)',
                borderLeft: `4px solid ${a.severidade === 'critico' ? 'var(--danger)' : a.severidade === 'aviso' ? 'var(--warning)' : 'var(--info)'}`,
                borderRadius: 8, padding: '10px 12px', display: 'flex', alignItems: 'center', gap: 10,
              }}>
                <Plate value={a.matricula} size="sm"/>

                </div>
                {a.confirmado && <Icon name="check" size={14} style={{ color: 'var(--success)' }}/>}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

const MobileShellV2 = () => {
  const { useStore } = window.SentinelaStore;
  const meId = useStore(s => s.militarLogadoId);
  const panico = useStore(s => s.panico);

  const [route, setRoute] = React.useState('home');
  const [chatId, setChatId] = React.useState(null);

  if (!meId) return <LoginScreen/>;

  // Pânico ativo overrides everything
  if (panico) return <PanicoScreen onBack={() => setRoute('home')}/>;

  const tabActive = ['home', 'scanner', 'chats', 'ordens', 'perfil'].includes(route);

  let content;
  if (route === 'home') content = <HomeScreen onNav={setRoute}/>;
  else if (route === 'scanner') content = <ScannerScreenV2/>;
  else if (route === 'abrirPatrulha') content = <AbrirPatrulhaScreen onBack={() => setRoute('home')} onDone={() => setRoute('scanner')}/>;
  else if (route === 'fecharPatrulha') content = <FecharPatrulhaScreen onBack={() => setRoute('home')} onDone={() => setRoute('home')}/>;
  else if (route === 'auto') content = <AutoNoticiaScreen onBack={() => setRoute('home')} onDone={() => setRoute('home')}/>;
  else if (route === 'panico') content = <PanicoScreen onBack={() => setRoute('home')}/>;
  else if (route === 'ordens') content = <OrdensScreen onBack={() => setRoute('home')}/>;
  else if (route === 'chats') content = chatId ? <ChatThreadScreen chatId={chatId} onBack={() => setChatId(null)}/> : <ChatListScreen onOpen={setChatId} onBack={() => setRoute('home')}/>;
  else if (route === 'lista') content = <ListaTelefonicaScreen onBack={() => setRoute('home')}/>;
  else if (route === 'briefing') content = <BriefingScreen onBack={() => setRoute('home')}/>;
  else if (route === 'escalas') content = <EscalasScreen onBack={() => setRoute('home')}/>;
  else if (route === 'notificacoes') content = <NotificacoesScreen onBack={() => setRoute('home')}/>;
  else if (route === 'perfil') content = <PerfilScreen onBack={() => setRoute('home')}/>;
  else if (route === 'ferias') content = <FeriasScreen onBack={() => setRoute('home')}/>;
  else if (route === 'registoPatrulha') content = <RegistoPatrulhaScreen onBack={() => setRoute('home')}/>;
  else if (route === 'checklist') content = <ChecklistScreen onBack={() => setRoute('home')}/>;
  else if (route === 'escalasFull') content = <EscalasFullScreen onBack={() => setRoute('home')}/>;
  else if (route === 'wiki') content = <WikiScreen onBack={() => setRoute('home')}/>;
  else if (route === 'ordensServico') content = <OrdensServicoScreen onBack={() => setRoute('home')}/>;
  else if (route === 'emergencia') content = <EmergenciaScreen onBack={() => setRoute('home')}/>;
  else content = <HomeScreen onNav={setRoute}/>;

  const TabBtn = ({ id, icon, label }) => {
    const ativo = route === id || (id === 'chats' && route === 'chats');
    return (
      <button onClick={() => { setRoute(id); setChatId(null); }} style={{
        flex: 1, background: 'transparent', border: 'none', cursor: 'pointer',
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, padding: '6px 0',
        color: ativo ? 'var(--brand-green)' : 'var(--fg-muted)',
      }}>
        <Icon name={icon} size={20}/>
        <span style={{ fontSize: 10, fontWeight: ativo ? 700 : 500 }}>{label}</span>
      </button>
    );
  };

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {content}
      </div>
      {tabActive && (
        <div style={{
          height: 56, background: 'var(--surface)', borderTop: '1px solid var(--border)',
          display: 'flex', flexShrink: 0, paddingBottom: 4,
        }}>
          <TabBtn id="home" icon="home" label="Início"/>
          <TabBtn id="scanner" icon="scan" label="Scanner"/>
          <TabBtn id="chats" icon="message-square" label="Chat"/>
          <TabBtn id="ordens" icon="file-text" label="OS"/>
          <TabBtn id="perfil" icon="user" label="Perfil"/>
        </div>
      )}
    </div>
  );
};

window.MobileShellV2 = MobileShellV2;
window.HomeScreen = HomeScreen;

</script>

/* ---------- MAPA ---------- */
const MapaView = () => {
  const { useStore } = window.SentinelaStore;
  const viaturasMapa = useStore(s => s.viaturasMapa);
  const panico = useStore(s => s.panico);
  const rotaAtual = useStore(s => s.rotaAtual);

  // Animate vehicles slightly
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 1500);
    return () => clearInterval(id);
  }, []);

  // Map bounds (Vila Real area)
  const bounds = { minLat: 41.290, maxLat: 41.315, minLng: -7.760, maxLng: -7.735 };
  const project = (lat, lng) => {
    const x = ((lng - bounds.minLng) / (bounds.maxLng - bounds.minLng)) * 100;
    const y = ((bounds.maxLat - lat) / (bounds.maxLat - bounds.minLat)) * 100;
    return { x, y };
  };

  return (
    <div style={{ flex: 1, position: 'relative', background: '#E8EBE5', overflow: 'hidden' }}>
      {/* Stylised map */}
      <svg width="100%" height="100%" preserveAspectRatio="none" viewBox="0 0 1000 700" style={{ position: 'absolute', inset: 0 }}>
        <defs>
          <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(0,0,0,0.04)" strokeWidth="1"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)"/>
        {/* Roads */}
        <path d="M 0 350 Q 200 320, 400 360 T 800 380 L 1000 400" stroke="#FFF" strokeWidth="20" fill="none"/>
        <path d="M 0 350 Q 200 320, 400 360 T 800 380 L 1000 400" stroke="#C8B47A" strokeWidth="3" fill="none"/>
        <path d="M 500 0 L 480 700" stroke="#FFF" strokeWidth="14" fill="none"/>
        <path d="M 500 0 L 480 700" stroke="#C8B47A" strokeWidth="2" fill="none"/>
        <path d="M 100 100 Q 300 150, 500 200 T 900 280" stroke="#FFF" strokeWidth="10" fill="none"/>
        {/* River */}
        <path d="M 0 500 Q 250 480, 500 520 T 1000 530" stroke="#A8C8D8" strokeWidth="14" fill="none" opacity="0.6"/>
        {/* Buildings */}
        <rect x="430" y="320" width="80" height="60" fill="rgba(120,140,120,0.25)" stroke="rgba(120,140,120,0.5)"/>
        <rect x="450" y="280" width="50" height="40" fill="rgba(120,140,120,0.25)" stroke="rgba(120,140,120,0.5)"/>
        <rect x="380" y="380" width="60" height="60" fill="rgba(120,140,120,0.25)" stroke="rgba(120,140,120,0.5)"/>
        <text x="490" y="380" fill="rgba(0,0,0,0.4)" fontSize="11" fontFamily="serif" fontWeight="600">Vila Real centro</text>
        <text x="200" y="350" fill="rgba(0,0,0,0.35)" fontSize="10" fontFamily="serif">EN2</text>
        <text x="850" y="395" fill="rgba(0,0,0,0.35)" fontSize="10" fontFamily="serif">A24</text>
        <text x="510" y="600" fill="rgba(0,0,0,0.35)" fontSize="10" fontFamily="serif">Corgo</text>
      </svg>

      {/* GPS route trail from mobile */}
      {rotaAtual.length >= 2 && (
        <svg viewBox="0 0 100 100" preserveAspectRatio="none"
          style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none' }}>
          <polyline
            points={rotaAtual.map(p => { const pos = project(p.lat, p.lng); return `${pos.x},${pos.y}`; }).join(' ')}
            fill="none" stroke="#C9A24B" strokeWidth="0.5"
            strokeLinecap="round" strokeLinejoin="round" strokeDasharray="1.2 0.8" opacity="0.9"
          />
          {(() => {
            const last = rotaAtual[rotaAtual.length - 1];
            const pos = project(last.lat, last.lng);
            return <circle cx={pos.x} cy={pos.y} r="1.2" fill="#C9A24B" stroke="#FFF" strokeWidth="0.4"/>;
          })()}
        </svg>
      )}

      {/* Vehicles */}
      {viaturasMapa.map(v => {
        const pos = project(v.lat + Math.sin(tick * 0.5) * 0.0005, v.lng + Math.cos(tick * 0.3) * 0.0005);
        return (
          <div key={v.id} style={{
            position: 'absolute', left: `${pos.x}%`, top: `${pos.y}%`,
            transform: 'translate(-50%, -100%)', transition: 'all 1.5s linear',
          }}>
            <div style={{
              background: 'var(--brand-green-deep)', color: '#FFF', padding: '4px 10px',
              borderRadius: 6, fontSize: 11, fontWeight: 700, fontFamily: 'var(--font-mono)',
              boxShadow: '0 2px 8px rgba(0,0,0,0.3)', whiteSpace: 'nowrap', display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <Icon name="car" size={12}/>
              {v.id}
              <span style={{ color: '#C9A24B', fontSize: 9 }}>{v.velocidade}km/h</span>
            </div>
            <div style={{
              width: 14, height: 14, borderRadius: '50%', background: '#C9A24B',
              border: '3px solid var(--brand-green-deep)', margin: '4px auto 0',
              boxShadow: '0 0 0 4px rgba(201,162,75,0.3)',
            }}/>
            <div style={{ fontSize: 10, fontWeight: 600, color: 'var(--fg)', marginTop: 2, textShadow: '0 0 4px #FFF', textAlign: 'center' }}>{v.militar}</div>
          </div>
        );
      })}

      {/* Panic location */}
      {panico && (() => {
        const pos = project(panico.lat, panico.lng);
        return (
          <div style={{ position: 'absolute', left: `${pos.x}%`, top: `${pos.y}%`, transform: 'translate(-50%, -50%)' }}>
            <div style={{
              width: 60, height: 60, borderRadius: '50%', background: 'rgba(199,50,43,0.3)',
              animation: 'panicPing 1s ease-out infinite', position: 'absolute', inset: '50% 50%', transform: 'translate(-50%, -50%)',
            }}/>
            <div style={{
              width: 24, height: 24, borderRadius: '50%', background: 'var(--danger)',
              border: '3px solid #FFF', position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#FFF',
              boxShadow: '0 4px 12px rgba(0,0,0,0.4)',
            }}>
              <Icon name="siren" size={12}/>
            </div>
            <div style={{
              background: 'var(--danger)', color: '#FFF', padding: '4px 10px',
              borderRadius: 6, fontSize: 11, fontWeight: 700, marginTop: 8, whiteSpace: 'nowrap',
            }}>{panico.indicativo} · PÂNICO</div>
            <style>{`@keyframes panicPing{0%{transform:translate(-50%,-50%) scale(0.5);opacity:1}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}`}</style>
          </div>
        );
      })()}

      {/* Map controls */}
      <div style={{ position: 'absolute', top: 16, right: 16, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8, padding: 12, minWidth: 200 }}>
        <div className="t-overline" style={{ marginBottom: 6 }}>UNIDADES NO TERRENO</div>
        {viaturasMapa.map(v => (
          <div key={v.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0', fontSize: 12 }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: v.velocidade > 0 ? 'var(--success)' : 'var(--warning)' }}/>
            <span className="t-mono" style={{ fontWeight: 600 }}>{v.id}</span>
            <span style={{ flex: 1, color: 'var(--fg-muted)' }}>{v.militar}</span>
            <span className="t-mono" style={{ fontSize: 10 }}>{v.velocidade}km/h</span>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ---------- ALERTAS (full table + confirm) ---------- */

        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr style={{ background: 'var(--surface-2)' }}>
              {['Hora','Matrícula','Motivo','Origem','Local','Patrulha','Estado',''].map(h => (
                <th key={h} style={{ padding: '10px 14px', textAlign: 'left', fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid var(--border)' }}>{h}</th>
              ))}

            {filtered.map(a => (
              <tr key={a.id} style={{ borderBottom: '1px solid var(--border)' }}>

                  {a.confirmado ? <span style={{ color: 'var(--success)', fontSize: 11, display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="check" size={14}/> ok</span>

                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

Object.assign(window, { PCSidebar, PCTopbar, DashboardView, MapaView, AlertasView });

</script>

const BriefingSection = ({ num, title, tone = 'neutral', children }) => (
  <div style={{ marginTop: 18 }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
      <div style={{
        width: 22, height: 22, borderRadius: 4,
        background: tone === 'danger' ? '#C7322B' : '#1F4D3A',
        color: '#FFF', display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700,
      }}>{num}</div>
      <div style={{ fontFamily: 'var(--font-display)', fontSize: 14, fontWeight: 700, color: tone === 'danger' ? '#8E1F1A' : '#0F2A20', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{title}</div>
    </div>
    {children}
  </div>
);

const BriefingField = ({ label, icon, value, editing, onChange }) => (
  <div>
    <div style={{ fontSize: 9, fontWeight: 700, color: '#5A6D63', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 3, display: 'flex', alignItems: 'center', gap: 5 }}>
      <Icon name={icon} size={11}/> {label}
    </div>
    {editing ? (
      <input className="briefing-input" value={value} onChange={e => onChange(e.target.value)}/>
    ) : (
      <div style={{ fontSize: 11, color: '#0F2A20' }}>{value}</div>
    )}
  </div>
);

const BriefingList = ({ items, editing, onChange, numbered }) => {
  if (!editing) {
    return (
      <ol style={{ margin: '6px 0 0', padding: '0 0 0 22px', listStyleType: numbered ? 'decimal' : 'disc' }}>
        {items.map((it, i) => (
          <li key={i} style={{ fontSize: 11, color: '#0F2A20', marginBottom: 4 }}>{it}</li>
        ))}
      </ol>
    );
  }
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 5, marginTop: 6 }}>
      {items.map((it, i) => (
        <div key={i} style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          <span style={{ fontSize: 10, color: '#5A6D63', width: 18, textAlign: 'right', fontFamily: 'var(--font-mono)' }}>{i + 1}.</span>
          <input className="briefing-input" value={it} onChange={e => onChange(items.map((x, j) => j === i ? e.target.value : x))}/>
          <button onClick={() => onChange(items.filter((_, j) => j !== i))} style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: '#C7322B' }}>
            <Icon name="x" size={14}/>
          </button>
        </div>
      ))}
      <button onClick={() => onChange([...items, ''])} style={{
        border: '1px dashed var(--border-strong)', background: 'transparent', borderRadius: 6,
        padding: '6px 10px', fontSize: 11, fontWeight: 600, color: 'var(--fg-muted)', cursor: 'pointer', marginTop: 4,
        display: 'flex', alignItems: 'center', gap: 4, alignSelf: 'flex-start',
      }}>
        <Icon name="plus" size={12}/> Adicionar
      </button>
    </div>
  );
};

    display: 'inline-flex', alignItems: 'center', gap: 6, padding: '4px 10px',

    <span style={{ width: 8, height: 8, borderRadius: '50%', background: c }}/>
    <b style={{ color: '#0F2A20' }}>{n}</b> {label}
  </div>
);

<script type="text/babel">
/* Sentinela PC — Relatório Diário de Serviço (patrulha) — A4 imprimível */

const PatrulhaRDSModal = ({ patrulhaId, onClose }) => {
  const { useStore } = window.SentinelaStore;
  const patrulha = useStore(s => s.patrulhasHistorico.find(p => p.id === patrulhaId));
  const viaturas = useStore(s => s.viaturas);
  const militares = useStore(s => s.militares);
  const ocorrencias = useStore(s => s.alertas);

  if (!patrulha) return null;

  const v = viaturas.find(x => x.id === patrulha.viaturaId);
  const tripulacao = patrulha.militares.map(id => militares.find(m => m.id === id)).filter(Boolean);
  // Eventos relacionados (ANPR + ocorrências) — filtra por patrulha se possível, senão pega últimos 4
  const eventos = (ocorrencias || []).slice(0, 4);

  const printar = () => window.print();

  const fmtDT = (ts) => ts ? new Date(ts).toLocaleString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '—';
  const fmtT  = (ts) => ts ? new Date(ts).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' }) : '—';

  const km = (patrulha.kmFinal && patrulha.kmInicial) ? (patrulha.kmFinal - patrulha.kmInicial) : null;
  const combConsumido = (patrulha.combustivelFinal != null) ? (patrulha.combustivelInicial - patrulha.combustivelFinal) : null;
  const numeroRDS = `RDS / ${patrulha.indicativo} / ${new Date(patrulha.abertaEm).toLocaleDateString('pt-PT').replace(/\//g, '')}`;

  return (
    <>
      <style>{`
        @media print {
          @page { size: A4; margin: 14mm 14mm 18mm; }
          body * { visibility: hidden; }
          .rds-paper, .rds-paper * { visibility: visible; }
          .rds-paper {
            position: absolute; left: 0; top: 0; width: 100%;
            box-shadow: none !important; border: none !important;
            margin: 0 !important; padding: 0 !important;
          }
          .rds-modal-bg { position: static !important; background: transparent !important; padding: 0 !important; }
          .rds-modal-card { box-shadow: none !important; border-radius: 0 !important; }
          .rds-no-print { display: none !important; }
        }
        .rds-grid { display: grid; gap: 0; border: 1px solid #0F2A20; }

        .rds-grid-row:last-child { border-bottom: none; }
        .rds-grid-label {
          background: #F4F2EC; padding: 5px 8px; font-size: 9px; font-weight: 700;
          text-transform: uppercase; letter-spacing: 0.06em; color: #3A5044;
          border-right: 1px solid #C9C2A8; display: flex; align-items: center;
        }
        .rds-grid-val { padding: 5px 10px; font-size: 11px; color: #0F2A20; display: flex; align-items: center; border-right: 1px solid #C9C2A8; }
        .rds-grid-val:last-child { border-right: none; }
        .rds-grid-val.mono { font-family: var(--font-mono); font-weight: 600; }
      `}</style>

      <div className="rds-modal-bg" style={{
        position: 'fixed', inset: 0, background: 'rgba(15, 26, 20, 0.65)',
        zIndex: 100, display: 'flex', flexDirection: 'column', alignItems: 'center',
        overflowY: 'auto', padding: '24px 0',
      }}>
        {/* Toolbar */}

          width: '210mm', background: 'var(--surface)', border: '1px solid var(--border)',
          borderRadius: '8px 8px 0 0', padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <Icon name="file-text" size={16} style={{ color: 'var(--brand-green)' }}/>
          <div style={{ fontSize: 13, fontWeight: 600 }}>RDS · {patrulha.indicativo} · {new Date(patrulha.abertaEm).toLocaleDateString('pt-PT')}</div>
