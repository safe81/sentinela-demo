<!DOCTYPE html><html><head><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg)">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
<div style="height:84px;background:var(--danger);border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff"><div style="font-size:11px;opacity:.9" class="t-caption">CRÍTICO · FURTO</div><div class="t-mono" style="font-size:11px">#C7322B</div></div>
<div style="height:84px;background:var(--warning);border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff"><div style="font-size:11px;opacity:.9" class="t-caption">AVISO</div><div class="t-mono" style="font-size:11px">#D88A2A</div></div>
<div style="height:84px;background:var(--info);border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff"><div style="font-size:11px;opacity:.9" class="t-caption">INFO</div><div class="t-mono" style="font-size:11px">#2E5C8A</div></div>
<div style="height:84px;background:var(--success);border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff"><div style="font-size:11px;opacity:.9" class="t-caption">OK</div><div class="t-mono" style="font-size:11px">#2F7D4A</div></div>
</div></body></html>
