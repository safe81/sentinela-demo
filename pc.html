<!doctype html>
<html lang="pt-PT">
<head>
<meta charset="utf-8"/>
<title>Sentinela — Comando (PC)</title>
<meta name="viewport" content="width=1400"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body { margin: 0; height: 100%; background: var(--bg); font-family: var(--font-sans); color: var(--fg); }
  #root { height: 100vh; display: flex; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js?v=3"></script>
<script src="store.js?v=3"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="app_pc/Dashboard.jsx"></script>
<script type="text/babel" src="app_pc/Briefing.jsx"></script>
<script type="text/babel" src="app_pc/PatrulhaRDS.jsx"></script>
<script type="text/babel" src="app_pc/Other.jsx"></script>
<script type="text/babel" src="app_pc/Estatisticas.jsx"></script>
<script type="text/babel" src="app_pc/Cronologia.jsx"></script>
<script type="text/babel" src="app_pc/FeriasPC.jsx"></script>
<script type="text/babel" src="app_pc/AdminPC.jsx"></script>
<!-- Stitch redesign screens -->
<script type="text/babel" src="app_pc/LoginPC.jsx"></script>
<script type="text/babel" src="app_pc/DashboardNew.jsx"></script>
<script type="text/babel" src="app_pc/CommsPC.jsx"></script>
<script type="text/babel" src="app_pc/WikiPC.jsx"></script>
<script type="text/babel" src="app_pc/ScannerPC.jsx"></script>
<script type="text/babel" src="app_pc/EscalasPC.jsx"></script>
<script type="text/babel" src="app_pc/OrdensServicoPC.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// Aplica o tema ao <html> e mantém em sync
const useTheme = () => {
  const tema = window.SentinelaStore.useStore(s => s.tema);
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', tema === 'noturno' ? 'dark' : 'light');
  }, [tema]);
  return tema;
};

const ThemeToggle = () => {
  const tema = window.SentinelaStore.useStore(s => s.tema);
  return (
    <button
      onClick={() => window.SentinelaStore.actions.setTema(tema === 'noturno' ? 'claro' : 'noturno')}
      title={tema === 'noturno' ? 'Modo dia' : 'Modo ronda noturna'}
      style={{
        background: tema === 'noturno' ? 'rgba(201,162,75,0.18)' : 'var(--surface-2)',
        border: '1px solid var(--border)', borderRadius: 6,
        padding: '6px 10px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6,
        fontSize: 11, fontWeight: 600, color: 'var(--fg)',
      }}>
      <Icon name={tema === 'noturno' ? 'moon' : 'sun'} size={14}/>
      {tema === 'noturno' ? 'Ronda noturna' : 'Dia'}
    </button>
  );
};

const titles = {
  dashboard: ['Dashboard', 'Visão geral · Posto Territorial Vila Real'],
  briefing:  ['Briefing diário', 'Preparação do serviço de hoje'],
  mapa:      ['Mapa em tempo real', 'Posições GPS · viaturas e patrulhas'],
  alertas:   ['Alertas ANPR', 'Leituras de matrículas e correspondências BNDV'],
  patrulhas: ['Patrulhas', 'Histórico e patrulhas em curso'],
  viaturas:  ['Viaturas', 'Frota do Posto Territorial Vila Real'],
  militares: ['Militares', 'Efetivo do posto'],
  ordens:    ['Ordens de serviço', 'Difusão de OS para o efetivo'],
  escalas:   ['Escalas', 'Planeamento semanal · turnos'],
  chat:         ['Mensagens', 'Comunicações operacionais'],
  estatisticas: ['Estatísticas', 'KPIs e indicadores de desempenho operacional — maio 2026'],
  cronologia:   ['Cronologia de turno', 'Linha temporal de todos os eventos registados'],
  ocorrencias:  ['Ocorrências', 'Registos submetidos no terreno pelo efetivo'],
  ferias:       ['Férias', 'Marcação anual por ordem de antiguidade — 2026'],
  admin:        ['Administração', 'Configuração do posto, efectivo, viaturas e sistema'],
};

// Stitch redesign screens — render standalone (own chrome).
const REDESIGN_SCREENS = {
  loginPc:        { component: () => window.LoginPCScreen        && <LoginPCScreen/>,        label: 'Login (PC)' },
  dashboardPc:    { component: () => window.DashboardPCScreen    && <DashboardPCScreen/>,    label: 'Dashboard (novo)' },
  commsPc:        { component: () => window.CommsPCScreen        && <CommsPCScreen/>,        label: 'Comunicações (novo)' },
  wikiPc:         { component: () => window.WikiPCScreen         && <WikiPCScreen/>,         label: 'Wiki / Lista (novo)' },
  scannerPc:      { component: () => window.ScannerPCScreen      && <ScannerPCScreen/>,      label: 'Scanner ALPR (novo)' },
  escalasPc:      { component: () => window.EscalasPCScreen      && <EscalasPCScreen/>,      label: 'Escalas (novo)' },
  ordensServicoPc:{ component: () => window.OrdensServicoPCScreen&& <OrdensServicoPCScreen/>,label: 'Ordens de Serviço (novo)' },
};

// Mini bar to switch between the redesign screens (only visible when one is active).
const RedesignSwitcher = ({ active, setActive }) => {
  const keys = Object.keys(REDESIGN_SCREENS);
  return (
    <div style={{
      position: 'fixed', bottom: 12, left: '50%', transform: 'translateX(-50%)',
      background: 'rgba(0,10,30,0.92)', color: '#FFF',
      padding: '6px 8px', borderRadius: 999, zIndex: 9999,
      display: 'flex', gap: 4, alignItems: 'center',
      boxShadow: '0 8px 24px rgba(0,0,0,0.35)',
      fontFamily: 'var(--font-ui)', fontSize: 11,
    }}>
      <button onClick={() => setActive('dashboard')} style={{
        background: 'transparent', border: 'none', color: '#FFF', cursor: 'pointer',
        padding: '4px 10px', fontSize: 11, fontWeight: 600, opacity: 0.7,
      }}>← original</button>
      <span style={{ width: 1, height: 16, background: 'rgba(255,255,255,0.2)' }}/>
      {keys.map(k => (
        <button key={k} onClick={() => setActive(k)} style={{
          background: active === k ? 'rgba(255,255,255,0.16)' : 'transparent',
          border: 'none', color: '#FFF', cursor: 'pointer',
          padding: '4px 10px', borderRadius: 999, fontSize: 11, fontWeight: 600,
        }}>{REDESIGN_SCREENS[k].label}</button>
      ))}
    </div>
  );
};

const App = () => {
  useTheme();
  // Default opens the new dashboard ('dashboardPc') so the redesign is the front door.
  // Use the bottom switcher to compare with the original UI ('dashboard').
  const [active, setActive] = useState('dashboardPc');
  const isRedesign = !!REDESIGN_SCREENS[active];

  // Expose to redesign screens' internal sidebars so they can navigate.
  React.useEffect(() => { window.__setRedesignScreen = setActive; }, []);

  // Redesign screens render standalone (own sidebar/topbar) on the full root.
  if (isRedesign) {
    const C = REDESIGN_SCREENS[active].component;
    return (
      <>
        {C()}
        <RedesignSwitcher active={active} setActive={setActive}/>
      </>
    );
  }

  const [t, sub] = titles[active] || titles.dashboard;
  return (
    <>
      <PCSidebar active={active} setActive={setActive}/>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <PCTopbar title={t} subtitle={sub} extra={<ThemeToggle/>}/>
        {active === 'dashboard' && <DashboardView/>}
        {active === 'briefing' && <BriefingView/>}
        {active === 'mapa' && <MapaView/>}
        {active === 'alertas' && <AlertasView/>}
        {active === 'patrulhas' && <PatrulhasView/>}
        {active === 'viaturas' && <ViaturasView/>}
        {active === 'militares' && <MilitaresView/>}
        {active === 'ordens' && <OSView/>}
        {active === 'escalas' && <EscalasView/>}
        {active === 'chat' && <ChatView/>}
        {active === 'estatisticas' && <EstatisticasView/>}
        {active === 'cronologia'   && <CronologiaView/>}
        {active === 'ocorrencias'  && <OcorrenciasView/>}
        {active === 'ferias'       && <FeriasView/>}
        {active === 'admin'        && <AdminView/>}
      </div>
      <RedesignSwitcher active={active} setActive={setActive}/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
