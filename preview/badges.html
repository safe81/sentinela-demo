<!DOCTYPE html><html><head><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg)">
<div style="display:flex;gap:8px;flex-wrap:wrap">
<span style="display:inline-flex;align-items:center;height:22px;padding:0 8px;background:var(--danger-soft);color:var(--danger-deep);border:1px solid rgba(199,50,43,.22);border-radius:999px;font:600 11px var(--font-ui);text-transform:uppercase;letter-spacing:.04em">CRÍTICO</span>
<span style="display:inline-flex;align-items:center;height:22px;padding:0 8px;background:var(--warning-soft);color:var(--warning-deep);border:1px solid rgba(216,138,42,.22);border-radius:999px;font:600 11px var(--font-ui);text-transform:uppercase;letter-spacing:.04em">AVISO</span>
<span style="display:inline-flex;align-items:center;height:22px;padding:0 8px;background:var(--info-soft);color:var(--info-deep);border:1px solid rgba(46,92,138,.22);border-radius:999px;font:600 11px var(--font-ui);text-transform:uppercase;letter-spacing:.04em">INFO</span>
<span style="display:inline-flex;align-items:center;height:22px;padding:0 8px;background:var(--success-soft);color:var(--success);border:1px solid rgba(47,125,74,.22);border-radius:999px;font:600 11px var(--font-ui);text-transform:uppercase;letter-spacing:.04em">CONFIRMADO</span>
<span style="display:inline-flex;align-items:center;height:22px;padding:0 8px;background:rgba(31,77,58,.10);color:var(--brand-green);border:1px solid rgba(31,77,58,.20);border-radius:999px;font:600 11px var(--font-ui);text-transform:uppercase;letter-spacing:.04em">VRL-21</span>
<span style="display:inline-flex;align-items:center;height:22px;padding:0 8px;background:rgba(201,162,75,.14);color:var(--brand-gold-deep);border:1px solid rgba(201,162,75,.30);border-radius:999px;font:600 11px var(--font-ui);text-transform:uppercase;letter-spacing:.04em">CMDT</span>
</div></body></html>
