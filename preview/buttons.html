<!DOCTYPE html><html><head><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg)">
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
<button style="background:var(--brand-green);color:#fff;border:none;border-radius:8px;padding:0 18px;height:44px;font:600 15px var(--font-ui);cursor:pointer">Iniciar patrulha</button>
<button style="background:#fff;color:var(--fg);border:1px solid var(--border-strong);border-radius:8px;padding:0 14px;height:36px;font:600 13px var(--font-ui)">Secundário</button>
<button style="background:var(--danger);color:#fff;border:none;border-radius:8px;padding:0 14px;height:36px;font:600 13px var(--font-ui)">Pedir reforços</button>
<button style="background:var(--brand-gold);color:#1A1208;border:none;border-radius:8px;padding:0 14px;height:36px;font:600 13px var(--font-ui)">Confirmar</button>
<button style="background:transparent;color:var(--fg);border:none;padding:0 14px;height:36px;font:600 13px var(--font-ui)">Ghost</button>
</div></body></html>
