<!DOCTYPE html><html><head><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg)">
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
<div style="height:84px;background:var(--brand-green);border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff"><div style="font-size:11px;opacity:.8" class="t-caption">VERDE SENTINELA</div><div class="t-mono" style="font-size:11px">#1F4D3A</div></div>
<div style="height:84px;background:var(--brand-green-deep);border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff"><div style="font-size:11px;opacity:.8" class="t-caption">VERDE PROFUNDO</div><div class="t-mono" style="font-size:11px">#0F2A20</div></div>
<div style="height:84px;background:var(--brand-gold);border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#1A1208"><div style="font-size:11px;opacity:.8" class="t-caption">DOURADO</div><div class="t-mono" style="font-size:11px">#C9A24B</div></div>
<div style="height:84px;background:var(--brand-gold-deep);border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff"><div style="font-size:11px;opacity:.8" class="t-caption">OURO ESCURO</div><div class="t-mono" style="font-size:11px">#8C6F2C</div></div>
<div style="height:84px;background:var(--bg);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:var(--fg)"><div style="font-size:11px;opacity:.7" class="t-caption">FUNDO</div><div class="t-mono" style="font-size:11px">#F4F2EC</div></div>
</div></body></html>
